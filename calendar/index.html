<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Milano Calendar (all-day)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#fff; }
  #wrap { display:flex; flex-direction:row; height:100vh; background:#fff; color:#222; }
  #main { flex:1; min-width:0; order:1; display:flex; flex-direction:column; }

  /* ---- jobs sidebar (right-hand side) ---- */
  #sidebar { flex:0 0 232px; order:2; display:flex; flex-direction:column; min-height:0; border-left:1px solid #e0e0e0; background:#fafafa; }
  #wrap.collapsed #sidebar { display:none; }
  #btnJobs { margin-left:auto; }   /* sit at the right edge, over the jobs panel */
  #btnJobs.active { background:#eafaf2; border-color:#16b378; color:#0f7a52; }
  #sideHead { flex:0 0 auto; padding:8px 8px 6px; display:flex; flex-direction:column; gap:6px; border-bottom:1px solid #e8e8e8; position:relative; }
  #sideTitle { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#888; }
  #jobSearch { font-size:12px; padding:5px 8px; border:1px solid #ccc; border-radius:5px; background:#fff; color:#333; outline:none; }
  #jobSearch:focus { border-color:#16b378; box-shadow:0 0 0 2px rgba(22,179,120,.15); }
  #fsrow { display:flex; gap:4px; }
  #filterBtn, #sortBtn { display:flex; align-items:center; gap:6px; font-size:11.5px; padding:5px 8px; border:1px solid #ccc; border-radius:5px; background:#fff; color:#444; cursor:pointer; text-align:left; }
  #filterBtn { flex:1.2; }
  #sortBtn { flex:1; }
  #filterBtn:hover, #sortBtn:hover { background:#f0f0f0; }
  #filterBtn.active, #sortBtn.active { border-color:#16b378; color:#0f7a52; background:#eafaf2; }
  #sortCaret { margin-left:auto; transition:transform .15s; color:#999; }
  #sortBtn.open #sortCaret { transform:rotate(90deg); }
  #sortMenu { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:10;
    flex-direction:column; gap:2px; padding:6px; background:#fff; border:1px solid #d8d8d5; border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); }
  #sortMenu.open { display:flex; }
  .srow { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
          font-size:11.5px; color:#333; user-select:none; }
  .srow:hover { background:#f0f0ee; }
  .srow.on { color:#0f7a52; font-weight:600; background:#eafaf2; }
  .srow .sarrow { margin-left:auto; color:#0f7a52; font-weight:700; }
  .shint { font-size:9.5px; color:#aaa; padding:4px 6px 1px; }
  #filterCount { font-size:10px; font-weight:600; background:#16b378; color:#fff; border-radius:9px; padding:0 6px; line-height:15px; display:none; }
  #filterCount.show { display:inline-block; }
  #filterCaret { margin-left:auto; transition:transform .15s; color:#999; }
  #filterBtn.open #filterCaret { transform:rotate(90deg); }
  #stageFilter { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:10;
    flex-direction:column; gap:2px; padding:6px; background:#fff; border:1px solid #d8d8d5; border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); }
  #stageFilter.open { display:flex; }
  #stageFilter { max-height:340px; overflow-y:auto; }
  .fhead { font-size:9.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:#999; margin:5px 0 2px; }
  .fhead:first-child { margin-top:0; }
  .frow { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
          font-size:11.5px; font-weight:500; color:#333; user-select:none; }
  .frow:hover { background:#f0f0ee; }
  .frow .fcaret { margin-left:auto; color:#999; }
  .frow .fnum { font-size:10px; font-weight:600; background:#16b378; color:#fff; border-radius:9px; padding:0 6px; line-height:15px; }
  .fsel { font-size:10px; color:#0f7a52; padding:0 6px 5px; margin-top:-3px; line-height:1.4; overflow-wrap:break-word; }
  .fback { font-size:11px; font-weight:500; color:#16b378; cursor:pointer; padding:2px 2px 5px; user-select:none; }
  .fback:hover { text-decoration:underline; }
  .fclearall { margin-top:6px; padding:6px 8px; border-top:1px solid #eee; font-size:11px; font-weight:600;
               color:#e53935; cursor:pointer; text-align:center; border-radius:4px; user-select:none; }
  .fclearall:hover { background:#fdecea; }
  .schip { display:flex; align-items:center; gap:7px; font-size:11px; color:#444; padding:2px 2px; cursor:pointer; user-select:none; border-radius:4px; }
  .schip:hover { background:#f0f0ee; }
  .schip .sw { flex:0 0 auto; width:26px; height:15px; border-radius:8px; background:#d0d0cc; position:relative; transition:background .15s; }
  .schip .sw::after { content:''; position:absolute; top:2px; left:2px; width:11px; height:11px; border-radius:50%; background:#fff; box-shadow:0 1px 1px rgba(0,0,0,.2); transition:left .15s; }
  .schip.on .sw { background:#16b378; }
  .schip.on .sw::after { left:13px; }
  .schip .dot { flex:0 0 auto; width:9px; height:9px; border-radius:2px; box-shadow:0 0 0 1px rgba(0,0,0,.1) inset; }
  .schip .slabel { flex:1; min-width:0; }
  #stageFilter .clear { font-size:10px; color:#16b378; cursor:pointer; padding:3px 2px 1px; align-self:flex-start; }
  #stageFilter .clear:hover { text-decoration:underline; }

  /* ---- saved views ---- */
  #viewsBtn { display:flex; align-items:center; gap:6px; width:100%; font-size:11.5px; padding:5px 8px;
    border:1px solid #ccc; border-radius:5px; background:#fff; color:#444; cursor:pointer; text-align:left; }
  #viewsBtn:hover { background:#f0f0f0; }
  #viewsBtn.active { border-color:#16b378; color:#0f7a52; background:#eafaf2; }
  #viewsBtn .veye { flex:0 0 auto; color:#999; }
  #viewsBtn.active .veye { color:#16b378; }
  #viewsBtn .vname { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
  #viewsBtn .vdirty { flex:0 0 auto; color:#e5860b; font-weight:700; }
  #viewsCaret { flex:0 0 auto; margin-left:auto; transition:transform .15s; color:#999; }
  #viewsBtn.open #viewsCaret { transform:rotate(90deg); }
  #viewsMenu { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:12;
    flex-direction:column; gap:2px; padding:6px; background:#fff; border:1px solid #d8d8d5; border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); max-height:360px; overflow-y:auto; }
  #viewsMenu.open { display:flex; }
  .vrow { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
          font-size:11.5px; color:#333; user-select:none; }
  .vrow:hover { background:#f0f0ee; }
  .vrow.on { color:#0f7a52; font-weight:600; background:#eafaf2; }
  .vrow .vlabel { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .vrow .vtick { flex:0 0 auto; color:#0f7a52; font-weight:700; }
  .vrow .vdel { flex:0 0 auto; color:#bbb; font-weight:700; padding:0 5px; border-radius:4px; line-height:1.4; }
  .vrow .vdel:hover { color:#e53935; background:#fdecea; }
  .vaction { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
             font-size:11.5px; font-weight:500; color:#16b378; user-select:none; }
  .vaction:hover { background:#eafaf2; }
  .vaction.danger { color:#e53935; }
  .vaction.danger:hover { background:#fdecea; }
  .vsep { border-top:1px solid #eee; margin:4px 0 2px; }
  .vempty { font-size:10.5px; color:#aaa; padding:4px 6px 6px; }

  #jobList { flex:1; min-height:0; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:6px; }
  #jobList .empty { font-size:12px; color:#999; padding:10px 4px; text-align:center; }
  .jobitem .jcount { cursor:pointer; }
  .jobitem .jcount:hover { color:#16b378; }
  .jvisits { display:flex; flex-direction:column; gap:2px; margin-top:3px; border-top:1px dashed #e4e2de; padding-top:4px; }
  .jvisit { font-size:10px; color:#555; padding:2px 4px; border-radius:4px; cursor:pointer; line-height:1.35; }
  .jvisit:hover { background:#eefaf3; }
  .jvisit .vd { font-weight:600; color:#333; }
  .jobitem { border:1px solid #e0e0e0; border-radius:6px; background:#fff; padding:6px 7px; cursor:grab;
             box-shadow:0 1px 1px rgba(0,0,0,.05); display:flex; flex-direction:column; gap:3px; }
  .jobitem:hover { border-color:#16b378; }
  .jobitem:active { cursor:grabbing; }
  .jobitem.lit { outline:2px solid #16b378; outline-offset:1px; }
  .jobitem .ja { font-size:11.5px; font-weight:600; color:#222; line-height:1.3; overflow-wrap:break-word; }
  .jobitem .jaddr { font-size:10px; color:#666; line-height:1.35; overflow-wrap:break-word; }
  .jobitem .jmeta { display:flex; align-items:center; flex-wrap:wrap; gap:4px; font-size:10px; color:#666; }
  .jobitem .jcount { margin-left:auto; font-size:9.5px; color:#999; white-space:nowrap; }
  .jobitem .pill { font-size:9.5px; }

  #toolbar { display:flex; align-items:center; gap:6px; padding:6px 8px; border-bottom:1px solid #e0e0e0; flex-wrap:wrap; flex:0 0 auto; }
  #toolbar button, #toolbar select {
    font-size:12px; padding:4px 10px; border:1px solid #ccc; border-radius:4px;
    background:#fff; cursor:pointer; color:#333;
  }
  #toolbar button:hover { background:#f0f0f0; }
  #rangeLabel { font-size:13px; font-weight:600; color:#333; margin-left:6px; }
  #msg { padding:20px; font-size:13px; color:#666; display:none; }
  #cal { flex:1; min-height:0; display:flex; flex-direction:column; }

  /* ---- week / day view ---- */
  .cols { flex:1; min-height:0; display:grid; grid-auto-columns:1fr; grid-auto-flow:column; }
  .daycol { display:flex; flex-direction:column; border-right:1px solid #e8e8e8; min-width:0; }
  .daycol:last-child { border-right:none; }
  .dayhead { flex:0 0 auto; text-align:center; padding:5px 2px; border-bottom:1px solid #e0e0e0; font-size:12px; color:#666; background:#fafafa; }
  .dayhead .num { font-size:17px; font-weight:600; color:#444; margin-right:4px; }
  .dayhead.today { color:#e53935; background:#fdecea; font-weight:600; }
  .dayhead.today .num { background:#e53935; color:#fff; border-radius:50%; display:inline-block; min-width:26px; line-height:26px; text-align:center; }
  .daycol.today { background:#fef7f6; }
  .daybody { flex:1; overflow-y:auto; padding:8px 8px 4px 4px; display:flex; flex-direction:column; gap:7px; }
  .daybody.dragover { background:#eefaf3; }

  /* ---- month view ---- */
  #monthwrap { flex:1; min-height:0; overflow-y:auto; }
  .mhead { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid #e0e0e0; background:#fafafa; position:sticky; top:0; z-index:2; }
  .mhead div { text-align:center; font-size:11px; color:#666; padding:4px 0; }
  .mrow { display:grid; grid-template-columns:repeat(7,1fr); }
  .mcell { border-right:1px solid #eee; border-bottom:1px solid #eee; min-height:92px; padding:3px 7px 3px 3px; display:flex; flex-direction:column; gap:7px; min-width:0; }
  .mcell:last-child { border-right:none; }
  .mcell .dnum { font-size:11px; font-weight:600; color:#555; padding:1px 3px; flex:0 0 auto; }
  .mcell.other .dnum { color:#bbb; }
  .mcell.today { background:#fef7f6; }
  .mcell.today .dnum { color:#fff; background:#e53935; border-radius:9px; align-self:flex-start; }
  .mcell.dragover { background:#eefaf3; }

  /* ---- event cards ---- */
  .ev { background:#fff; border:1px solid #e0e0e0; border-radius:6px; padding:5px 14px 5px 7px; cursor:pointer;
        color:#222; flex:0 0 auto; box-shadow:0 1px 1px rgba(0,0,0,.08);
        overflow-wrap:break-word; position:relative; }
  .ev .del { position:absolute; top:-6px; right:-6px; width:16px; height:16px; line-height:13px; text-align:center;
             font-size:11px; font-weight:700; color:#fff; background:#6d7681; border:1.5px solid #fff;
             border-radius:50%; box-shadow:0 1px 2px rgba(0,0,0,.35); cursor:pointer; user-select:none; z-index:2; }
  .ev .del:hover { background:#e53935; }
  .avatar { width:18px; height:18px; border-radius:50%; background:#eceae6; color:#555; font-size:8.5px; font-weight:700;
            display:inline-flex; align-items:center; justify-content:center; border:1px solid #d8d5cf;
            vertical-align:middle; letter-spacing:.02em; }
  .ev.selected, .ev.lit { outline:2px solid #16b378; outline-offset:1px; }
  .ev.dim { opacity:.22; }
  .ev .inst { margin-top:4px; padding-top:3px; border-top:1px solid #eee;
              font-size:10.5px; font-weight:600; color:#444; line-height:1.35; white-space:normal; }
  .ev .t { font-size:11.5px; font-weight:600; line-height:1.35; white-space:normal;
           display:inline-block; max-width:100%; border-radius:8px; padding:2px 8px; }
  .ev .d { font-size:10.5px; line-height:1.4; color:#555; margin-top:3px; white-space:normal; }
  .ev .lbl { color:#999; }
  .pill { border-radius:8px; padding:0 7px; display:inline-block; line-height:1.5; }
  .mcell .ev { padding:4px 6px; }
  .mcell .ev .t { font-size:10.5px; }
  .mcell .ev .d { font-size:9.5px; }
  .mcell .ev .inst { font-size:9.5px; }

  /* ---- job details popup ---- */
  #jobModal { display:none; position:fixed; inset:0; z-index:50; background:rgba(20,22,26,.42);
    align-items:center; justify-content:center; padding:20px; }
  #jobModal.open { display:flex; }
  #jobModalCard { background:#fff; width:100%; max-width:440px; max-height:86vh; display:flex; flex-direction:column;
    border-radius:10px; box-shadow:0 18px 50px rgba(0,0,0,.3); overflow:hidden; }
  .jm-head { flex:0 0 auto; display:flex; align-items:flex-start; gap:8px; padding:14px 16px 10px; border-bottom:1px solid #eee; }
  .jm-title { flex:1; min-width:0; font-size:15px; font-weight:700; color:#222; line-height:1.3; overflow-wrap:break-word; }
  .jm-close { flex:0 0 auto; font-size:20px; line-height:1; color:#999; cursor:pointer; padding:0 2px; }
  .jm-close:hover { color:#e53935; }
  .jm-body { flex:1; min-height:0; overflow-y:auto; padding:12px 16px; }
  .jm-row { display:flex; gap:10px; padding:5px 0; font-size:12.5px; line-height:1.45; border-bottom:1px solid #f4f4f2; }
  .jm-row:last-child { border-bottom:none; }
  .jm-k { flex:0 0 116px; color:#888; font-weight:600; }
  .jm-v { flex:1; min-width:0; color:#222; overflow-wrap:break-word; }
  .jm-sec { font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#aaa; margin:14px 0 4px; }
  .jm-visit { font-size:12px; color:#333; padding:5px 8px; border-radius:5px; background:#f7f7f5; margin-bottom:4px; line-height:1.4; }
  .jm-visit .vd { font-weight:600; color:#111; }
  .jm-empty { font-size:12px; color:#aaa; padding:2px 0; }
  .jm-foot { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:12px 16px; border-top:1px solid #eee; background:#fafafa; }
  .jm-hint { flex:1; min-width:0; font-size:10.5px; color:#999; line-height:1.35; }
  .jm-edit { flex:0 0 auto; font-size:12.5px; font-weight:600; text-decoration:none; color:#fff; background:#16b378;
    padding:7px 14px; border-radius:6px; cursor:pointer; white-space:nowrap; }
  .jm-edit:hover { background:#139968; }
  .jm-edit.disabled { background:#cfd4d1; pointer-events:none; }
  .jm-gear { flex:0 0 auto; font-size:15px; line-height:1; color:#aaa; cursor:pointer; padding:0 4px; }
  .jm-gear:hover { color:#16b378; }
  .jm-gear.on { color:#16b378; }
  /* layout editor overlay inside the modal */
  .jm-editor { display:none; flex-direction:column; }
  #jobModalCard.editing .jm-body { display:none; }
  #jobModalCard.editing .jm-editor { display:flex; }
  #jobModalCard.editing .jm-foot { display:none; }
  .jm-editor { flex:1; min-height:0; overflow-y:auto; padding:10px 14px; }
  .jm-editnote { font-size:11px; color:#999; margin-bottom:8px; line-height:1.4; }
  .jm-fld { display:flex; align-items:center; gap:9px; padding:7px 6px; border:1px solid #eee; border-radius:6px;
            margin-bottom:5px; background:#fff; font-size:12.5px; color:#333; cursor:grab; }
  .jm-fld:hover { border-color:#d8d5cf; }
  .jm-fld.dragging { opacity:.4; }
  .jm-fld.hidden-fld { color:#bbb; background:#fafafa; }
  .jm-fld .grip { flex:0 0 auto; color:#c4c1ba; font-size:13px; cursor:grab; }
  .jm-fld .flbl { flex:1; min-width:0; overflow-wrap:break-word; }
  .jm-fld .fsw { flex:0 0 auto; width:30px; height:17px; border-radius:9px; background:#d0d0cc; position:relative; transition:background .15s; }
  .jm-fld .fsw::after { content:''; position:absolute; top:2px; left:2px; width:13px; height:13px; border-radius:50%; background:#fff; box-shadow:0 1px 1px rgba(0,0,0,.25); transition:left .15s; }
  .jm-fld.on .fsw { background:#16b378; }
  .jm-fld.on .fsw::after { left:15px; }
  .jm-editreset { font-size:11px; color:#16b378; cursor:pointer; padding:6px 2px; }
  .jm-editreset:hover { text-decoration:underline; }
  .jm-editdone { flex:0 0 auto; display:flex; justify-content:flex-end; padding:10px 14px; border-top:1px solid #eee; background:#fafafa; }
  #jobModalCard:not(.editing) .jm-editdone { display:none; }
  .jm-donebtn { font-size:12.5px; font-weight:600; color:#fff; background:#16b378; border:none; padding:7px 16px; border-radius:6px; cursor:pointer; }
  .jm-donebtn:hover { background:#139968; }
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <div id="sideHead">
      <div id="sideTitle">Jobs</div>
      <input id="jobSearch" type="text" placeholder="Search address, client, stage, staff…" autocomplete="off">
      <button id="viewsBtn" type="button"><span class="veye">&#9673;</span><span class="vname">All jobs</span><span class="vdirty" style="display:none">&bull;</span><span id="viewsCaret">&#8250;</span></button>
      <div id="fsrow">
        <button id="filterBtn" type="button"><span>&#9881; Filter</span><span id="filterCount"></span><span id="filterCaret">&#8250;</span></button>
        <button id="sortBtn" type="button"><span>&#8645; Sort</span><span id="sortCaret">&#8250;</span></button>
      </div>
      <div id="stageFilter"></div>
      <div id="sortMenu"></div>
      <div id="viewsMenu"></div>
    </div>
    <div id="jobList"></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <button id="btnToday">Today</button>
      <button id="btnPrev">&#8249;</button>
      <button id="btnNext">&#8250;</button>
      <select id="viewSel">
        <option value="day">Day</option>
        <option value="week" selected>Week</option>
        <option value="month">Month</option>
      </select>
      <span id="rangeLabel"></span>
      <button id="btnJobs" title="Show / hide the jobs panel">&#9783; Jobs</button>
    </div>
    <div id="msg"></div>
    <div id="cal"></div>
  </div>
</div>

<div id="jobModal">
  <div id="jobModalCard">
    <div class="jm-head">
      <div class="jm-title"></div>
      <span class="jm-gear" title="Edit this panel — choose fields and order">&#9998;</span>
      <span class="jm-close" title="Close">&times;</span>
    </div>
    <div class="jm-body"></div>
    <div class="jm-editor"></div>
    <div class="jm-editdone"><button class="jm-donebtn" type="button">Done</button></div>
    <div class="jm-foot">
      <span class="jm-hint"></span>
      <a class="jm-edit" target="_parent" rel="noopener" href="#">&#9998; Edit in Inbox</a>
    </div>
  </div>
</div>

<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<script>
(function () {
  'use strict';

  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  // sidebar reads these columns off the jobs table when they exist
  var JOB_COLS = { addr:'Job_Address', client:'Client_Label', stage:'Stage', assigned:'Assigned_To', jid:'Job_ID' };

  // ---- "Edit in Inbox" navigation ----
  // Double-click a job → details popup → Edit jumps to that assignee's Inbox sub-page
  // with the same job selected (Grist anchor link, opens in the same tab via target="_parent").
  // If the doc's pages/sections change, update page (view id) + sec (Jobs section ref) below.
  var INBOX = {
    base: 'https://milano.getgrist.com/ezZUgCeS6Rq1/Milano',
    clientCol: 193,                       // Jobs_Detail.Client_Name colRef (any col works for the anchor)
    byAssignee: {                         // Assigned_To choice value -> { page: view id, sec: Jobs section ref }
      'Julie':  { page: 29, sec: 142 },
      'Phoebe': { page: 30, sec: 145 },
      'Nhi':    { page: 31, sec: 148 },
      'a Minh': { page: 32, sec: 151 }
    },
    fallback: { page: 24, sec: 122 },     // *Inbox (all jobs) when the assignee has no own page
    pageName: { 29:'Julie', 30:'Phoebe', 31:'Nhi', 32:'Anh Minh', 24:'Inbox' }
  };

  // ---- saved views (named filter + sort + calendar-mode sets) ----
  function findView(name) {

    return null;

  // snapshot of everything a view remembers, with only the active filter keys kept
  function currentSnapshot() {

    });
    return { filters: f, sortBy: { key: sortBy.key, dir: sortBy.dir }, view: view };
  }
  // stable signature so we can tell whether the live state still matches a saved view
  function snapSig(s) {

      if (ks.length) f[b] = ks;

    return JSON.stringify({ f: f, s: s.sortBy || null, v: s.view || null });
  }
  function isViewDirty() {

  }

  function applyView(v, silent) {

    });
    if (v.sortBy && v.sortBy.key) sortBy = { key: v.sortBy.key, dir: v.sortBy.dir };
    if (v.view) {
      view = v.view;

    filterView = null;

  function saveViewAs() {
    var name = prompt('Name this view (e.g. "In progress", "My jobs", "Melbourne"):', '');
    if (name === null) return;
    name = name.trim();
    if (!name) return;
    var snap = currentSnapshot();
    var existing = findView(name);
    if (existing) {
      if (!confirm('A view named "' + name + '" already exists. Overwrite it?')) return;
      existing.filters = snap.filters; existing.sortBy = snap.sortBy; existing.view = snap.view;
    } else {
      savedViews.push({ name: name, filters: snap.filters, sortBy: snap.sortBy, view: snap.view });
    }
    activeViewName = name;
    persistViews();
    render();
  }
  function updateActiveView() {
    var v = findView(activeViewName);

  // ---- job details popup ----

  // find the sidebar job a calendar visit belongs to (or synthesise a minimal one)
  function jobForRecord(rec) {
    var key = jobKey(rec);

    var found = jobs.filter(function (j) { return (j.id ? jobAliases(j) : [j.key]).indexOf(key) !== -1; })[0];
    if (found) return found;

  }

  // build every populated field descriptor {id,label,node} for a job (before ordering/hiding)
  function buildDetailFields(job) {
    var fields = [];
    if (job.jid) fields.push({ id: 'jid', label: 'Job ID', node: job.jid });
    if (job.client) fields.push({ id: 'client', label: 'Client', node: job.client });
    if (job.addr) fields.push({ id: 'addr', label: 'Address', node: job.addr });
    if (job.stage) {
      var sp = (mappingsCache && mappingsCache.type) ? pillSpan(job.stage, mappingsCache.type) : jmPill(job.stage, JOB_COLS.stage);
      fields.push({ id: 'stage', label: 'Stage', node: sp });
    }
    fields.push({ id: 'assigned', label: 'Assigned to', node: jmAssignees(job.assigned || []) });

    var skip = {}; [JOB_COLS.addr, JOB_COLS.client, JOB_COLS.stage, JOB_COLS.assigned, JOB_COLS.jid, 'Client_Name'].forEach(function (c) { skip[c] = 1; });
    if (job.raw) {
      Object.keys(job.raw).forEach(function (colId) {
        if (skip[colId] || colId.indexOf('gristHelper_') === 0) return;
        var meta = jobMetaByColId[colId] || {}, type = meta.type || '', val = job.raw[colId], node;
        if (type.indexOf('Ref:') === 0 || type.indexOf('RefList:') === 0 || type === 'Attachments') return;
        if ((val === null || val === undefined || val === '' || val === 0) && !(type === 'Bool' && val === true)) return;
        if (type === 'Bool') { if (!val) return; node = 'Yes'; }
        else if (type === 'Date' || type === 'DateTime') { var d = gristToLocalDate(val); if (!d) return; node = fmtDate(d); }
        else if (type === 'ChoiceList') {

          vals.forEach(function (vv, i) { if (i) node.appendChild(document.createTextNode(' ')); node.appendChild(jmPill(vv, colId)); });
        }
        else if (type === 'Choice') { node = jmPill(String(val), colId); }
        else { node = fmtVal(val); if (node === '') return; }
        fields.push({ id: colId, label: meta.label || colId, node: node });
      });
    }
    return fields;
  }
  // apply the saved arrangement: reorder by detailLayout.order, drop hidden
  function orderedDetailFields(fields) {

    var seen = {}, out = [];

  function openJobDetails(job) {

      });
      row.addEventListener('dragstart', function (e) { row.classList.add('dragging'); e.dataTransfer.setData('text/plain', id); e.dataTransfer.effectAllowed = 'move'; });
      row.addEventListener('dragend', function () { row.classList.remove('dragging'); });
      row.addEventListener('dragover', function (e) { e.preventDefault(); });
      row.addEventListener('drop', function (e) {
        e.preventDefault();
        var from = e.dataTransfer.getData('text/plain'); if (!from || from === id) return;
        var order = detailCandidates();
        order.splice(order.indexOf(from), 1);
        var r = row.getBoundingClientRect();
        order.splice(order.indexOf(id) + (e.clientY > r.top + r.height / 2 ? 1 : 0), 0, from);
        detailLayout.order = order;
        saveDetailLayout(); renderLayoutEditor();
      });
      host.appendChild(row);
    });
    var reset = document.createElement('div'); reset.className = 'jm-editreset'; reset.textContent = 'Reset to default';
    reset.addEventListener('click', function () { detailLayout = { order: [], hidden: {} }; saveDetailLayout(); renderLayoutEditor(); });
    host.appendChild(reset);
  }
  function openLayoutEditor() {
    document.getElementById('jobModalCard').classList.add('editing');
    document.querySelector('.jm-gear').classList.add('on');
    renderLayoutEditor();
  }
  function closeLayoutEditor() {
    document.getElementById('jobModalCard').classList.remove('editing');
    document.querySelector('.jm-gear').classList.remove('on');
    if (currentDetailJob) openJobDetails(currentDetailJob);
  }

  // ---- calendar rendering ----
  function render() {
    var cal = document.getElementById('cal');
    cal.innerHTML = '';
    if (!mappingsCache) { updateRangeLabel(); return; }
    seqById = computeSeq();
    var byDay = eventsByDay();
    var today = new Date(); today.setHours(0,0,0,0);

    if (view === 'month') {
      var wrap = document.createElement('div'); wrap.id = 'monthwrap';
      var head = document.createElement('div'); head.className = 'mhead';
      DAYS.forEach(function (n) { var h = document.createElement('div'); h.textContent = n; head.appendChild(h); });
      wrap.appendChild(head);
      var first = new Date(refDate.getFullYear(), refDate.getMonth(), 1);
      var last = new Date(refDate.getFullYear(), refDate.getMonth()+1, 0);
      var cur = weekStart(first);
      while (cur <= last) {
        var row = document.createElement('div'); row.className = 'mrow';
        for (var i = 0; i < 7; i++) {
          var day = addDays(cur, i);
          var cell = document.createElement('div');
          cell.className = 'mcell' + (day.getMonth() !== refDate.getMonth() ? ' other' : '') + (sameDay(day, today) ? ' today' : '');
          var dn = document.createElement('div'); dn.className = 'dnum'; dn.textContent = day.getDate();
          cell.appendChild(dn);
          (byDay[dkey(day)] || []).forEach(function (rec) { cell.appendChild(makeCard(rec)); });
          makeDropTarget(cell, day);
          row.appendChild(cell);
        }
        wrap.appendChild(row);
        cur = addDays(cur, 7);
      }
      cal.appendChild(wrap);
    } else {
      var n = view === 'day' ? 1 : 7;
      var start = view === 'day' ? new Date(refDate) : weekStart(refDate);
      var cols = document.createElement('div'); cols.className = 'cols';
      for (var j = 0; j < n; j++) {
        var day2 = addDays(start, j);
        var isToday = sameDay(day2, today);
        var colEl = document.createElement('div'); colEl.className = 'daycol' + (isToday ? ' today' : '');
        var dh = document.createElement('div');
        dh.className = 'dayhead' + (isToday ? ' today' : '');
        dh.innerHTML = '<span class="num">' + day2.getDate() + '</span>' + DAYS[(day2.getDay()+6)%7];
        colEl.appendChild(dh);
        var body = document.createElement('div'); body.className = 'daybody';
        (byDay[dkey(day2)] || []).forEach(function (rec) { body.appendChild(makeCard(rec)); });
        makeDropTarget(body, day2);
        colEl.appendChild(body);
        cols.appendChild(colEl);
      }
      cal.appendChild(cols);
    }
    updateRangeLabel();
    renderSidebar();
    renderFilterPanel();
    renderSortMenu();
    renderViewsMenu();
    updateViewsBtn();
    // two-way highlight: bring the isolated job into view in the sidebar
    if (isolatedJobKey && isolatedJobKey !== lastScrolledKey) {
      var litItem = document.querySelector('.jobitem.lit');
      if (litItem && litItem.scrollIntoView) litItem.scrollIntoView({ block: 'nearest' });
    }
    lastScrolledKey = isolatedJobKey;
  }

  function updateRangeLabel() {
    var el = document.getElementById('rangeLabel');
    if (view === 'month') {
      el.textContent = MONTHS[refDate.getMonth()] + ' ' + refDate.getFullYear();
    } else if (view === 'day') {
      el.textContent = fmtDate(refDate);
    } else {
      var s = weekStart(refDate), e = addDays(s, 6);
      el.textContent = fmtShort(s) + ' – ' + fmtDate(e);
    }
  }

  function navigate(dir) {  // dir = -1 | 0 | 1
    if (dir === 0) { refDate = new Date(); refDate.setHours(0,0,0,0); }
    else if (view === 'month') refDate = new Date(refDate.getFullYear(), refDate.getMonth()+dir, 1);
    else refDate = addDays(refDate, dir * (view === 'day' ? 1 : 7));
    render();
  }

  // ---- column metadata + jobs table (needs full access) ----
  function loadMeta() {
    return grist.getTable().getTableId().then(function (tableId) {
      return Promise.all([
        grist.docApi.fetchTable('_grist_Tables'),
        grist.docApi.fetchTable('_grist_Tables_column')
      ]).then(function (res) {
        var tables = res[0], cols = res[1];
        var tref = tables.id[tables.tableId.indexOf(tableId)];
        var m = {};
        for (var i = 0; i < cols.id.length; i++) {
          if (cols.parentId[i] !== tref) continue;
          var co = {};
          try { co = (JSON.parse(cols.widgetOptions[i] || '{}')).choiceOptions || {}; } catch (e) {}
          m[cols.colId[i]] = { label: cols.label[i] || cols.colId[i], type: cols.type[i] || '', choiceOptions: co };
        }
        metaByColId = m;
      });
    }).catch(function (err) { console.warn('metadata read failed', err); });
  }

  function loadJobs() {
    // the groupBy column is Ref:<JobsTable>; fetch that table so ALL jobs are listed
    if (!mappingsCache || mappingsCache.groupBy == null) { jobsCache = null; return Promise.resolve(); }
    var t = colMeta(mappingsCache.groupBy).type || '';
    if (t.indexOf('Ref:') !== 0) { jobsCache = null; return Promise.resolve(); }
    var jobsTable = t.slice(4);
    return Promise.all([
      grist.docApi.fetchTable(jobsTable),
      grist.docApi.fetchTable('_grist_Tables'),
      grist.docApi.fetchTable('_grist_Tables_column')
    ]).then(function (res) {
      var data = res[0], tables = res[1], cols = res[2];
      // column metadata for the jobs table (labels/types/colours) — powers the details popup
      var tref = tables.id[tables.tableId.indexOf(jobsTable)];
      var jm = {};
      for (var c = 0; c < cols.id.length; c++) {
        if (cols.parentId[c] !== tref) continue;
        var co = {};
        try { co = (JSON.parse(cols.widgetOptions[c] || '{}')).choiceOptions || {}; } catch (e) {}
        jm[cols.colId[c]] = { label: cols.label[c] || cols.colId[c], type: cols.type[c] || '', choiceOptions: co };
      }
      jobMetaByColId = jm;
      var colIds = Object.keys(data).filter(function (k) { return k !== 'id' && k !== 'manualSort'; });
      var out = [];
      var n = (data.id || []).length;
      for (var i = 0; i < n; i++) {
        var raw = {};
        colIds.forEach(function (k) { raw[k] = data[k][i]; });   // full row for the details view
        out.push({
          id: data.id[i],
          key: 'g:' + data.id[i],
          addr: data[JOB_COLS.addr] ? String(data[JOB_COLS.addr][i] || '') : '',
          client: data[JOB_COLS.client] ? String(data[JOB_COLS.client][i] || '') : '',
          stage: data[JOB_COLS.stage] ? String(data[JOB_COLS.stage][i] || '') : '',
          assigned: data[JOB_COLS.assigned] ? listVals(data[JOB_COLS.assigned][i]) : [],
          jid: data[JOB_COLS.jid] ? String(data[JOB_COLS.jid][i] || '') : '',
          raw: raw
        });
      }
      jobsCache = out;
    }).catch(function (err) { console.warn('jobs table read failed', err); jobsCache = null; });
  }

  // ---- toolbar + sidebar controls ----
  document.getElementById('btnToday').addEventListener('click', function () { navigate(0); });
  document.getElementById('btnPrev').addEventListener('click', function () { navigate(-1); });
  document.getElementById('btnNext').addEventListener('click', function () { navigate(1); });
  document.getElementById('viewSel').addEventListener('change', function (e) {
    view = e.target.value;
    grist.setOption('view', view);
    render();
  });
  document.getElementById('jobSearch').addEventListener('input', function (e) {
    jobQuery = e.target.value;
    renderSidebar();
  });
  function closeMenus() {
    ['stageFilter', 'sortMenu', 'viewsMenu', 'filterBtn', 'sortBtn', 'viewsBtn'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove('open');
    });
  }
  document.getElementById('filterBtn').addEventListener('click', function (e) {
    e.stopPropagation();
    var willOpen = !document.getElementById('stageFilter').classList.contains('open');
    closeMenus();
    if (willOpen) {
      document.getElementById('stageFilter').classList.add('open');
      this.classList.add('open');
      filterView = null; renderFilterPanel();   // always start at the category list
    }
  });
  document.getElementById('sortBtn').addEventListener('click', function (e) {
    e.stopPropagation();
    var willOpen = !document.getElementById('sortMenu').classList.contains('open');
    closeMenus();
    if (willOpen) {
      document.getElementById('sortMenu').classList.add('open');
      this.classList.add('open');
      renderSortMenu();
    }
  });
  document.getElementById('viewsBtn').addEventListener('click', function (e) {
    e.stopPropagation();
    var willOpen = !document.getElementById('viewsMenu').classList.contains('open');
    closeMenus();
    if (willOpen) {
      document.getElementById('viewsMenu').classList.add('open');
      this.classList.add('open');
      renderViewsMenu();
    }
  });
  document.getElementById('stageFilter').addEventListener('click', function (e) { e.stopPropagation(); });
  document.getElementById('sortMenu').addEventListener('click', function (e) { e.stopPropagation(); });
  document.getElementById('viewsMenu').addEventListener('click', function (e) { e.stopPropagation(); });
  document.addEventListener('click', closeMenus);

  // ---- job details popup: close + edit controls ----
  document.querySelector('#jobModal .jm-close').addEventListener('click', closeJobModal);
  document.querySelector('#jobModal .jm-gear').addEventListener('click', function (e) {
    e.stopPropagation();
    if (document.getElementById('jobModalCard').classList.contains('editing')) closeLayoutEditor();
    else openLayoutEditor();
  });
  document.querySelector('#jobModal .jm-donebtn').addEventListener('click', function (e) { e.stopPropagation(); closeLayoutEditor(); });
  document.getElementById('jobModal').addEventListener('click', function (e) {
    if (e.target === this) closeJobModal();          // click the backdrop to close
  });
  document.getElementById('jobModalCard').addEventListener('click', function (e) { e.stopPropagation(); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeJobModal();
  });
  (function () {
    var wrap = document.getElementById('wrap');
    var btn = document.getElementById('btnJobs');
    function apply() {
      wrap.classList.toggle('collapsed', !sidebarOpen);
      btn.classList.toggle('active', sidebarOpen);
    }
    btn.classList.add('active');
    btn.addEventListener('click', function () {
      sidebarOpen = !sidebarOpen;
      grist.setOption('sidebar', sidebarOpen);
      apply();
      if (sidebarOpen) { var s = document.getElementById('jobSearch'); if (s) s.focus(); }
    });
    window._applySidebar = apply;
  })();
  document.getElementById('cal').addEventListener('click', function () {
    if (isolatedJobKey || selectedRowId) { isolatedJobKey = null; selectedRowId = null; render(); }
  });

  // ---- grist wiring ----
  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'startDate', title: 'Installation date', type: 'Date,DateTime', description: 'Day the visit is shown on' },
      { name: 'title', title: 'Title', type: 'Text', description: 'Bold text shown on the card' },
      { name: 'type', title: 'Colour by', optional: true, description: 'Choice column used for the title colour + stage filter (e.g. Stage)' },
      { name: 'details', title: 'Detail lines', optional: true, allowMultiple: true, description: 'Extra fields shown under the title' },
      { name: 'seqNote', title: 'Visit note', optional: true, description: 'Per-visit note shown in the bottom "Installation n/N: note" line' },
      { name: 'groupBy', title: 'Group by (job)', optional: true, description: 'Reference to the job — links visits together and powers the jobs sidebar' },
      { name: 'orderBy', title: 'Manual order', type: 'Numeric', optional: true, description: 'Numeric column that stores the hand-arranged order of cards within a day' }
    ],
    allowSelectBy: true
  });

  grist.onOptions(function (opts) {
    if (!opts) return;
    if (opts.view) {
      view = opts.view;
      document.getElementById('viewSel').value = view;
    }
    if (typeof opts.sidebar === 'boolean') {
      sidebarOpen = opts.sidebar;
      if (window._applySidebar) window._applySidebar();
    }
    if (opts.sort && opts.sort.key) sortBy = opts.sort;
    if (opts.detailLayout && typeof opts.detailLayout === 'object') {
      detailLayout = { order: opts.detailLayout.order || [], hidden: opts.detailLayout.hidden || {} };
    }
    if (Array.isArray(opts.savedViews)) savedViews = opts.savedViews;
    if ('activeView' in opts) activeViewName = opts.activeView || null;
    // restore the filters/sort of the saved view that was active last session — once
    if (!viewsLoaded) {
      viewsLoaded = true;
      var v = findView(activeViewName);
      if (v) { applyView(v, true); return; }
    }
    render();
  });

  function handleRecords(records, mappings) {
    var msg = document.getElementById('msg');
    if (!mappings || !mappings.startDate || !mappings.title) {
      msg.style.display = 'block';
      msg.textContent = 'Map the Installation date and Title columns in the widget panel on the right.';
      return;
    }
    msg.style.display = 'none';
    var mapChanged = !mappingsCache || JSON.stringify(mappingsCache) !== JSON.stringify(mappings);
    mappingsCache = mappings;
    recordsCache = records || [];
    var pendingRec = pendingCursor && recordsCache.find(function (r) { return r.id === pendingCursor; });
    if (pendingRec) {
      grist.setCursorPos({ rowId: pendingCursor });   // now the section knows the row
      if (isolatedJobKey) isolatedJobKey = jobKey(pendingRec);  // re-key off the real record
      pendingCursor = null;
    }
    render();
    if (mapChanged) { loadMeta().then(loadJobs).then(render); }
    else { loadJobs().then(renderSidebar); }
  }
  grist.onRecords(handleRecords);
  window._test = handleRecords;                                  // local debug hooks
  window._setMeta = function (m) { metaByColId = m; render(); };
  window._setJobs = function (j) { jobsCache = j; render(); };
  window._setJobMeta = function (m) { jobMetaByColId = m; };
  window._openJob = function (j) { openJobDetails(j); };
  window._detailLayout = function () { return detailLayout; };

  render();
})();
</script>
</body>
</html>
