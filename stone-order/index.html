<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milano - Stone Order Board</title>
<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4;
    --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --danger:#e5484d;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);
    --radius:14px;
    --colbg:#eef0f3; --card:#ffffff; --chip:#f1f3f6;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#12161b; --panel:#171c22; --ink:#e6eaef; --muted:#93a0ad;
      --line:#2a323b; --line2:#232a32; --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
      --colbg:#1b2128; --card:#20272f; --chip:#232b33; --shadow:0 1px 2px rgba(0,0,0,.4);}
  }
  :root[data-theme="light"]{ --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4; --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --colbg:#eef0f3; --card:#ffffff; --chip:#f1f3f6; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);}
  :root[data-theme="dark"]{ --bg:#12161b; --panel:#171c22; --ink:#e6eaef; --muted:#93a0ad;
    --line:#2a323b; --line2:#232a32; --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
    --colbg:#1b2128; --card:#20272f; --chip:#232b33; --shadow:0 1px 2px rgba(0,0,0,.4);}

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);overflow:hidden;
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .app{display:flex;flex-direction:column;height:100vh}

  /* ---- top bar ---- */
  .topbar{flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--line);
    padding:10px 14px;display:flex;flex-direction:column;gap:9px}
  .trow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .title{font-weight:700;font-size:15px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .title .cnt{font-weight:600;color:var(--muted);font-size:12px}
  .spacer{flex:1 1 auto}
  .search{position:relative;flex:0 1 300px;min-width:180px}
  .search input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--line);border-radius:9px;
    background:var(--bg);color:var(--ink);font-size:13px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:9px;top:8px;width:15px;height:15px;stroke:var(--muted);fill:none}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);border-radius:9px;font-size:12.5px;cursor:pointer;
    white-space:nowrap;user-select:none}
  .btn:hover{border-color:var(--accent)}
  .btn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink);font-weight:600}
  .btn .cnt{background:var(--accent);color:#fff;border-radius:20px;padding:0 6px;font-size:11px;font-weight:700}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;background:var(--panel);color:var(--muted);padding:6px 11px;font-size:12.5px;
    cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:700}
  .seg button+button{border-left:1px solid var(--line)}
  .lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}

  /* ---- summary tiles ---- */
  .tiles{display:flex;gap:9px;flex-wrap:wrap}
  .tile{flex:1 1 130px;min-width:120px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:8px 12px;cursor:pointer;transition:border-color .1s}
  .tile:hover{border-color:var(--accent)}
  .tile.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .tile .tn{font-size:11px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .tile .tn i{width:9px;height:9px;border-radius:3px;display:inline-block}
  .tile .tv{font-size:22px;font-weight:800;line-height:1.15;margin-top:2px}
  .tile .ts{font-size:11px;color:var(--muted)}

  /* ---- board ---- */
  .board{flex:1 1 auto;display:flex;gap:12px;padding:14px;overflow-x:auto;overflow-y:hidden;align-items:stretch}
  .col{flex:0 0 288px;display:flex;flex-direction:column;background:var(--colbg);border-radius:13px;
    max-height:100%;transition:flex-basis .12s ease}
  .col.drop{outline:2px dashed var(--accent);outline-offset:-2px}
  .col.collapsed{flex-basis:46px}
  .col-head{flex:0 0 auto;padding:10px 11px;display:flex;align-items:center;gap:8px;cursor:pointer;
    border-bottom:1px solid var(--line2)}
  .col.collapsed .col-head{flex-direction:column;height:100%;justify-content:flex-start;padding:10px 6px;gap:10px}
  .col-dot{width:11px;height:11px;border-radius:4px;flex:0 0 auto}
  .col-name{font-weight:700;font-size:12.5px;flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .col.collapsed .col-name{writing-mode:vertical-rl;transform:rotate(180deg);flex:1 1 auto;overflow:visible;text-overflow:clip}
  .col-cnt{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:0 7px;
    font-size:11px;font-weight:700;color:var(--muted);flex:0 0 auto}
  .col-body{flex:1 1 auto;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
  .col.collapsed .col-body{display:none}
  .col-body::-webkit-scrollbar{width:8px}
  .col-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .col-empty{color:var(--muted);font-size:11.5px;text-align:center;padding:14px 6px;opacity:.7}

  /* ---- supplier sub-group ---- */
  .subhead{display:flex;align-items:center;gap:7px;padding:4px 6px;margin:2px 0 -2px;cursor:pointer;
    font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .subhead .chev{transition:transform .12s;font-size:9px}
  .subhead.collapsed .chev{transform:rotate(-90deg)}
  .subhead .sc{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:0 6px;font-size:10px}
  .subhead .sq{margin-left:auto;font-weight:600;opacity:.85}

  /* ---- card ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 10px;
    box-shadow:var(--shadow);cursor:grab;display:flex;flex-direction:column;gap:7px}
  .card:active{cursor:grabbing}
  .card.dragging{opacity:.4}
  .card .crow{display:flex;align-items:center;gap:6px}
  .card .prod{font-weight:600;font-size:12.5px;line-height:1.3;word-break:break-word}
  .card .prod .pencil{opacity:0;cursor:pointer;margin-left:4px;color:var(--muted)}
  .card:hover .prod .pencil{opacity:.7}
  .sup{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--chip);border-radius:6px;
    padding:1px 6px;white-space:nowrap}
  .jobline{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer}
  .jobline:hover{color:var(--ink)}
  .jobchip{font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:6px;padding:1px 6px;flex:0 0 auto}
  .jobline .jaddr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qtys{display:flex;gap:5px}
  .qty{flex:1 1 0;background:var(--chip);border-radius:8px;padding:3px 5px;text-align:center;min-width:0}
  .qty .ql{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;display:block}
  .qty input{width:100%;border:0;background:transparent;color:var(--ink);text-align:center;font-size:13px;
    font-weight:700;font-family:inherit;outline:none;padding:1px 0;-moz-appearance:textfield}
  .qty input::-webkit-outer-spin-button,.qty input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .qty.short input{color:var(--danger)}
  .dates{display:flex;flex-direction:column;gap:2px}
  .dl{font-size:11px;color:var(--muted);cursor:pointer;display:flex;gap:5px;align-items:center}
  .dl:hover{color:var(--ink)}
  .dl b{color:var(--ink);font-weight:600}
  .dl input[type=date]{border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink);
    font-size:11px;padding:1px 4px;font-family:inherit}
  .inv{font-size:11px}
  .inv input{border:1px dashed transparent;border-radius:6px;background:transparent;color:var(--ink);
    font-size:11px;padding:1px 4px;font-family:inherit;width:100%;outline:none}
  .inv input:hover{border-color:var(--line)}
  .inv input:focus{border-style:solid;border-color:var(--accent);background:var(--bg)}
  .cnote{width:100%;border:1px dashed transparent;border-radius:7px;background:transparent;color:var(--ink);
    font:11px/1.35 inherit;padding:3px 5px;resize:vertical;min-height:22px;outline:none}
  .cnote:hover{border-color:var(--line)}
  .cnote:focus{border-style:solid;border-color:var(--accent);background:var(--bg)}
  .cnote::placeholder{color:var(--muted);opacity:.6}

  /* ---- pills ---- */
  .pill{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 9px;font-size:11px;
    font-weight:700;color:#141414;white-space:nowrap;line-height:1.5}
  .pill.xs{font-size:10px;padding:1px 7px}
  .pill-select{cursor:pointer}
  .pcaret{font-size:8px;opacity:.65}

  /* ---- popovers ---- */
  .pop{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    box-shadow:0 10px 30px rgba(0,0,0,.22);padding:5px;min-width:200px;max-height:60vh;overflow:auto}
  .cprow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px;cursor:pointer}
  .cprow:hover{background:var(--line2)}
  .cprow .rtick{margin-left:auto;color:var(--accent-ink);font-weight:800}
  .pp-search input{width:100%;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg);
    color:var(--ink);font-size:12.5px;outline:none;font-family:inherit}
  .pp-list{margin-top:5px;max-height:44vh;overflow:auto}
  .pp-row{padding:6px 8px;border-radius:7px;cursor:pointer;font-size:12px}
  .pp-row:hover,.pp-row.on{background:var(--line2)}
  .pp-empty{padding:8px;color:var(--muted);font-size:12px;text-align:center}
  .chk{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;cursor:pointer;font-size:12.5px}
  .chk:hover{background:var(--line2)}
  .chk input{accent-color:var(--accent)}
  .pop .paction{border-top:1px solid var(--line2);margin-top:5px;padding-top:5px;display:flex;gap:6px}
  .pop .paction button{flex:1;font-size:11.5px;padding:5px}

  .empty-board{margin:auto;color:var(--muted);text-align:center;padding:40px}
  .demo-tag{position:fixed;bottom:8px;right:10px;font-size:10px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:2px 9px;opacity:.75;z-index:40}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="trow">
      <div class="title">Stone Orders <span class="cnt" id="lineCnt"></span></div>
      <div class="spacer"></div>
      <div class="search">
        <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search product, code, supplier, job, INV…" autocomplete="off">
      </div>
      <button class="btn" id="supBtn">Supplier <span class="cnt" id="supCnt" hidden>0</span></button>
      <div class="seg" title="Sub-group cards inside each column">
        <button id="grpNone" class="on">Flat</button>
        <button id="grpSup">By supplier</button>
      </div>
      <button class="btn" id="doneBtn" title="Show / hide completed columns">Hide done</button>
    </div>
    <div class="tiles" id="tiles"></div>
  </div>
  <div class="board" id="board"></div>
</div>

<div class="pop" id="statusPop" hidden></div>
<div class="pop" id="supPop" hidden></div>
<div class="pop" id="prodPop" hidden></div>
<div class="demo-tag" id="demoTag" hidden>demo data</div>

<script>
"use strict";
// ============================================================
//  Milano - Stone Order Board (Kanban by Order_Status)
//  Single-file Grist custom widget. Reads the whole Stone_Order
//  table across all jobs; cards editable in place + drag between
//  columns to change status. Complements the per-job Inbox widget.
// ============================================================

// ---- status model (exact strings + colours must match Grist for round-tripping) ----
const UNSET="";                            // blank Order_Status = "to sort"
const STATUS_ORDER=[
  UNSET,
  "1. No Stock",
  "3. Awaiting Order",
  "2.  Placed Order",                      // NB: two spaces after "2." - the real choice value
  "7. Not Delivered Yet",
  "4. Awaiting Pickup",
  "5. On hold",
  "6. Delivered",
  "Delivered by WF/Aboda/Client",
  "Return",
  "Cancelled",
  "N/A"
];
const STATUS_LABEL={ [UNSET]:"To sort" };  // display label overrides (Grist value → shown text)
const STATUS_COLORS={
  [UNSET]:"#e3e7ec",
  "1. No Stock":"#FD8182",
  "3. Awaiting Order":"#FED6FB",
  "2.  Placed Order":"#FEF47A",
  "4. Awaiting Pickup":"#75B5FC",
  "5. On hold":"#FEE7C3",
  "6. Delivered":"#98FD90",
  "7. Not Delivered Yet":"#CCFEFE",
  "Delivered by WF/Aboda/Client":"#E1FEDE",
  "Return":"#CCFEFE",
  "Cancelled":"#DCDCDC",
  "N/A":"#DCDCDC"
};
// statuses the auto-rule must never overwrite (manual intent)
const STATUS_MANUAL=["Delivered by WF/Aboda/Client","5. On hold","Cancelled","N/A","Return"];
// "completed / closed" columns (Hide-done toggle collapses these)
const STATUS_DONE=["6. Delivered","Delivered by WF/Aboda/Client","Cancelled","N/A","Return"];
// summary tiles - each is a group of statuses
const TILES=[
  { key:"toorder",  name:"Needs ordering", color:"#FED6FB", set:[UNSET,"1. No Stock","3. Awaiting Order"] },
  { key:"onorder",  name:"On order",       color:"#FEF47A", set:["2.  Placed Order","7. Not Delivered Yet"] },
  { key:"pickup",   name:"Awaiting pickup",color:"#75B5FC", set:["4. Awaiting Pickup"] },
  { key:"delivered",name:"Delivered",      color:"#98FD90", set:["6. Delivered","Delivered by WF/Aboda/Client"] }
];
const statusLabel=s=>STATUS_LABEL[s]!=null?STATUS_LABEL[s]:s;
const statusColor=s=>STATUS_COLORS[s]||"#e3e7ec";

const SPECIAL_COL=/^(manualSort|gristHelper_|id$)/;

// ---- generic helpers (mirror the inbox widget for Grist correctness) ----
const $=(t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
function refId(v){ if(v==null)return null; if(typeof v==="number")return v;
  if(Array.isArray(v))return v[2]; if(typeof v==="object")return v.rowId!=null?v.rowId:v.id; return v; }
function toDate(v){ if(v==null||v==="")return null;
  if(typeof v==="number")return new Date(v*1000);
  if(v instanceof Date)return v;
  const d=new Date(v); return isNaN(d)?null:d; }
function fmtDMY(v){ const d=toDate(v); if(!d)return "";
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function dateInput(v){ const d=toDate(v); if(!d)return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function toEpochSec(str){ if(!str)return null; const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/1000); }
const num=v=>{ const n=Number(v); return isFinite(n)?n:0; };

// ---- state / persistence ----
const LSKEY="milano_stoneorder_prefs_v1";
const state={
  stone:[], jobs:[], catalogue:[], grist:false,
  ref:{ product:null },
  q:"", supFilter:{}, subgroup:"none", tile:null, showDone:true,
  colCollapsed:{}, subCollapsed:{},
  jobById:{}, catById:{}
};
window._stoneboard=state;
function loadPrefs(){ try{ return JSON.parse(localStorage.getItem(LSKEY))||{}; }catch(e){ return {}; } }
function savePrefs(){ try{ localStorage.setItem(LSKEY, JSON.stringify({
  subgroup:state.subgroup, showDone:state.showDone,
  colCollapsed:state.colCollapsed, subCollapsed:state.subCollapsed })); }catch(e){} }

// ---- lookups ----
function reindex(){
  state.jobById={}; state.jobs.forEach(j=>state.jobById[j.id]=j);
  state.catById={}; state.catalogue.forEach(c=>state.catById[c.id]=c);
}
function jobFor(r){ return state.jobById[refId(r.Job)]||null; }
function catFor(r){ return state.catById[refId(r.Product)]||null; }
function productLabel(r){
  const c=catFor(r);
  if(c&&c.Product_Full) return c.Product_Full;
  const code=r.Product_Code||(c&&c.Code)||"";
  return code || ("Product #"+(refId(r.Product)||"?"));
}
function catLabel(c){ return c.Product_Full || [c.Supplier,c.Code].filter(Boolean).join(" | ") || ("#"+c.id); }
function supplierFor(r){ const c=catFor(r); return r.Product_Supplier || (c&&c.Supplier) || ""; }
function jobTitle(j){ if(!j)return "-";
  return (j.Client_Label||"").trim() || (j.Job_Address||"").trim() || j.Job_ID || ("#"+j.id); }
function jobAddr(j){ return j ? ((j.Address_Formatted||j.Job_Address||"").trim()) : ""; }

// ---- write-back (guarded: demo mutates local state, live writes to Grist) ----
function update(rowId,fields){
  if(!state.grist){ const r=state.stone.find(x=>x.id===rowId); if(r)Object.assign(r,fields); render(); return; }
  grist.docApi.applyUserActions([["UpdateRecord","Stone_Order",rowId,fields]]).then(refetch);
}
// Apply an edit then run the auto-status rule (mirrors the inbox rule, §5 brief).
function autoStatus(r){
  if(STATUS_MANUAL.includes(r.Order_Status)) return null;
  if(toDate(r.Delivery_Date) && num(r.Delivery_Qty)>0) return "6. Delivered";
  if(toDate(r.Order_Date) && num(r.Ordered_Qty)>0) return "2.  Placed Order";
  return null;
}
function updateAuto(r,fields){
  Object.assign(r,fields);                        // optimistic so the rule sees new values
  const auto=autoStatus(r);
  if(auto && auto!==r.Order_Status){ r.Order_Status=auto; fields.Order_Status=auto; }
  update(r.id,fields);
}
function setProduct(r,cat){
  const R=state.ref.product;
  if(!state.grist){                                // mirror read-only formula cols so the card updates now
    r.Product_Code=cat.Code; r.Product_Supplier=cat.Supplier; if(cat.Price_Slab!=null)r.Product_Price_slab=cat.Price_Slab;
  }
  r.Product=cat.id;
  update(r.id,{Product:cat.id});
}

// ---- pill + choice picker ----
function statusPill(r){
  const s=r.Order_Status||UNSET;
  const trig=$("span","pill pill-select xs"); trig.style.background=statusColor(s);
  trig.appendChild(document.createTextNode(statusLabel(s)));
  trig.appendChild($("span","pcaret","▾"));
  trig.onclick=e=>{ e.stopPropagation();
    openPicker("statusPop",trig,STATUS_ORDER.map(v=>({v,label:statusLabel(v),color:statusColor(v)})),s,val=>{
      update(r.id,{Order_Status:val});             // manual set - do NOT run auto-rule
    });
  };
  trig.draggable=false;
  return trig;
}
function openPicker(popId,anchor,options,current,onpick){
  const m=document.getElementById(popId); m.className="pop"; m.innerHTML="";
  options.forEach(o=>{
    const row=$("div","cprow"+(o.v===current?" on":""));
    const p=$("span","pill",o.label); p.style.background=o.color||"#e9edf1"; row.appendChild(p);
    if(o.v===current) row.appendChild($("span","rtick","✓"));
    row.onmousedown=e=>{ e.preventDefault(); closePops(); onpick(o.v); };
    m.appendChild(row);
  });
  closePops(); m.hidden=false; positionPop(m,anchor,210);
}
function positionPop(el,anchor,w){
  const rc=anchor.getBoundingClientRect();
  el.style.left=Math.max(8,Math.min(rc.left,window.innerWidth-(w||220)-12))+"px";
  const below=rc.bottom+6, h=el.offsetHeight||260;
  el.style.top=(below+h>window.innerHeight-8 ? Math.max(8,rc.top-h-6) : below)+"px";
  el.style.right="auto";
}
function closePops(){ ["statusPop","supPop","prodPop"].forEach(id=>{const e=document.getElementById(id); if(e)e.hidden=true;}); }

// ---- product picker ----
function openProductPicker(r,anchor){
  const m=document.getElementById("prodPop"); m.className="pop"; m.innerHTML="";
  const sw=$("div","pp-search"); const si=document.createElement("input"); si.type="text"; si.placeholder="Search products…"; si.autocomplete="off";
  sw.appendChild(si); m.appendChild(sw);
  const list=$("div","pp-list"); m.appendChild(list);
  const curId=refId(r.Product);
  function draw(q){
    list.innerHTML=""; const ql=(q||"").trim().toLowerCase();
    const rows=(state.catalogue||[]).filter(c=>{ if(!ql)return true; return catLabel(c).toLowerCase().includes(ql); });
    if(!rows.length){ list.appendChild($("div","pp-empty","No matching products.")); return; }
    rows.slice(0,80).forEach(c=>{
      const row=$("div","pp-row"+(c.id===curId?" on":""),catLabel(c));
      row.onmousedown=e=>{ e.preventDefault(); closePops(); setProduct(r,c); };
      list.appendChild(row);
    });
  }
  draw(""); si.oninput=()=>draw(si.value);
  closePops(); m.hidden=false; positionPop(m,anchor,320); setTimeout(()=>si.focus(),0);
}

// ---- supplier filter dropdown ----
function openSupplierFilter(){
  const m=document.getElementById("supPop"); m.className="pop"; m.innerHTML="";
  const sw=$("div","pp-search"); const si=document.createElement("input"); si.type="text"; si.placeholder="Filter suppliers…"; si.autocomplete="off";
  sw.appendChild(si); m.appendChild(sw);
  const list=$("div","pp-list"); m.appendChild(list);
  const sups=[...new Set(state.stone.map(supplierFor).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  function draw(q){
    list.innerHTML=""; const ql=(q||"").trim().toLowerCase();
    sups.filter(s=>!ql||s.toLowerCase().includes(ql)).forEach(s=>{
      const row=$("label","chk");
      const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!state.supFilter[s];
      cb.onchange=()=>{ if(cb.checked)state.supFilter[s]=true; else delete state.supFilter[s]; syncSupCnt(); render(); };
      row.appendChild(cb); row.appendChild(document.createTextNode(s)); list.appendChild(row);
    });
    if(!sups.length) list.appendChild($("div","pp-empty","No suppliers."));
  }
  draw(""); si.oninput=()=>draw(si.value);
  const act=$("div","paction");
  const clr=$("button",null,"Clear"); clr.className="btn"; clr.onclick=()=>{ state.supFilter={}; syncSupCnt(); draw(si.value); render(); };
  act.appendChild(clr); m.appendChild(act);
  closePops(); m.hidden=false; positionPop(m,document.getElementById("supBtn"),240); setTimeout(()=>si.focus(),0);
}
function syncSupCnt(){ const n=Object.keys(state.supFilter).length; const c=document.getElementById("supCnt");
  c.textContent=n; c.hidden=n===0; document.getElementById("supBtn").classList.toggle("on",n>0); }

// ============================================================
//  FILTER + RENDER
// ============================================================
function matchesSearch(r){
  const q=state.q.trim().toLowerCase(); if(!q)return true;
  const j=jobFor(r);
  const hay=[productLabel(r), r.Product_Code, supplierFor(r), r.INV, r.Note,
    j&&j.Job_ID, j&&j.Client_Label, j&&j.Job_Address, j&&j.Address_Formatted]
    .filter(Boolean).join(" ").toLowerCase();
  return hay.includes(q);
}
function visibleLines(){
  const supKeys=Object.keys(state.supFilter);
  return state.stone.filter(r=>{
    if(supKeys.length && !state.supFilter[supplierFor(r)]) return false;
    if(state.tile){ const t=TILES.find(x=>x.key===state.tile); if(t && !t.set.includes(r.Order_Status||UNSET)) return false; }
    return matchesSearch(r);
  });
}

function render(){
  reindex();
  const lines=visibleLines();
  document.getElementById("lineCnt").textContent=lines.length+" line"+(lines.length===1?"":"s");
  document.getElementById("demoTag").hidden=state.grist;
  renderTiles();
  renderBoard(lines);
}

function renderTiles(){
  const wrap=document.getElementById("tiles"); wrap.innerHTML="";
  const all=state.stone;   // tiles reflect the whole board (not the tile filter), but honour supplier+search
  const supKeys=Object.keys(state.supFilter);
  const base=all.filter(r=>{
    if(supKeys.length && !state.supFilter[supplierFor(r)]) return false;
    return matchesSearch(r);
  });
  TILES.forEach(t=>{
    const rows=base.filter(r=>t.set.includes(r.Order_Status||UNSET));
    const slabs=rows.reduce((s,r)=>s+num(r.Scope_Qty||r.Ordered_Qty),0);
    const el=$("div","tile"+(state.tile===t.key?" on":""));
    const nm=$("div","tn"); const dot=$("i"); dot.style.background=t.color; nm.appendChild(dot); nm.appendChild(document.createTextNode(t.name)); el.appendChild(nm);
    el.appendChild($("div","tv",String(rows.length)));
    el.appendChild($("div","ts",slabs?(slabs+" slabs"):"-"));
    el.onclick=()=>{ state.tile=(state.tile===t.key?null:t.key); render(); };
    wrap.appendChild(el);
  });
}

function renderBoard(lines){
  const board=document.getElementById("board"); board.innerHTML="";
  const byStatus={}; STATUS_ORDER.forEach(s=>byStatus[s]=[]);
  lines.forEach(r=>{ const s=r.Order_Status||UNSET; (byStatus[s]=byStatus[s]||[]).push(r); });
  // include any unexpected status values as extra columns so nothing is hidden
  const extra=Object.keys(byStatus).filter(s=>!STATUS_ORDER.includes(s));
  const cols=STATUS_ORDER.concat(extra);

  let shown=0;
  cols.forEach(s=>{
    const isDone=STATUS_DONE.includes(s);
    if(!state.showDone && isDone && byStatus[s].length===0) return;    // hide empty done cols when toggled
    shown++;
    board.appendChild(buildColumn(s,byStatus[s]||[]));
  });
  if(!lines.length){
    const e=$("div","empty-board"); e.textContent="No stone lines match the current filters.";
    board.appendChild(e);
  }
}

function buildColumn(status,rows){
  const collapsed=!!state.colCollapsed[status];
  const col=$("div","col"+(collapsed?" collapsed":""));
  col.dataset.status=status;

  const head=$("div","col-head");
  const dot=$("span","col-dot"); dot.style.background=statusColor(status); head.appendChild(dot);
  head.appendChild($("span","col-name",statusLabel(status)));
  head.appendChild($("span","col-cnt",String(rows.length)));
  head.onclick=()=>{ state.colCollapsed[status]=!collapsed; savePrefs(); render(); };
  col.appendChild(head);

  const body=$("div","col-body");
  if(!rows.length){ body.appendChild($("div","col-empty","-")); }
  else if(state.subgroup==="supplier"){
    const groups={}; rows.forEach(r=>{ const k=supplierFor(r)||"(no supplier)"; (groups[k]=groups[k]||[]).push(r); });
    Object.keys(groups).sort((a,b)=>a.localeCompare(b)).forEach(sup=>{
      const key=status+"|"+sup, sc=!!state.subCollapsed[key];
      const sh=$("div","subhead"+(sc?" collapsed":""));
      sh.appendChild($("span","chev","▼"));
      sh.appendChild(document.createTextNode(sup));
      sh.appendChild($("span","sc",String(groups[sup].length)));
      const slabs=groups[sup].reduce((s,r)=>s+num(r.Scope_Qty||r.Ordered_Qty),0);
      if(slabs) sh.appendChild($("span","sq",slabs+" slabs"));
      sh.onclick=()=>{ state.subCollapsed[key]=!sc; savePrefs(); render(); };
      body.appendChild(sh);
      if(!sc) groups[sup].forEach(r=>body.appendChild(buildCard(r)));
    });
  } else {
    rows.forEach(r=>body.appendChild(buildCard(r)));
  }
  col.appendChild(body);

  // drag-drop target
  col.addEventListener("dragover",e=>{ e.preventDefault(); col.classList.add("drop"); });
  col.addEventListener("dragleave",e=>{ if(!col.contains(e.relatedTarget)) col.classList.remove("drop"); });
  col.addEventListener("drop",e=>{
    e.preventDefault(); col.classList.remove("drop");
    const id=Number(e.dataTransfer.getData("text/plain"));
    const r=state.stone.find(x=>x.id===id);
    if(r && (r.Order_Status||UNSET)!==status) update(r.id,{Order_Status:status});
  });
  return col;
}

function buildCard(r){
  const j=jobFor(r);
  const card=$("div","card"); card.draggable=true;
  card.addEventListener("dragstart",e=>{ e.dataTransfer.setData("text/plain",String(r.id));
    e.dataTransfer.effectAllowed="move"; card.classList.add("dragging"); closePops(); });
  card.addEventListener("dragend",()=>card.classList.remove("dragging"));

  // row 1: supplier tag + status pill
  const top=$("div","crow");
  const sup=supplierFor(r); if(sup) top.appendChild($("span","sup",sup));
  const sp=$("span"); sp.style.marginLeft="auto"; sp.appendChild(statusPill(r)); top.appendChild(sp);
  card.appendChild(top);

  // product name (double-click = change product)
  const prod=$("div","prod"); prod.appendChild(document.createTextNode(productLabel(r)));
  const pen=$("span","pencil","✎"); pen.title="Change product";
  pen.onclick=e=>{ e.stopPropagation(); openProductPicker(r,pen); };
  prod.appendChild(pen);
  prod.ondblclick=e=>{ e.stopPropagation(); openProductPicker(r,prod); };
  card.appendChild(prod);

  // job context
  if(j){
    const jl=$("div","jobline");
    jl.appendChild($("span","jobchip",j.Job_ID||("#"+j.id)));
    const t=$("span","jaddr",jobTitle(j)+(jobAddr(j)?" · "+jobAddr(j):"")); jl.appendChild(t);
    jl.title=jobTitle(j)+(jobAddr(j)?"\n"+jobAddr(j):"");
    jl.onclick=()=>selectJob(j);
    card.appendChild(jl);
  }

  // qtys: Scope / Ordered / Delivered
  const qtys=$("div","qtys");
  qtys.appendChild(qtyBox(r,"Scope_Qty","Scope",false));
  qtys.appendChild(qtyBox(r,"Ordered_Qty","Ord",true,r=>num(r.Ordered_Qty)<num(r.Scope_Qty)));
  qtys.appendChild(qtyBox(r,"Delivery_Qty","Deliv",true,r=>num(r.Delivery_Qty)<num(r.Ordered_Qty)));
  card.appendChild(qtys);

  // dates
  const dates=$("div","dates");
  dates.appendChild(dateLine(r,"Order_Date","Ordered"));
  dates.appendChild(dateLine(r,"Delivery_Date","Delivered"));
  card.appendChild(dates);

  // INV
  const inv=$("div","inv"); const ii=document.createElement("input");
  ii.type="text"; ii.placeholder="INV #"; ii.value=r.INV||""; ii.draggable=false;
  ii.onmousedown=e=>e.stopPropagation();
  ii.onchange=()=>update(r.id,{INV:ii.value});
  inv.appendChild(ii); card.appendChild(inv);

  // note
  const nt=document.createElement("textarea"); nt.className="cnote"; nt.placeholder="Note…"; nt.rows=1;
  nt.value=r.Note||""; nt.draggable=false; nt.onmousedown=e=>e.stopPropagation();
  nt.onchange=()=>update(r.id,{Note:nt.value});
  card.appendChild(nt);

  return card;
}

function qtyBox(r,col,label,auto,shortFn){
  const box=$("div","qty"+(shortFn&&shortFn(r)?" short":""));
  box.appendChild($("span","ql",label));
  const i=document.createElement("input"); i.type="number"; i.value=(r[col]!=null?r[col]:""); i.draggable=false;
  i.onmousedown=e=>e.stopPropagation();
  i.onchange=()=>{ const v=i.value===""?null:Number(i.value); auto?updateAuto(r,{[col]:v}):update(r.id,{[col]:v}); };
  box.appendChild(i);
  return box;
}
function dateLine(r,col,verb){
  const dl=$("div","dl");
  const set=toDate(r[col]);
  dl.appendChild(document.createTextNode(verb+" "));
  const b=$("b",null,set?fmtDMY(r[col]):"- set"); dl.appendChild(b);
  dl.onmousedown=e=>e.stopPropagation();
  dl.onclick=()=>{
    const di=document.createElement("input"); di.type="date"; di.value=dateInput(r[col]);
    di.onmousedown=e=>e.stopPropagation();
    di.onchange=()=>updateAuto(r,{[col]:toEpochSec(di.value)});
    di.onblur=()=>render();
    dl.innerHTML=verb+" "; dl.appendChild(di); di.focus(); if(di.showPicker){ try{di.showPicker();}catch(e){} }
  };
  return dl;
}
// Optional: drive the Grist cursor to the card's job (nice when a linked view is present).
function selectJob(j){
  if(!state.grist||!j)return;

// ============================================================
//  SCHEMA INTROSPECTION (resolve Product ref target without hardcoding)
// ============================================================
function columnarToRows(t){ if(!t||!t.id)return []; return t.id.map((id,i)=>{const o={id}; for(const k in t)if(k!=="id")o[k]=t[k][i]; return o;}); }
async function loadGristSchema(){
  const [T,C]=await Promise.all([
    grist.docApi.fetchTable("_grist_Tables"),
    grist.docApi.fetchTable("_grist_Tables_column")]);
  const tables=columnarToRows(T), cols=columnarToRows(C);
  const tableById={}; tables.forEach(t=>tableById[t.tableId]=t);
  const colByRowId={}; cols.forEach(c=>colByRowId[c.id]=c);
  const colsOf=tid=>{ const t=tableById[tid]; return t?cols.filter(c=>c.parentId===t.id):[]; };
  const isEditable=c=>!c.isFormula && c.colId && !SPECIAL_COL.test(c.colId);
  const bestLabelCol=tid=>{ const cs=colsOf(tid).filter(isEditable);
    return ((cs.find(c=>/full|name|title|label|desc/i.test(c.colId))||cs.find(c=>(c.type||"").startsWith("Text"))||cs[0]||{}).colId)||null; };
  function refInfo(parentTableId,colId){
    const col=colsOf(parentTableId).find(c=>c.colId===colId); if(!col)return null;
    const m=/^Ref(?:List)?:(.+)$/.exec(col.type||""); if(!m)return null;
    const targetTableId=m[1], vis=col.visibleCol&&colByRowId[col.visibleCol];
    return { colId, targetTableId, labelCol:(vis&&vis.colId)||bestLabelCol(targetTableId) };
  }
  return { refInfo };
}

//  DATA (live)
// ============================================================
async function pullTables(){
  const [so,jd]=await Promise.all([
    grist.docApi.fetchTable("Stone_Order"),
    grist.docApi.fetchTable("Jobs_Detail")]);
  state.stone=columnarToRows(so); state.jobs=columnarToRows(jd);
  if(state.ref.product){
    try{ const cat=await grist.docApi.fetchTable(state.ref.product.targetTableId); state.catalogue=columnarToRows(cat); }catch(e){}
  }
  reindex();
}
async function refetch(){ if(!state.grist)return; try{ await pullTables(); }catch(e){ console.warn("fetch failed",e); } render(); }

// ============================================================
//  GRIST WIRING - sample first, flip to live only once Grist answers
// ============================================================
function goLive(){ if(!state.grist) state.grist=true; }
if(typeof grist!=="undefined"){
  try{ grist.ready({ requiredAccess:"full" }); }catch(e){}
  try{ grist.onRecord(()=>{}); }catch(e){}   // keep the widget mappable to Stone_Order without erroring
  grist.docApi.fetchTable("Stone_Order").then(async ()=>{
    try{
      const sc=await loadGristSchema();
      state.ref.product=sc.refInfo("Stone_Order","Product");
    }catch(e){ state.ref.product=null; console.warn("schema introspection failed - product picker limited",e); }
    try{ await pullTables(); }catch(e){ console.warn("initial fetch failed",e); }
    goLive(); render();
  }).catch(()=>{});
}
