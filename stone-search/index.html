<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milano - Catalogue Search</title>
<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4;
    --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --danger:#e5484d;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
      --line:#2a323b; --line2:#232a32;
      --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
      --shadow:0 1px 2px rgba(0,0,0,.4);}
  }
  :root[data-theme="light"]{ --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4; --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);}
  :root[data-theme="dark"]{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
    --line:#2a323b; --line2:#232a32; --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
    --shadow:0 1px 2px rgba(0,0,0,.4);}

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{height:100%;display:flex;gap:8px;padding:14px}

  /* ---------- catalogue search (left) ---------- */
  .search-pane{flex:0 0 372px;display:flex;flex-direction:column;min-height:0;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  .search-head{padding:12px 14px 10px;display:flex;flex-direction:column;gap:9px;border-bottom:1px solid var(--line2)}
  .search-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .search-title .count{background:var(--line2);color:var(--muted);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
  .search{position:relative}
  .search input{width:100%;font:inherit;font-size:13px;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:9px 30px 9px 32px}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .search .sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    stroke:var(--muted);fill:none}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--muted);
    cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:6px}
  .search .clr:hover{background:var(--line2);color:var(--ink)}

  .results{flex:1 1 auto;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
  .results::-webkit-scrollbar{width:9px}
  .results::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .res-empty{color:var(--muted);text-align:center;padding:34px 14px;font-size:12.5px}

  .ccard{border:1px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer;
    background:var(--panel);display:flex;flex-direction:column;gap:6px;transition:border-color .1s,box-shadow .1s}
  .ccard:hover{border-color:var(--accent)}
  .ccard.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),var(--shadow);background:var(--accent-soft)}
  .ccard .ctop{display:flex;align-items:center;gap:7px}
  .ccard .csup{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--line2);border-radius:6px;
    padding:1px 6px;white-space:nowrap}
  .ccard .cspacer{flex:1 1 auto}
  .ccard .cprice{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ccard .cname{font-weight:600;font-size:13px;line-height:1.3;word-break:break-word}
  .ccard .cmeta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .ccard .ccode{font-variant-numeric:tabular-nums}
  .ccard .cbadge{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);
    border-radius:999px;padding:1px 8px}
  .ccard .cbadge.zero{color:var(--muted);background:var(--line2)}

  /* ---------- splitter ---------- */
  .splitter{flex:0 0 7px;cursor:col-resize;align-self:stretch;position:relative}
  .splitter::after{content:"";position:absolute;left:2px;right:2px;top:0;bottom:0;border-radius:3px;background:var(--line)}
  .splitter:hover::after,.splitter.drag::after{background:var(--accent)}

  /* ---------- history (right) ---------- */
  .detail-pane{flex:1 1 auto;min-width:0;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .detail-empty{flex:1 1 auto;display:flex;align-items:center;justify-content:center;color:var(--muted);
    text-align:center;font-size:13px;padding:40px;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

  /* three separate panels: profile · active orders · monthly history */
  .section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:15px 17px}
  .section-h{display:flex;align-items:baseline;gap:9px;margin-bottom:11px}
  .section-h .st{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .section-h .sc{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:999px;padding:1px 8px}
  .section-h .ssub{font-size:11.5px;color:var(--muted)}
  .view-sub{font-size:11.5px;color:var(--muted);margin:-2px 0 8px 2px}
  .hro{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);padding:3px 2px;text-align:right}

  .prod-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .prof-life{margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .prof-life .lb b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .prod-title{flex:1 1 auto;min-width:0}
  .prod-name{font-size:21px;font-weight:700;line-height:1.25;word-break:break-word}
  .prod-sub{margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
  .prod-sub .psup{font-weight:700;background:var(--line2);border-radius:7px;padding:2px 8px;color:var(--ink)}
  .prod-price{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .prod-price small{font-size:11px;font-weight:600;color:var(--muted);display:block;text-align:right;letter-spacing:.03em;text-transform:uppercase}

  /* ---------- month picker pills ---------- */
  .mrow{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 6px}
  .mpill{font:inherit;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer;
    white-space:nowrap}
  .mpill:hover{border-color:var(--accent)}
  .mpill.empty{color:var(--muted)}
  .mpill.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .mpill .mp-n{font-size:10.5px;font-weight:700;background:var(--line2);color:var(--muted);border-radius:999px;padding:0 6px;line-height:16px}
  .mpill.on .mp-n{background:rgba(255,255,255,.28);color:#fff}

  .hist-stats{display:flex;gap:9px;flex-wrap:wrap;margin:14px 0 6px}
  .stat{flex:1 1 120px;min-width:110px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:8px 12px}
  .stat .sv{font-size:20px;font-weight:800;line-height:1.15;font-variant-numeric:tabular-nums}
  .stat .sl{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}

  /* ---------- histogram (stacked bars: ordered slabs per month) ---------- */
  .hist-chart{margin-top:18px}
  .chart-h{display:flex;align-items:baseline;gap:9px;margin-bottom:12px}
  .chart-h .st{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .chart-h .ssub{font-size:11.5px;color:var(--muted)}
  .chart-scroll{overflow-x:auto;padding-bottom:2px}
  .chart{display:flex;align-items:flex-end;gap:12px;min-height:152px;padding:2px}
  .chart.daily{gap:4px}
  .chart.daily .bar{width:15px;border-radius:4px 4px 0 0}
  .chart.daily .bar-v{font-size:9px}
  .chart.daily .bar-x{font-size:9px}
  .bar-col.zero{cursor:default}
  .bar-col.zero .bar-x{opacity:.45}
  .bar-col{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:0 0 auto}
  .bar-col .bar-v{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
  .bar{width:30px;min-height:2px;display:flex;flex-direction:column;justify-content:flex-end;
    border-radius:6px 6px 0 0;overflow:hidden;background:var(--line2)}
  .bar .seg{width:100%}
  .bar .seg.cur{background:var(--accent)}
  .bar .seg.other{background:#c3ccd6}
  .bar-col:hover .bar{filter:brightness(1.05)}
  .bar-col .bar-x{font-size:10.5px;color:var(--muted);white-space:nowrap}
  .bar-col.sel .bar-x{color:var(--accent-ink);font-weight:700}
  .bar-col.sel .bar{outline:2px solid var(--accent-ink);outline-offset:1px}
  .chart-legend{display:flex;gap:16px;margin-top:11px}
  .chart-legend .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
  .chart-legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block;flex:0 0 auto}
  .chart-legend .sw.cur{background:var(--accent)}
  .chart-legend .sw.other{background:#c3ccd6}
  @media (prefers-color-scheme:dark){ .bar .seg.other,.chart-legend .sw.other{background:#3a434d} }
  :root[data-theme="dark"] .bar .seg.other,:root[data-theme="dark"] .chart-legend .sw.other{background:#3a434d}
  :root[data-theme="light"] .bar .seg.other,:root[data-theme="light"] .chart-legend .sw.other{background:#c3ccd6}

  .hist-h{margin:18px 0 8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .htbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .htbl{min-width:900px}
  /* one shared column grid keeps the header, month bars and every order row aligned */
  .hgridrow{display:grid;
    grid-template-columns:minmax(180px,1.6fr) 146px 46px 124px 46px 124px 74px minmax(120px,1.3fr);
    gap:9px;align-items:center;padding:8px 12px}
  .htbl-head{background:var(--bg);border-bottom:1px solid var(--line);border-radius:12px 12px 0 0}
  .htbl-head .hh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);white-space:nowrap}
  .htbl-head .hh.n{text-align:right}
  /* month sub-header inside a grouped table (Status Summary) */
  .hmonth{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--accent-soft);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line2)}
  .hmonth .hm-name{font-weight:700;font-size:12px;color:var(--accent-ink)}
  .hmonth .hm-sum{display:flex;gap:12px;font-size:11.5px;color:var(--muted);margin-left:4px}
  .hmonth .hm-sum b{color:var(--ink);font-variant-numeric:tabular-nums}
  .hrow{border-top:1px solid var(--line2)}
  .hrow:hover{background:var(--line2)}
  .hjob{display:flex;align-items:center;gap:7px;min-width:0}
  .hjob .jobchip{font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:7px;padding:1px 8px;flex:0 0 auto}
  .hjob .jclient{font-weight:600;white-space:nowrap;flex:0 0 auto}
  .hjob .jaddr{color:var(--muted);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .hcell-in{font:inherit;font-size:12.5px;color:var(--ink);background:transparent;border:0;border-bottom:1px solid transparent;
    border-radius:0;padding:3px 2px;width:100%;min-width:0}
  .hcell-in:hover{border-bottom-color:var(--line)}
  .hcell-in:focus{outline:none;border-bottom-color:var(--accent)}
  input.hcell-in[type=number]{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;-moz-appearance:textfield}
  input.hcell-in[type=number]::-webkit-outer-spin-button,input.hcell-in[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input.hcell-in.short{color:var(--danger)}
  .hist-none{color:var(--muted);font-size:12.5px;padding:16px;text-align:center;border:1px dashed var(--line);border-radius:12px}

  /* ---------- pills ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;font-size:12px;
    font-weight:700;white-space:nowrap;line-height:1.5;color:var(--ink)}
  .pill.xs{font-size:10.5px;padding:1px 8px;gap:4px}
  .pill .pdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .pill-select{cursor:pointer}
  .pcaret{font-size:8px;opacity:.65}

  /* ---------- popovers ---------- */
  .pop{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    box-shadow:0 12px 34px rgba(16,24,40,.22);padding:5px;min-width:200px;max-height:62vh;overflow:auto}
  .pop[hidden]{display:none}
  .cprow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px;cursor:pointer}
  .cprow:hover,.cprow.on{background:var(--line2)}
  .cprow .rtick{margin-left:auto;color:var(--accent-ink);font-weight:800}

  /* ---------- floating column config ---------- */
  .cfg-fab{position:fixed;bottom:8px;right:8px;z-index:50;width:36px;height:36px;border-radius:50%;
    border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:16px;
    box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
  .cfg-fab:hover{color:var(--ink);border-color:var(--accent)}
  .cfgpop{min-width:252px}
  .cfg-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:4px 6px 8px}
  .cfgrow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px}
  .cfgrow:hover{background:var(--line2)}
  .cfgrow .ck{display:flex;align-items:center;gap:8px;flex:1 1 auto;cursor:pointer;font-size:12.5px}
  .cfgrow .ck input{accent-color:var(--accent)}
  .cfgrow .mv{color:var(--muted);cursor:pointer;padding:0 5px;border-radius:5px;font-size:13px;user-select:none}
  .cfgrow .mv:hover{background:var(--line);color:var(--ink)}
  .cfgrow .mv.off{opacity:.22;pointer-events:none}
  .cfg-foot{border-top:1px solid var(--line2);margin-top:6px;padding-top:5px}
  .cfg-reset{font:inherit;font-size:12px;color:var(--accent-ink);background:none;border:0;cursor:pointer;padding:5px 7px}
  .cfg-reset:hover{text-decoration:underline}

  .demo-tag{position:fixed;bottom:9px;left:11px;font-size:10px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:2px 9px;opacity:.75;z-index:40}

  /* ---- "not in catalogue" tag + generic buttons ---- */
  .ctag{margin-left:auto;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    color:#9a6b00;background:#fff4d6;border-radius:999px;padding:1px 8px;white-space:nowrap}
  @media (prefers-color-scheme:dark){ .ctag{color:#ffd98a;background:#3a2f10} }
  :root[data-theme="dark"] .ctag{color:#ffd98a;background:#3a2f10}
  .prod-sub .ctag{margin-left:0}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);border-radius:9px;font:inherit;font-size:12.5px;font-weight:600;
    cursor:pointer;white-space:nowrap}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.primary[disabled]{opacity:.5;cursor:not-allowed;filter:none}
  .btn.sm{padding:5px 10px;font-size:12px}

  /* ---- add-order button in the search header ---- */
  .add-order{width:100%;justify-content:center;margin-top:2px}

  /* ---- wizard overlay ---- */
  .scrim{position:fixed;inset:0;background:rgba(10,15,20,.42);z-index:70}
  .scrim[hidden]{display:none}
  .wiz{position:fixed;z-index:80;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(560px,calc(100vw - 28px));max-height:calc(100vh - 40px);display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.35);overflow:hidden}
  .wiz-head{flex:0 0 auto;padding:14px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
  .wiz-head .wh-t{font-weight:800;font-size:15px}
  .wiz-x{margin-left:auto;cursor:pointer;color:var(--muted);border:0;background:transparent;font-size:18px;line-height:1;padding:4px}
  .wiz-x:hover{color:var(--ink)}
  .steps{display:flex;gap:6px;padding:12px 16px 0}
  .step-dot{flex:1 1 0;height:5px;border-radius:20px;background:var(--line)}
  .step-dot.on{background:var(--accent)}
  .step-dot.done{background:var(--accent-ink)}
  .wiz-sub{padding:8px 16px 0;color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .wiz-body{flex:1 1 auto;overflow-y:auto;padding:12px 16px 4px;display:flex;flex-direction:column;gap:14px}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld>label{font-size:12px;font-weight:700;color:var(--ink)}
  .fld .hint{font-size:11px;color:var(--muted);font-weight:400}
  .fld .req{color:var(--danger);font-weight:700}
  .fld input[type=text],.fld input[type=number],.fld textarea,.tinput{
    width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);font:inherit;font-size:13px;outline:none}
  .fld input:focus,.fld textarea:focus,.tinput:focus{border-color:var(--accent)}
  .fld textarea{resize:vertical;min-height:52px}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:5;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.2);max-height:210px;overflow:auto;padding:4px}
  .ac-row{padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px}
  .ac-row:hover,.ac-row.on{background:var(--line2)}
  .ac-new{color:var(--accent-ink);font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip-t{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:4px 10px;
    font-size:12px;cursor:pointer;background:var(--bg);user-select:none}
  .chip-t.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink);font-weight:700}
  .selbox{border:1px solid var(--line);border-radius:10px;padding:9px 11px;background:var(--accent-soft);display:flex;align-items:center;gap:9px;font-size:12.5px}
  .selbox .sb-main{font-weight:700}
  .selbox .sb-sub{color:var(--muted);font-size:11px}
  .selbox .sb-x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:14px}
  .jobpick{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow:auto}
  .jobopt{border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;gap:8px;align-items:center}
  .jobopt:hover{border-color:var(--accent)}
  .jobopt.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);background:var(--accent-soft)}
  .jobopt .jo-id{font-weight:800;color:var(--accent-ink);background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:11px}
  .jobopt .jo-main{min-width:0}
  .jobopt .jo-addr{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row2{display:flex;gap:10px}.row2>*{flex:1 1 0;min-width:0}
  .wiz-foot{flex:0 0 auto;padding:12px 16px;border-top:1px solid var(--line2);display:flex;align-items:center;gap:10px}
  .wiz-foot .msg{color:var(--danger);font-size:12px;font-weight:600}
  .wiz-foot .grow{flex:1 1 auto}
</style>
</head>
<body>
<div id="app">
  <div class="search-pane">
    <div class="search-head">
      <div class="search-title">Catalogue <span class="count" id="resCount">0</span></div>
      <div class="search">
        <svg class="sic" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="Search catalogue - product, code, supplier…" autocomplete="off">
        <span class="clr" id="qClr" title="Clear" hidden>&times;</span>
      </div>
      <button class="btn primary add-order" id="addBtn" title="Add a new stone order (tied to a job)">＋ New stone order</button>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="splitter" id="splitter"></div>

  <div class="detail-pane" id="detail"></div>
</div>

<button class="cfg-fab" id="cfgBtn" title="Configure table columns">&#9881;</button>
<div class="pop" id="choicePop" hidden></div>
<div class="pop" id="cfgPop" hidden></div>
<div id="wizPop" hidden></div>
<div class="scrim" id="scrim" hidden></div>
<div class="demo-tag" id="demoTag" hidden>demo data</div>

<script>
"use strict";
/* ============================================================
   Milano - Catalogue Search widget
   Left: search the Catalogue (product · code · supplier).
   Right: click a product → its full ORDER HISTORY - every
   Stone_Order line that used it, across all jobs, with the
   order/delivery dates + qtys, status, INV and note. Each
   history row is editable in place and writes back to
   Stone_Order. Shares the Inbox / Board foundation: design
   tokens, the Order_Status model, and the Grist plumbing.
   ============================================================ */

// ---- status model (strings + colours must round-trip to Grist) ----
const ORD_DEFAULT = {
  "2.  Placed Order":"#FEF47A","3. Awaiting Order":"#FED6FB","6. Delivered":"#98FD90",
  "4. Awaiting Pickup":"#75B5FC","7. Not Delivered Yet":"#CCFEFE","5. On hold":"#FEE7C3",
  "1. No Stock":"#FD8182","Cancelled":"#DCDCDC","Delivered by WF":"#E1FEDE",
  "Delivered by Aboda":"#E1FEDE","Delivered by Client":"#E1FEDE","Return":"#CCFEFE","N/A":"#e9edf1"};
const ORD_C = Object.assign({}, ORD_DEFAULT);
let ORDS = Object.keys(ORD_C);
const statusColor = s => ORD_C[s] || "#e9edf1";
const statusLabel = s => (s==null||s==="") ? "To sort" : s;
const SPECIAL_COL = /^(manualSort|gristHelper_|id$)/;

// Auto-advance the status from the line's own data (mirrors Inbox §5).
const PRE_ORDER_STATES = ["","3. Awaiting Order","7. Not Delivered Yet","1. No Stock"];
function isDeliveredStatus(r){ const low=String(r.Order_Status||"").toLowerCase(); return /deliver/.test(low) && !/not deliver/.test(low); }
function autoStatus(r){
  const s=String(r.Order_Status||""), low=s.toLowerCase();
  if(/cancel|n\/a|return|on hold/.test(low)) return null;
  if(toDate(r.Delivery_Date) && !isDeliveredStatus(r)) return "6. Delivered";
  if(toDate(r.Order_Date) && PRE_ORDER_STATES.indexOf(s)>=0) return "2.  Placed Order";
  return null;
}

// ---- generic helpers (mirror the inbox / board for Grist correctness) ----
const $=(t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
function refId(v){ if(v==null)return null; if(typeof v==="number")return v;
  if(Array.isArray(v))return v[2]; if(typeof v==="object")return v.rowId!=null?v.rowId:v.id; return v; }
function toDate(v){ if(v==null||v==="")return null;
  if(typeof v==="number")return new Date(v*1000);
  if(v instanceof Date)return v;
  const d=new Date(v); return isNaN(d)?null:d; }
function fmtDMY(v){ const d=toDate(v); if(!d)return "";
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function dateInput(v){ const d=toDate(v); if(!d)return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function toEpochSec(str){ if(!str)return null; const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/1000); }
const num=v=>{ const n=Number(v); return isFinite(n)?n:0; };
function esc(v){ return v==null?"":String(v); }
function columnarToRows(t){ if(!t||!t.id)return []; return t.id.map((id,i)=>{const o={id}; for(const k in t)if(k!=="id")o[k]=t[k][i]; return o;}); }
function hexRgb(h){ h=String(h||"").replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join("");
  return {r:parseInt(h.slice(0,2),16)||0,g:parseInt(h.slice(2,4),16)||0,b:parseInt(h.slice(4,6),16)||0}; }
function softTint(hex){ const {r,g,b}=hexRgb(hex||"#cfd4d1");
  const bg="rgb("+Math.round(r+(255-r)*.72)+","+Math.round(g+(255-g)*.72)+","+Math.round(b+(255-b)*.72)+")";
  const dot="rgb("+Math.round(r*.66)+","+Math.round(g*.66)+","+Math.round(b*.66)+")";
  return {bg,dot}; }
function relDays(v){ const d=toDate(v); if(!d) return null;
  const t=new Date(), a=new Date(t.getFullYear(),t.getMonth(),t.getDate()), b=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  return Math.round((a-b)/86400000); }
function agoText(verb,n){ if(n==null) return "";
  if(n===0) return verb+" today";
  if(n<0) return verb+" in "+(-n)+(-n===1?" day":" days");
  return verb+" "+n+(n===1?" day":" days")+" ago"; }

// ---- state ----
const LSKEY="milano_catalogue_prefs_v1";
const state={
  stone:[], jobs:[], catalogue:[], clients:[], grist:false,
  ref:{ product:null, client:null },
  assignChoices:null,
  q:"", selectedCatId:null, selectedMonth:null, statusView:"active", searchW:null, colCfg:null,
  jobById:{}, catById:{}, virtualById:{}, ordersByCat:{}, wiz:null
};
window._catsearch=state;
function loadPrefs(){ try{ return JSON.parse(localStorage.getItem(LSKEY))||{}; }catch(e){ return {}; } }
function savePrefs(){ try{ localStorage.setItem(LSKEY, JSON.stringify({ searchW:state.searchW, colCfg:state.colCfg })); }catch(e){} }

// ---- column resolution (don't hardcode the Catalogue's column ids) ----
function pickColId(cols,rx,fallback){ const c=(cols||[]).find(c=>rx.test(c.colId||"")); return c?c.colId:(fallback||null); }
function productDisplayCols(refInfo){ const e=refInfo.editable||[];
  return { supplier:pickColId(e,/suppl|brand|vendor/i), code:pickColId(e,/code|sku|item/i),
    name:pickColId(e,/name|desc|title|stone/i,refInfo.labelCol), price:pickColId(e,/price|slab|cost|rate/i) }; }
function dedupeLabelParts(parts){ const p=parts.map(v=>v==null?"":String(v).trim()).filter(Boolean); const norm=s=>s.toLowerCase();
  return p.filter((v,i)=>!p.some((w,j)=>{ if(i===j)return false; const a=norm(v),b=norm(w);
    return a===b ? j<i : (b.length>a.length && b.includes(a)); })); }
function choiceList(v){ return Array.isArray(v) ? v.slice(v[0]==="L"?1:0).filter(x=>x!=null&&x!=="") : (v!=null&&v!==""?[v]:[]); }
function clientLabel(c){ const R=state.ref.client; return (R&&R.labelCol&&c[R.labelCol]) || c.Name || c.Client || ("#"+c.id); }
function jobClientName(j){ return (j&&(j.Client_Label||"")).trim(); }
function assigneeOptions(){
  const fromData=[...new Set((state.jobs||[]).flatMap(j=>choiceList(j.Assigned_To)))].filter(Boolean);
  const base=state.assignChoices&&state.assignChoices.length ? state.assignChoices.slice() : [];
  fromData.forEach(a=>{ if(!base.includes(a)) base.push(a); });
  return base.sort((a,b)=>a.localeCompare(b));
}

// ---- resolved catalogue field accessors ----
function catSupplier(c){ const cols=state.ref.product&&state.ref.product.cols; return (cols&&cols.supplier&&c[cols.supplier]) || c.Supplier || ""; }
function catCode(c){ const cols=state.ref.product&&state.ref.product.cols; return (cols&&cols.code&&c[cols.code]) || c.Code || ""; }
function catName(c){ const cols=state.ref.product&&state.ref.product.cols; return (cols&&cols.name&&c[cols.name]) || c.Name || ""; }

// ---- lookups ----
function reindex(){
  state.jobById={}; state.jobs.forEach(j=>state.jobById[j.id]=j);
  state.catById={}; state.catalogue.forEach(c=>state.catById[c.id]=c);
  // Group every stone line under the catalogue product it references. Lines whose
  // Product is missing / unmatched are grouped into a synthetic ("virtual") catalogue
  // entry keyed by their free-text stone name + supplier, so stones that were only ever
  // typed onto orders (e.g. "Peraway") are still searchable and have a history view.
  state.ordersByCat={}; state.virtualById={};
  (state.stone||[]).forEach(r=>{
    const pid=refId(r.Product);
    let key;
    if(pid!=null && state.catById[pid]){ key=pid; }
    else {
      const nm=(r.Stone||r.Product_Code||"").trim(), sup=(r.Product_Supplier||"").trim();
      if(!nm && !sup) return;                      // nothing identifiable - skip
      key="v:"+(sup+"|"+nm).toLowerCase();
      if(!state.virtualById[key]) state.virtualById[key]={ id:key, _virtual:true,
        Supplier:sup, Code:(r.Product_Code||""), Name:(r.Stone||"").trim()||nm };
    }
    (state.ordersByCat[key]=state.ordersByCat[key]||[]).push(r);
  });
}
function catByAnyId(id){ return state.catById[id] || state.virtualById[id] || null; }
function jobFor(r){ return state.jobById[refId(r.Job)]||null; }
function catFor(r){ return state.catById[refId(r.Product)]||null; }
function catLabel(c){
  const name=catName(c);
  if(name) return dedupeLabelParts([catSupplier(c),catCode(c),name]).join(" · ");
  if(c.Product_Full && String(c.Product_Full).trim()) return String(c.Product_Full).trim();
  return dedupeLabelParts([catSupplier(c),catCode(c)]).join(" · ") || ("#"+c.id);
}
function catalogueHaystack(c){ let s=catLabel(c)||"";
  for(const k in c){ if(k==="id")continue; const v=c[k]; if(typeof v==="string") s+=" "+v; } return s.toLowerCase(); }
function priceOf(c){ const v=c&&c.Price_Slab; return (v!=null&&v!=="")?v:0; }
function supplierFor(r){ const c=catFor(r); return r.Product_Supplier || (c&&c.Supplier) || ""; }
function ordersFor(catId){ return state.ordersByCat[catId]||[]; }
function jobClient(j){ return j ? ((String(j.Client_Label||"")).trim() || (String(j.Job_Address||"")).trim() || j.Job_ID || ("#"+j.id)) : "-"; }
function jobAddr(j){ return j ? ((String(j.Address_Formatted||j.Job_Address||"")).trim()) : ""; }
function jobCode(j){ return j ? (j.Job_ID || ("#"+j.id)) : ""; }

// ============================================================
//  SEARCH - rank catalogue products by closeness to the query
// ============================================================
function scoreText(hay,q){
  if(!hay) return 0; hay=String(hay).toLowerCase();
  if(hay===q) return 100;
  if(hay.startsWith(q)) return 78;
  if(new RegExp("\\b"+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).test(hay)) return 60;
  const i=hay.indexOf(q); if(i<0) return 0;
  return 42-Math.min(i,20);
}
function scoreCat(c,q){
  let best=0;
  [catLabel(c), catName(c), catCode(c), catSupplier(c)].forEach(f=>{ const s=scoreText(f,q); if(s>best)best=s; });
  if(best<78){                                   // also match the free-text stone names on this product's orders
    for(const o of ordersFor(c.id)){ const s=scoreText(o.Stone,q); if(s>best)best=s; if(best>=78)break; }
  }
  if(best===0 && catalogueHaystack(c).includes(q)) best=20;   // any other string field
  return best;
}
// Real catalogue rows + synthetic entries for stones that only exist on orders.
function allCatEntries(){ return (state.catalogue||[]).concat(Object.keys(state.virtualById).map(k=>state.virtualById[k])); }
function rankedCatalogue(){
  const q=state.q.trim().toLowerCase();
  const list=allCatEntries();
  if(!q) return [...list].sort((a,b)=> (a._virtual?1:0)-(b._virtual?1:0) || catLabel(a).localeCompare(catLabel(b)));
  return list.map(c=>({c,s:scoreCat(c,q)}))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s || (a.c._virtual?1:0)-(b.c._virtual?1:0) || catLabel(a.c).localeCompare(catLabel(b.c)))
    .map(x=>x.c);
}

// ============================================================
//  RENDER
// ============================================================
function render(){ reindex(); renderResults(); renderDetail(); }

function renderResults(){
  const wrap=document.getElementById("results"); wrap.innerHTML="";
  const rows=rankedCatalogue();
  document.getElementById("resCount").textContent=rows.length;
  document.getElementById("demoTag").hidden=state.grist;
  document.getElementById("qClr").hidden=!state.q;

  if(!rows.some(c=>c.id===state.selectedCatId)) state.selectedCatId = rows.length ? rows[0].id : null;

  if(!rows.length){
    wrap.appendChild($("div","res-empty", state.q ? "No products match “"+state.q+"”." : "No catalogue products yet."));
    return;
  }
  rows.forEach(c=>wrap.appendChild(catalogueCard(c)));
}

function catalogueCard(c){
  const n=ordersFor(c.id).length;
  const card=$("div","ccard"+(c.id===state.selectedCatId?" on":"")+(c._virtual?" virt":""));
  card.onclick=()=>{ state.selectedCatId=c.id; render(); };

  const top=$("div","ctop");
  top.appendChild($("div","cname",catLabel(c)));
  if(c._virtual) top.appendChild($("span","ctag","not in catalogue"));
  card.appendChild(top);

  const meta=$("div","cmeta");
  const sup=catSupplier(c), code=catCode(c);
  if(sup) meta.appendChild($("span","csup",sup));
  if(code) meta.appendChild($("span","ccode","Code "+code));
  if(!c._virtual) meta.appendChild($("span","cprice","$"+priceOf(c)+"/slab"));
  const badge=$("span","cbadge"+(n?"":" zero"), n?(n+" order"+(n===1?"":"s")):"no orders");
  meta.appendChild(badge);
  card.appendChild(meta);
  return card;
}

function renderDetail(){
  const app=document.getElementById("detail"); app.innerHTML="";
  const c=catByAnyId(state.selectedCatId);
  if(!c){ app.appendChild($("div","detail-empty","Search the catalogue, then pick a product to see its profile and order history.")); return; }
  const allOrders=ordersFor(c.id);
  const byDateDesc=(a,b)=>{ const da=+toDate(a.Order_Date)||0, db=+toDate(b.Order_Date)||0; return db-da || (b.id||0)-(a.id||0); };

  // ═══ Section 1 - Stone profile ═══
  const s1=$("div","section");
  const head=$("div","prod-head");
  const tw=$("div","prod-title");
  tw.appendChild($("div","prod-name",catLabel(c)));
  const sub=$("div","prod-sub");
  const sup=catSupplier(c), code=catCode(c);
  if(sup) sub.appendChild($("span","psup",sup));
  if(code) sub.appendChild($("span",null,"Code "+code));
  if(c._virtual) sub.appendChild($("span","ctag","not in catalogue"));
  tw.appendChild(sub);
  head.appendChild(tw);
  if(c._virtual){
    const add=$("button","btn primary sm","＋ Add to catalogue");
    add.title="Create a Catalogue product from this stone and link its orders to it";
    add.onclick=()=>promoteVirtual(c);
    head.appendChild(add);
  } else {
    const price=$("div","prod-price"); price.appendChild(document.createTextNode("$"+priceOf(c)));
    price.appendChild($("small",null,"per slab")); head.appendChild(price);
  }
  s1.appendChild(head);
  // all-time context (the scoreboard below is month-scoped, so summarise lifetime here)
  const lifeJobs=new Set(allOrders.map(r=>refId(r.Job)).filter(v=>v!=null));
  const lifeOrd=allOrders.reduce((s,r)=>s+num(r.Ordered_Qty),0);
  const lifeDel=allOrders.reduce((s,r)=>s+num(r.Delivery_Qty),0);
  const life=$("div","prof-life");
  life.appendChild(lifeBit(allOrders.length,"orders all-time"));
  life.appendChild(lifeBit(lifeJobs.size,"jobs"));
  life.appendChild(lifeBit(lifeOrd,"slabs ordered"));
  life.appendChild(lifeBit(lifeDel,"slabs delivered"));
  s1.appendChild(life);
  app.appendChild(s1);

  // ═══ Section 2 - Status Summary (pills switch the status view; grouped by date) ═══
  const s2=$("div","section");
  s2.appendChild(sectionHead("Status summary",null,null));
  const VIEWS=[
    { key:"active",    label:"Active order", sub:"placed & awaiting delivery", filter:isActiveOrder,       dateField:"Order_Date",    empty:"No active orders - nothing placed and awaiting delivery." },
    { key:"delivered", label:"Delivered",    sub:"grouped by delivery date",   filter:isDeliveredStatus,   dateField:"Delivery_Date", empty:"Nothing delivered for this product yet." }
  ];
  let sv=state.statusView; if(!VIEWS.some(v=>v.key===sv)) sv="active"; state.statusView=sv;
  const svrow=$("div","mrow");
  VIEWS.forEach(v=>{
    const rows=allOrders.filter(v.filter);
    const p=$("button","mpill"+(sv===v.key?" on":"")+(rows.length?"":" empty"));
    p.appendChild($("span","mp-name",v.label));
    if(rows.length) p.appendChild($("span","mp-n",String(rows.length)));
    p.onclick=()=>{ state.statusView=v.key; renderDetail(); };
    svrow.appendChild(p);
  });
  s2.appendChild(svrow);
  const view=VIEWS.find(v=>v.key===sv);
  const svRows=allOrders.filter(view.filter);
  if(view.sub) s2.appendChild($("div","view-sub",view.sub));
  if(!svRows.length) s2.appendChild($("div","hist-none",view.empty));
  else s2.appendChild(groupedOrderTable(svRows, view.dateField));
  app.appendChild(s2);

  // ═══ Section 3 - Order history by month ═══
  const s3=$("div","section");
  s3.appendChild(sectionHead("Order history",null,null));

  const curKey=currentMonthKey();
  const keySet=new Set(allOrders.map(monthKeyOf).filter(k=>k!=null));
  keySet.add(curKey);                                  // this month is always offered
  const monthKeys=[...keySet].sort((a,b)=>b-a);        // newest first
  const hasUndated=allOrders.some(r=>monthKeyOf(r)==null);

  // resolve the active selection against what this product actually has
  let sel=state.selectedMonth;
  if(sel==="all"){ /* always valid */ }
  else if(sel==="undated"){ if(!hasUndated) sel=curKey; }
  else if(!(typeof sel==="number" && keySet.has(sel))) sel=curKey;
  state.selectedMonth=sel;

  const countIn=k=>allOrders.filter(r=>monthKeyOf(r)===k).length;
  const mrow=$("div","mrow");
  // "All time" pill first
  {
    const p=$("button","mpill"+(sel==="all"?" on":""));
    p.appendChild($("span","mp-name","All time"));
    if(allOrders.length) p.appendChild($("span","mp-n",String(allOrders.length)));
    p.onclick=()=>{ state.selectedMonth="all"; renderDetail(); };
    mrow.appendChild(p);
  }
  monthKeys.forEach(k=>{
    const p=$("button","mpill"+(sel===k?" on":"")+(countIn(k)?"":" empty"));
    p.appendChild($("span","mp-name",monthPillLabel(k)));
    const n=countIn(k); if(n) p.appendChild($("span","mp-n",String(n)));
    p.onclick=()=>{ state.selectedMonth=k; renderDetail(); };
    mrow.appendChild(p);
  });
  if(hasUndated){
    const p=$("button","mpill"+(sel==="undated"?" on":""));
    p.appendChild($("span","mp-name","No date"));
    p.appendChild($("span","mp-n",String(allOrders.filter(r=>monthKeyOf(r)==null).length)));
    p.onclick=()=>{ state.selectedMonth="undated"; renderDetail(); };
    mrow.appendChild(p);
  }
  s3.appendChild(mrow);

  // orders for the selected scope, most-recent first
  const orders=allOrders.filter(r=> sel==="all" ? true : sel==="undated" ? monthKeyOf(r)==null : monthKeyOf(r)===sel).slice().sort(byDateDesc);

  // table first
  const selLabel = sel==="all" ? "any month" : sel==="undated" ? "orders with no order date" : monthLabelOf(sel);
  if(!orders.length) s3.appendChild($("div","hist-none","No orders for this product in "+selLabel+"."));
  else s3.appendChild(orderTable(orders));

  // scoreboard - now below the table (for the selected month)
  const jobs=new Set(orders.map(r=>refId(r.Job)).filter(v=>v!=null));
  const ordered=orders.reduce((s,r)=>s+num(r.Ordered_Qty),0);
  const delivered=orders.reduce((s,r)=>s+num(r.Delivery_Qty),0);
  const stats=$("div","hist-stats");
  stats.appendChild(stat(orders.length,"orders"));
  stats.appendChild(stat(jobs.size,"jobs"));
  stats.appendChild(stat(ordered,"slabs ordered"));
  stats.appendChild(stat(delivered,"slabs delivered"));
  s3.appendChild(stats);

  // histogram - daily ordered slabs for the selected month across the whole supplier
  s3.appendChild(histogram(c));
  app.appendChild(s3);
}

// Daily stacked column chart for the SELECTED month: one bar per calendar day,
// height = slabs ordered that day across ALL of this product's supplier, split
// into "this stone" (highlighted) + "other <supplier>". Follows the month pills.
function supplierDaily(c,monthKey){
  const sup=c.Supplier||"", curId=c.id;
  const year=Math.floor(monthKey/100), month=monthKey%100;
  const lastDay=new Date(year,month,0).getDate();
  const days=[]; for(let i=1;i<=lastDay;i++) days.push({day:i,cur:0,other:0});
  (state.stone||[]).forEach(r=>{
    if(supplierFor(r)!==sup) return;
    const dt=toDate(r.Order_Date); if(!dt) return;
    if(dt.getFullYear()!==year || (dt.getMonth()+1)!==month) return;
    const q=num(r.Ordered_Qty); if(q<=0) return;
    const idx=dt.getDate()-1; if(idx<0||idx>=days.length) return;
    if(refId(r.Product)===curId) days[idx].cur+=q; else days[idx].other+=q;
  });
  return days;
}
// Monthly aggregation across the whole supplier (used by the All-time view).
function supplierMonthly(c){
  const sup=c.Supplier||"", curId=c.id, byMonth={};
  (state.stone||[]).forEach(r=>{
    if(supplierFor(r)!==sup) return;
    const k=monthKeyOf(r); if(k==null) return;
    const q=num(r.Ordered_Qty); if(q<=0) return;
    const m=byMonth[k]||(byMonth[k]={key:k,cur:0,other:0});
    if(refId(r.Product)===curId) m.cur+=q; else m.other+=q;
  });
  return Object.keys(byMonth).map(k=>byMonth[k]).sort((a,b)=>a.key-b.key);
}
function histogram(c){
  const box=$("div","hist-chart");
  const sel=state.selectedMonth;
  const allTime = sel==="all";
  const supTxt=(c.Supplier?("all "+c.Supplier+" orders · "):"")+"this stone highlighted";
  const head=$("div","chart-h");
  head.appendChild($("span","st", allTime?"Ordered by month":"Ordered by day"));
  head.appendChild($("span","ssub",(typeof sel==="number"?monthLabelOf(sel)+" · ":allTime?"all time · ":"")+supTxt));
  box.appendChild(head);

  if(!allTime && typeof sel!=="number"){ box.appendChild($("div","hist-none","Pick a month above to see its daily breakdown.")); return box; }
  // All time → one bar per month; a specific month → one bar per day.
  const data = allTime ? supplierMonthly(c) : supplierDaily(c,sel);
  const empty = allTime ? !data.length : !data.some(d=>d.cur+d.other>0);
  if(empty){ box.appendChild($("div","hist-none","No "+(c.Supplier?c.Supplier+" ":"")+"orders"+(allTime?" yet.":" in "+monthLabelOf(sel)+"."))); return box; }
  const max=Math.max(1,...data.map(d=>d.cur+d.other));
  const H=118;
  const scroll=$("div","chart-scroll"); const chart=$("div","chart"+(allTime?"":" daily"));
  data.forEach(d=>{
    const total=d.cur+d.other;
    const col=$("div","bar-col"+(total?"":" zero")+(allTime&&d.key===state.selectedMonth?" sel":""));
    const label = allTime ? monthLabelOf(d.key) : (d.day+" "+monthLabelOf(sel));
    col.title=label+(total?(" - "+total+" slab"+(total===1?"":"s")+" ("+d.cur+" this stone, "+d.other+" other)"):" - no orders");
    col.appendChild($("div","bar-v",total?String(total):""));
    const bar=$("div","bar");
    if(d.cur>0){ const s=$("div","seg cur"); s.style.height=Math.max(2,d.cur/max*H)+"px"; bar.appendChild(s); }
    if(d.other>0){ const s=$("div","seg other"); s.style.height=Math.max(2,d.other/max*H)+"px"; bar.appendChild(s); }
    col.appendChild(bar);
    col.appendChild($("div","bar-x", allTime?monthPillLabel(d.key):String(d.day)));
    if(allTime){ col.style.cursor="pointer"; col.onclick=()=>{ state.selectedMonth=d.key; renderDetail(); }; }
    chart.appendChild(col);
  });
  scroll.appendChild(chart); box.appendChild(scroll);

  const legend=$("div","chart-legend");
  const l1=$("span","lg"); l1.appendChild($("i","sw cur")); l1.appendChild(document.createTextNode("This stone")); legend.appendChild(l1);
  const l2=$("span","lg"); l2.appendChild($("i","sw other")); l2.appendChild(document.createTextNode(c.Supplier?("Other "+c.Supplier):"Other")); legend.appendChild(l2);
  box.appendChild(legend);
  return box;
}

// Table split into month sub-sections by `dateField`, each with a subtotal.
function groupedOrderTable(rows,dateField){
  const vis=visibleCols(), tpl=gridTemplate(vis);
  const groups=[]; const gmap={};
  rows.forEach(r=>{ const k=monthKeyByField(r,dateField); let g=gmap[k]; if(!g){g={key:k,rows:[]};gmap[k]=g;groups.push(g);} g.rows.push(r); });
  groups.forEach(g=>g.rows.sort((a,b)=>{ const da=+toDate(a[dateField])||0, db=+toDate(b[dateField])||0; return db-da||(b.id||0)-(a.id||0); }));
  groups.sort((a,b)=>{ if(a.key==null)return 1; if(b.key==null)return -1; return b.key-a.key; });
  const wrap=$("div","htbl-wrap"); const tbl=$("div","htbl"); tbl.style.minWidth=minWidthOf(vis)+"px";
  tbl.appendChild(headerRow(vis,tpl));
  groups.forEach(g=>{
    const ord=g.rows.reduce((s,r)=>s+num(r.Ordered_Qty),0);
    const del=g.rows.reduce((s,r)=>s+num(r.Delivery_Qty),0);
    const mb=$("div","hmonth");
    mb.appendChild($("span","hm-name",monthLabelOf(g.key)));
    const sum=$("span","hm-sum");
    sum.appendChild($("span",null,g.rows.length+" order"+(g.rows.length===1?"":"s")));
    const so=$("span"); so.appendChild(document.createTextNode("ordered ")); so.appendChild($("b",null,String(ord))); sum.appendChild(so);
    const sd=$("span"); sd.appendChild(document.createTextNode("delivered ")); sd.appendChild($("b",null,String(del))); sum.appendChild(sd);
    mb.appendChild(sum);
    tbl.appendChild(mb);
    g.rows.forEach(r=>tbl.appendChild(orderRow(r,vis,tpl)));
  });
  wrap.appendChild(tbl); return wrap;
}

function update(rowId,fields){
  const r=state.stone.find(x=>x.id===rowId); if(r)Object.assign(r,fields);
  render();
  if(state.grist){ grist.docApi.applyUserActions([["UpdateRecord","Stone_Order",rowId,fields]]).then(refetch).catch(e=>console.warn("update failed",e)); }
}
function updateStoneAuto(r,fields){
  Object.assign(r,fields);                       // optimistic so the rule sees new values
  const auto=autoStatus(r);
  if(auto && auto!==r.Order_Status) fields.Order_Status=auto;
  update(r.id,fields);
}
// Create a record. Demo: push into the matching local array with a fresh id.
// Live: AddRecord and resolve to the new rowId (retValues[0]). Returns Promise<rowId>.
function addRecord(table,fields){
  if(!state.grist){
    const bag={ Stone_Order:state.stone, Jobs_Detail:state.jobs, Client:state.clients, Catalogue:state.catalogue }[table]
      || (state.ref.product&&table===state.ref.product.targetTableId&&state.catalogue)
      || (state.ref.client&&table===state.ref.client.targetTableId&&state.clients);
    const arr=Array.isArray(bag)?bag:[];
    const id=(arr.reduce((m,r)=>Math.max(m,typeof r.id==="number"?r.id:0),0)||0)+1;
    arr.push(Object.assign({id},fields)); reindex(); render();
    return Promise.resolve(id);
  }
  return grist.docApi.applyUserActions([["AddRecord",table,null,fields]])
    .then(res=>{ const rv=(res&&res.retValues)||[]; return rv[0]; });
}
// Find an existing client by name (case-insensitive) or create one; resolves to its rowId.
function ensureClient(name){
  const R=state.ref.client, nm=(name||"").trim();
  if(!nm) return Promise.resolve(null);
  const existing=(state.clients||[]).find(c=>String(clientLabel(c)).toLowerCase()===nm.toLowerCase());
  if(existing) return Promise.resolve(existing.id);
  if(!R) return Promise.resolve(null);
  const f={}; f[R.labelCol]=nm;
  return addRecord(R.targetTableId,f);
}
// Create a Jobs_Detail row from the wizard's step-1 data; resolves to the job rowId.
function createJob(o){
  const f={};
  if(state.ref.client && o.clientId!=null) f.Client_Name=o.clientId;    // Ref → rowId
  if(o.address) f.Job_Address=o.address;
  else if(!state.ref.client && o.clientName) f.Job_Address=o.clientName; // fallback sentinel
  f.Assigned_To=["L",...(o.assignees||[])];
  f.Stage="Quote";
  if(!state.grist && o.clientName) f.Client_Label=o.clientName;         // mirror formula for demo
  return addRecord("Jobs_Detail",f);
}
// Promote a "not in catalogue" (virtual) stone into a real Catalogue product, then relink
// its orphan orders to the new product so the history moves with it.
function promoteVirtual(c){
  const R=state.ref.product, cols=(R&&R.cols)||{};
  const f={}; if(cols.name)f[cols.name]=c.Name||""; else f.Name=c.Name||"";
  if(c.Supplier){ if(cols.supplier)f[cols.supplier]=c.Supplier; else f.Supplier=c.Supplier; }
  if(c.Code){ if(cols.code)f[cols.code]=c.Code; else f.Code=c.Code; }
  const tbl=(R&&R.targetTableId)||"Catalogue";
  const orphans=ordersFor(c.id).slice();
  Promise.resolve(addRecord(tbl,f)).then(newId=>{
    if(newId==null) return;
    orphans.forEach(o=>update(o.id,{Product:newId}));
    state.selectedCatId=newId;
    if(state.grist) refetch(); else render();
  }).catch(err=>console.warn("promote failed",err));
}

function isGhost(j){ return !!j && /ghost/i.test(String(j.Client_Label||"")+String(j.Job_Address||"")); }
function jobsForClient(clientId,clientName){
  const nm=(clientName||"").trim().toLowerCase();

    if(isGhost(j)) return false;
    if(clientId!=null && refId(j.Client_Name)===clientId) return true;
    return nm && jobClientName(j).toLowerCase()===nm;
  });
}
function distinctClients(){

  const seen={}, out=[];
  (state.jobs||[]).forEach(j=>{ const n=jobClientName(j); if(n && !seen[n.toLowerCase()]){ seen[n.toLowerCase()]=1; out.push({id:null,name:n}); } });

}

function canProceedStep1(){ const w=state.wiz;
  if(w.jobMode==="existing") return w.jobId!=null;
  return !!(w.clientName.trim() || w.address.trim()); }
function wizStep1(body){
  const w=state.wiz;
  const fld=$("div","fld");
  const lab=$("label"); lab.appendChild(document.createTextNode("Customer "));
  lab.appendChild($("span","hint","- name of the client this order is for")); fld.appendChild(lab);
  const ac=$("div","ac");
  const inp=document.createElement("input"); inp.type="text"; inp.placeholder="Start typing a customer name…"; inp.value=w.clientName; inp.autocomplete="off";
  ac.appendChild(inp);
  const drop=$("div","ac-list"); drop.hidden=true; ac.appendChild(drop);
  fld.appendChild(ac); body.appendChild(fld);

  function pickClient(c){ w.clientId=c.id; w.clientName=c.name; w.jobMode="new"; w.jobId=null; drop.hidden=true; renderWizard(); }
  function drawDrop(){
    const q=inp.value.trim().toLowerCase(); drop.innerHTML="";
    distinctClients().filter(c=>c.name.toLowerCase().includes(q)).slice(0,8)
      .forEach(c=>{ const row=$("div","ac-row",c.name); row.onmousedown=e=>{ e.preventDefault(); pickClient(c); }; drop.appendChild(row); });
    const exact=distinctClients().some(c=>c.name.toLowerCase()===q);
    if(q && !exact){ const row=$("div","ac-row ac-new","＋ New customer “"+inp.value.trim()+"”");
      row.onmousedown=e=>{ e.preventDefault(); pickClient({id:null,name:inp.value.trim()}); }; drop.appendChild(row); }
    drop.hidden=!drop.children.length;
  }
  inp.oninput=()=>{ w.clientName=inp.value; w.clientId=null; drawDrop(); syncWizPrimary(); };
  inp.onfocus=drawDrop; inp.onblur=()=>setTimeout(()=>{ drop.hidden=true; },150);

  const jobs=jobsForClient(w.clientId,w.clientName);
  if(w.clientName.trim() && jobs.length){
    const jf=$("div","fld");
    const jl=$("label"); jl.appendChild(document.createTextNode("Attach to job "));
    jl.appendChild($("span","hint","- reuse an existing job, or create a new one below")); jf.appendChild(jl);
    const pick=$("div","jobpick");
    jobs.forEach(j=>{
      const opt=$("div","jobopt"+(w.jobMode==="existing"&&w.jobId===j.id?" on":""));
      opt.appendChild($("span","jo-id",j.Job_ID||("#"+j.id)));
      const main=$("div","jo-main"); main.appendChild($("div",null,jobTitle(j)));

async function wizPublish(){
  const w=state.wiz; if(!w||w.busy||!canPublish())return;
  w.busy=true; w.msg=""; renderWizard();
  try{
    let jobId=w.jobId;
    if(w.jobMode!=="existing" || jobId==null){
      const clientId = state.ref.client ? await ensureClient(w.clientName) : null;
      jobId = await createJob({clientId, clientName:w.clientName.trim(), address:w.address.trim(), assignees:w.assignees});
    }
    if(jobId==null) throw new Error("no job id");
    const f={ Job:jobId };
    if(w.product && w.product.id!=null) f.Product=w.product.id;
    const cols=state.ref.product&&state.ref.product.cols;
    const stoneName=(w.product && ((cols&&cols.name&&w.product[cols.name])||w.product.Name)) || w.stone.trim();
    if(stoneName) f.Stone=stoneName;
    if(w.scopeQty!=="" && w.scopeQty!=null) f.Scope_Qty=Number(w.scopeQty);
    if(w.status) f.Order_Status=w.status;
    if(w.note.trim()) f.Note=w.note.trim();
    const newId=await addRecord("Stone_Order",f);
    if(w.product && w.product.id!=null) state.selectedCatId=w.product.id;   // jump the search to the ordered stone
    closeWizard();
    if(state.grist) refetch(); else render();
  }catch(err){
    console.warn("publish failed",err);
    w.busy=false; w.msg="Publish failed - check access and try again."; renderWizard();
  }
}

// ============================================================
//  SCHEMA INTROSPECTION (Product ref target + live status choices/colours)
// ============================================================
async function loadGristSchema(){
  const [T,C]=await Promise.all([
    grist.docApi.fetchTable("_grist_Tables"),
    grist.docApi.fetchTable("_grist_Tables_column")]);
  const tables=columnarToRows(T), cols=columnarToRows(C);
  const tableById={}; tables.forEach(t=>tableById[t.tableId]=t);
  const colByRowId={}; cols.forEach(c=>colByRowId[c.id]=c);
  const colsOf=tid=>{ const t=tableById[tid]; return t?cols.filter(c=>c.parentId===t.id):[]; };
  const isEditable=c=>!c.isFormula && c.colId && !SPECIAL_COL.test(c.colId);
  const choicesOf=c=>{ try{ return JSON.parse(c.widgetOptions||"{}").choices||null; }catch(e){ return null; } };
  const choiceColorsOf=c=>{ try{ const o=JSON.parse(c.widgetOptions||"{}").choiceOptions||{}; const m={};
    for(const k in o){ if(o[k]&&o[k].fillColor) m[k]=o[k].fillColor; } return m; }catch(e){ return {}; } };
  const bestLabelCol=tid=>{ const cs=colsOf(tid).filter(isEditable);
    return ((cs.find(c=>/full|name|title|label|desc/i.test(c.colId))||cs.find(c=>(c.type||"").startsWith("Text"))||cs[0]||{}).colId)||null; };
  function refInfo(parentTableId,colId){
    const col=colsOf(parentTableId).find(c=>c.colId===colId); if(!col)return null;
    const m=/^Ref(?:List)?:(.+)$/.exec(col.type||""); if(!m)return null;
    const targetTableId=m[1], vis=col.visibleCol&&colByRowId[col.visibleCol];
    return { colId, targetTableId, labelCol:(vis&&vis.colId)||bestLabelCol(targetTableId),
      editable:colsOf(targetTableId).filter(isEditable) };
  }
  function colChoices(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choicesOf(c):null; }
  function colChoiceColors(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choiceColorsOf(c):{}; }
  return { refInfo, colChoices, colChoiceColors };
}
function applyStatusSchema(sc){
  try{
    const names=sc.colChoices("Stone_Order","Order_Status");
    const colors=sc.colChoiceColors("Stone_Order","Order_Status");
    if(names && names.length){
      Object.keys(ORD_C).forEach(k=>delete ORD_C[k]);
      names.forEach(n=>{ ORD_C[n]=(colors&&colors[n])||ORD_DEFAULT[n]||"#e9edf1"; });
      ORDS=names.slice();
    }
  }catch(e){ console.warn("status schema load failed",e); }
}

async function pullTables(){
  const [so,jd]=await Promise.all([
    grist.docApi.fetchTable("Stone_Order"),
    grist.docApi.fetchTable("Jobs_Detail")]);
  state.stone=columnarToRows(so); state.jobs=columnarToRows(jd);
  if(state.ref.product){
    try{ const cat=await grist.docApi.fetchTable(state.ref.product.targetTableId); state.catalogue=columnarToRows(cat); }catch(e){}
  }
  if(state.ref.client){
    try{ const cl=await grist.docApi.fetchTable(state.ref.client.targetTableId); state.clients=columnarToRows(cl); }catch(e){}
  }
  reindex();
}
async function refetch(){ if(!state.grist)return; try{ await pullTables(); }catch(e){ console.warn("fetch failed",e); } render(); }

// ============================================================
//  GRIST WIRING - sample first, flip to live once Grist answers
// ============================================================
if(typeof grist!=="undefined"){
  try{ grist.ready({ requiredAccess:"full" }); }catch(e){}
  try{ grist.onRecord(()=>{}); }catch(e){}   // stay mappable to Stone_Order without erroring
  grist.docApi.fetchTable("Stone_Order").then(async ()=>{
    try{
      const sc=await loadGristSchema();

    state.grist=true; render();
  }).catch(()=>{});
}
