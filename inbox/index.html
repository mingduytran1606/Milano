function columnarToRows(t){ if(!t||!t.id)return []; return t.id.map((id,i)=>{const o={id}; for(const k in t)if(k!=="id")o[k]=t[k][i]; return o;}); }
// Pull every table we need from Grist into state. Assumes a live Grist host.
async function pullTables(){
  const [jt,st,it]=await Promise.all([
    grist.docApi.fetchTable("Jobs_Detail"),
    grist.docApi.fetchTable("Stone_Order"),
    grist.docApi.fetchTable("Inst_")]);
  state.jobs=columnarToRows(jt); state.stone=columnarToRows(st); state.inst=columnarToRows(it);
  // option tables for the lookups (best-effort; a missing table just disables its picker)
  await Promise.all([
    state.ref.client  ? grist.docApi.fetchTable(state.ref.client.targetTableId ).then(t=>{state.clients  =columnarToRows(t);}).catch(()=>{}) : null,
    state.ref.product ? grist.docApi.fetchTable(state.ref.product.targetTableId).then(t=>{state.catalogue=columnarToRows(t);}).catch(()=>{}) : null,
  ]);
  syncChoiceMaps();   // pick up any stage/payment values present in freshly-pulled data
  if((state.selectedId==null || !selectedJob()) && state.jobs.length){ const f=filteredJobs()[0]; state.selectedId=f?f.id:state.jobs[0].id; }
}
// Re-pull after an edit. Guarded so demo-mode callers never touch Grist.
async function refetch(){
  if(!state.grist)return;
  try{ await pullTables(); }catch(e){ console.warn("fetch failed",e); }
  renderAll();
}

// ============================================================
//  GRIST WIRING  (see brief §5.6)
// ============================================================
// grist-plugin-api.js loads from a public URL even outside Grist, so the mere
// presence of `grist` doesn't mean we're embedded. We render sample data first
// (in BOOT, below) so the pane is never blank in a plain browser / preview /
// artifact, then — only once Grist actually answers — flip to live mode, swap
// in the real tables and re-render. Edits write back to Grist only after that
// flip; before it (or when there's no Grist at all) they mutate the local demo.
function goLive(){ if(!state.grist) state.grist=true; }
if(typeof grist!=="undefined"){
  try{ grist.ready({ requiredAccess:"full" }); }catch(e){}
  // Remember the cursor selection; only render live once we've actually flipped.
  try{ grist.onRecord(rec=>{ if(rec && rec.id!=null) state.selectedId=rec.id; if(state.grist){ renderList(); renderDetail(); } }); }catch(e){}
  // Shared card template — stored in the widget's doc options so it applies to EVERY viewer.
  // Team design lives in the widget's doc options. It is adopted only while this
  // viewer is "following" it (templateShared): saving "for everyone" turns that
  // on, saving "just for me" turns it off. First run follows an existing team
  // design. Each key is adopted only when it actually differs (no loops, and an
  // in-progress card edit isn't clobbered).
  try{ grist.onOptions(opts=>{
    opts=opts||{};
    // Shared views are per-view team assets — adopted by EVERYONE, independent of
    // the design-following toggle. Merge team views with this viewer's personal ones.
    const incViews = Array.isArray(opts.sharedViews) ? opts.sharedViews : null;
    if(incViews){
      const personal=state.savedViews.filter(v=>!v.shared);
      const merged=incViews.map(v=>({name:v.name,config:v.config,shared:true}));
      personal.forEach(v=>{ if(!merged.some(x=>x.name===v.name)) merged.push(v); });
      if(JSON.stringify(merged)!==JSON.stringify(state.savedViews)){ state.savedViews=merged; renderList(); updateToolbar(); }
    }
    // Stage order — a team ordering adopted by everyone following it (also independent of the design toggle).
    if(Array.isArray(opts.sharedStageOrder) && opts.sharedStageOrder.length){
      if(state.stageOrderShared==null) state.stageOrderShared=true;   // first run: follow the team order if one exists
      if(state.stageOrderShared && JSON.stringify(opts.sharedStageOrder)!==JSON.stringify(state.stageOrder)){
        state.stageOrder=opts.sharedStageOrder.slice(); normalizeStageOrder(); renderList(); updateToolbar();
      }
    }
    const shared=(typeof opts.cardTemplate==="string" && opts.cardTemplate.trim())?opts.cardTemplate:null;
    state._sharedTemplate=shared;
    if(state.templateShared==null) state.templateShared=!!shared;   // first run: follow the team design if one exists
    if(!state.templateShared) return;                               // saved "just for me" → keep local design
    const editing=!document.getElementById("cardModal").hidden;
    const J=v=>JSON.stringify(v);
    let changed=false, fontChanged=false, colorChanged=false;
    if(!editing && shared!=null && state.cardTemplate!==shared){ state.cardTemplate=shared; changed=true; }
    // NB: the active grouping is intentionally NOT adopted — it's personal, so the
    // widget always defaults to "No grouping" and the team's grouping is never forced.
    if(Array.isArray(opts.savedGroupings) && J(opts.savedGroupings)!==J(state.savedGroupings)){ state.savedGroupings=opts.savedGroupings.slice(); }
    if(typeof opts.cardFontSize==="number" && opts.cardFontSize!==state.cardFontSize){ state.cardFontSize=opts.cardFontSize; fontChanged=true; }
    if(opts.listCardFont && J(opts.listCardFont)!==J(state.listCardFont)){ state.listCardFont=Object.assign({},LIST_CARD_FONT,opts.listCardFont); fontChanged=true; }
    if(opts.summaryFont && J(opts.summaryFont)!==J(state.summaryFont)){ state.summaryFont=Object.assign({},SUMMARY_FONT,opts.summaryFont); changed=true; }
    if(opts.fields && J(opts.fields)!==J(state.fields)){ state.fields=Object.assign(defaultFields(),opts.fields); changed=true; }
    if(opts.colors && J(opts.colors)!==J(state.colors)){ state.colors=normalizeColors(opts.colors); colorChanged=true; }
    if(colorChanged){ applyColorOverrides(); syncChoiceMaps(); changed=true; }
    if(fontChanged){ applyCardFont(); changed=true; }
    _sharedSig=J(sharedConfigObj());               // remember what the team design looks like
    if(changed){ renderAll(); if(!document.getElementById("fmtPanel").hidden) buildFormatPanel(); }
  }); }catch(e){}
  // This resolves only when a real Grist host answers; otherwise we stay in demo
  // mode instead of hanging. We load the schema and real tables FIRST, then flip
  // to live — so no edit in the connecting window can write a sample row-id.
  grist.docApi.fetchTable("Jobs_Detail").then(async ()=>{
    try{
      const sc=await loadGristSchema();
      state.ref.client =sc.refInfo("Jobs_Detail","Client_Name");
      state.ref.product=sc.refInfo("Stone_Order","Product");
      state.assignChoices=sc.colChoices("Jobs_Detail","Assigned_To")||null;
      applyGristChoices(sc);
      finishRefSetup();
    }catch(e){ state.ref.client=null; state.ref.product=null; console.warn("schema introspection failed — lookups disabled",e); }
    try{ await pullTables(); }catch(e){ console.warn("initial fetch failed",e); }
    goLive();
    renderAll();
  }).catch(()=>{});
}
