<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milano — Catalogue Search</title>
<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4;
    --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --danger:#e5484d;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
      --line:#2a323b; --line2:#232a32;
      --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
      --shadow:0 1px 2px rgba(0,0,0,.4);}
  }
  :root[data-theme="light"]{ --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4; --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);}
  :root[data-theme="dark"]{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
    --line:#2a323b; --line2:#232a32; --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
    --shadow:0 1px 2px rgba(0,0,0,.4);}

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{height:100%;display:flex;gap:8px;padding:14px}

  /* ---------- catalogue search (left) ---------- */
  .search-pane{flex:0 0 372px;display:flex;flex-direction:column;min-height:0;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  .search-head{padding:12px 14px 10px;display:flex;flex-direction:column;gap:9px;border-bottom:1px solid var(--line2)}
  .search-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .search-title .count{background:var(--line2);color:var(--muted);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
  .search{position:relative}
  .search input{width:100%;font:inherit;font-size:13px;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:9px 30px 9px 32px}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .search .sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    stroke:var(--muted);fill:none}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--muted);
    cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:6px}
  .search .clr:hover{background:var(--line2);color:var(--ink)}

  .results{flex:1 1 auto;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
  .results::-webkit-scrollbar{width:9px}
  .results::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .res-empty{color:var(--muted);text-align:center;padding:34px 14px;font-size:12.5px}

  .ccard{border:1px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer;
    background:var(--panel);display:flex;flex-direction:column;gap:6px;transition:border-color .1s,box-shadow .1s}
  .ccard:hover{border-color:var(--accent)}
  .ccard.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),var(--shadow);background:var(--accent-soft)}
  .ccard .ctop{display:flex;align-items:center;gap:7px}
  .ccard .csup{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--line2);border-radius:6px;
    padding:1px 6px;white-space:nowrap}
  .ccard .cspacer{flex:1 1 auto}
  .ccard .cprice{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
  .ccard .cname{font-weight:600;font-size:13px;line-height:1.3;word-break:break-word}
  .ccard .cmeta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .ccard .ccode{font-variant-numeric:tabular-nums}
  .ccard .cbadge{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);
    border-radius:999px;padding:1px 8px}
  .ccard .cbadge.zero{color:var(--muted);background:var(--line2)}

  /* ---------- splitter ---------- */
  .splitter{flex:0 0 7px;cursor:col-resize;align-self:stretch;position:relative}
  .splitter::after{content:"";position:absolute;left:2px;right:2px;top:0;bottom:0;border-radius:3px;background:var(--line)}
  .splitter:hover::after,.splitter.drag::after{background:var(--accent)}

  /* ---------- history (right) ---------- */
  .detail-pane{flex:1 1 auto;min-width:0;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .detail-empty{flex:1 1 auto;display:flex;align-items:center;justify-content:center;color:var(--muted);
    text-align:center;font-size:13px;padding:40px;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

  /* three separate panels: profile · active orders · monthly history */
  .section{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:15px 17px}
  .section-h{display:flex;align-items:baseline;gap:9px;margin-bottom:11px}
  .section-h .st{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .section-h .sc{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:999px;padding:1px 8px}
  .section-h .ssub{font-size:11.5px;color:var(--muted)}
  .view-sub{font-size:11.5px;color:var(--muted);margin:-2px 0 8px 2px}
  .hro{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink);padding:3px 2px;text-align:right}

  .prod-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .prof-life{margin-top:12px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .prof-life .lb b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .prod-title{flex:1 1 auto;min-width:0}
  .prod-name{font-size:21px;font-weight:700;line-height:1.25;word-break:break-word}
  .prod-sub{margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
  .prod-sub .psup{font-weight:700;background:var(--line2);border-radius:7px;padding:2px 8px;color:var(--ink)}
  .prod-price{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
  .prod-price small{font-size:11px;font-weight:600;color:var(--muted);display:block;text-align:right;letter-spacing:.03em;text-transform:uppercase}

  /* ---------- month picker pills ---------- */
  .mrow{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 6px}
  .mpill{font:inherit;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer;
    white-space:nowrap}
  .mpill:hover{border-color:var(--accent)}
  .mpill.empty{color:var(--muted)}
  .mpill.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .mpill .mp-n{font-size:10.5px;font-weight:700;background:var(--line2);color:var(--muted);border-radius:999px;padding:0 6px;line-height:16px}
  .mpill.on .mp-n{background:rgba(255,255,255,.28);color:#fff}

  .hist-stats{display:flex;gap:9px;flex-wrap:wrap;margin:14px 0 6px}
  .stat{flex:1 1 120px;min-width:110px;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:8px 12px}
  .stat .sv{font-size:20px;font-weight:800;line-height:1.15;font-variant-numeric:tabular-nums}
  .stat .sl{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}

  .hist-h{margin:18px 0 8px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .htbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .htbl{min-width:900px}
  /* one shared column grid keeps the header, month bars and every order row aligned */
  .hgridrow{display:grid;
    grid-template-columns:minmax(180px,1.6fr) 146px 46px 124px 46px 124px 74px minmax(120px,1.3fr);
    gap:9px;align-items:center;padding:8px 12px}
  .htbl-head{background:var(--bg);border-bottom:1px solid var(--line);border-radius:12px 12px 0 0}
  .htbl-head .hh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);white-space:nowrap}
  .htbl-head .hh.n{text-align:right}
  /* month sub-header inside a grouped table (Status Summary) */
  .hmonth{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--accent-soft);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line2)}
  .hmonth .hm-name{font-weight:700;font-size:12px;color:var(--accent-ink)}
  .hmonth .hm-sum{display:flex;gap:12px;font-size:11.5px;color:var(--muted);margin-left:4px}
  .hmonth .hm-sum b{color:var(--ink);font-variant-numeric:tabular-nums}
  .hrow{border-top:1px solid var(--line2)}
  .hrow:hover{background:var(--line2)}
  .hjob{display:flex;align-items:center;gap:7px;min-width:0}
  .hjob .jobchip{font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:7px;padding:1px 8px;flex:0 0 auto}
  .hjob .jclient{font-weight:600;white-space:nowrap;flex:0 0 auto}
  .hjob .jaddr{color:var(--muted);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .hcell-in{font:inherit;font-size:12.5px;color:var(--ink);background:transparent;border:0;border-bottom:1px solid transparent;
    border-radius:0;padding:3px 2px;width:100%;min-width:0}
  .hcell-in:hover{border-bottom-color:var(--line)}
  .hcell-in:focus{outline:none;border-bottom-color:var(--accent)}
  input.hcell-in[type=number]{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;-moz-appearance:textfield}
  input.hcell-in[type=number]::-webkit-outer-spin-button,input.hcell-in[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input.hcell-in.short{color:var(--danger)}
  .hist-none{color:var(--muted);font-size:12.5px;padding:16px;text-align:center;border:1px dashed var(--line);border-radius:12px}

  /* ---------- pills ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;font-size:12px;
    font-weight:700;white-space:nowrap;line-height:1.5;color:var(--ink)}
  .pill.xs{font-size:10.5px;padding:1px 8px;gap:4px}
  .pill .pdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .pill-select{cursor:pointer}
  .pcaret{font-size:8px;opacity:.65}

  /* ---------- popovers ---------- */
  .pop{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    box-shadow:0 12px 34px rgba(16,24,40,.22);padding:5px;min-width:200px;max-height:62vh;overflow:auto}
  .pop[hidden]{display:none}
  .cprow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px;cursor:pointer}
  .cprow:hover,.cprow.on{background:var(--line2)}
  .cprow .rtick{margin-left:auto;color:var(--accent-ink);font-weight:800}

  /* ---------- floating column config ---------- */
  .cfg-fab{position:fixed;bottom:8px;right:8px;z-index:50;width:36px;height:36px;border-radius:50%;
    border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;font-size:16px;
    box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
  .cfg-fab:hover{color:var(--ink);border-color:var(--accent)}
  .cfgpop{min-width:252px}
  .cfg-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:4px 6px 8px}
  .cfgrow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px}
  .cfgrow:hover{background:var(--line2)}
  .cfgrow .ck{display:flex;align-items:center;gap:8px;flex:1 1 auto;cursor:pointer;font-size:12.5px}
  .cfgrow .ck input{accent-color:var(--accent)}
  .cfgrow .mv{color:var(--muted);cursor:pointer;padding:0 5px;border-radius:5px;font-size:13px;user-select:none}
  .cfgrow .mv:hover{background:var(--line);color:var(--ink)}
  .cfgrow .mv.off{opacity:.22;pointer-events:none}
  .cfg-foot{border-top:1px solid var(--line2);margin-top:6px;padding-top:5px}
  .cfg-reset{font:inherit;font-size:12px;color:var(--accent-ink);background:none;border:0;cursor:pointer;padding:5px 7px}
  .cfg-reset:hover{text-decoration:underline}

  .demo-tag{position:fixed;bottom:9px;left:11px;font-size:10px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:2px 9px;opacity:.75;z-index:40}
</style>
</head>
<body>
<div id="app">
  <div class="search-pane">
    <div class="search-head">
      <div class="search-title">Catalogue <span class="count" id="resCount">0</span></div>
      <div class="search">
        <svg class="sic" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="Search catalogue — product, code, supplier…" autocomplete="off">
        <span class="clr" id="qClr" title="Clear" hidden>&times;</span>
      </div>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="splitter" id="splitter"></div>

  <div class="detail-pane" id="detail"></div>
</div>

<button class="cfg-fab" id="cfgBtn" title="Configure table columns">&#9881;</button>
<div class="pop" id="choicePop" hidden></div>
<div class="pop" id="cfgPop" hidden></div>
<div class="demo-tag" id="demoTag" hidden>demo data</div>

<script>
"use strict";
/* ============================================================
   Milano — Catalogue Search widget
   Left: search the Catalogue (product · code · supplier).
   Right: click a product → its full ORDER HISTORY — every
   Stone_Order line that used it, across all jobs, with the
   order/delivery dates + qtys, status, INV and note. Each
   history row is editable in place and writes back to
   Stone_Order. Shares the Inbox / Board foundation: design
   tokens, the Order_Status model, and the Grist plumbing.
   ============================================================ */

// ---- status model (strings + colours must round-trip to Grist) ----
const ORD_DEFAULT = {
  "2.  Placed Order":"#FEF47A","3. Awaiting Order":"#FED6FB","6. Delivered":"#98FD90",
  "4. Awaiting Pickup":"#75B5FC","7. Not Delivered Yet":"#CCFEFE","5. On hold":"#FEE7C3",
  "1. No Stock":"#FD8182","Cancelled":"#DCDCDC","Delivered by WF":"#E1FEDE",
  "Delivered by Aboda":"#E1FEDE","Delivered by Client":"#E1FEDE","Return":"#CCFEFE","N/A":"#e9edf1"};
const ORD_C = Object.assign({}, ORD_DEFAULT);
let ORDS = Object.keys(ORD_C);
const statusColor = s => ORD_C[s] || "#e9edf1";
const statusLabel = s => (s==null||s==="") ? "To sort" : s;
const SPECIAL_COL = /^(manualSort|gristHelper_|id$)/;

// Auto-advance the status from the line's own data (mirrors Inbox §5).
const PRE_ORDER_STATES = ["","3. Awaiting Order","7. Not Delivered Yet","1. No Stock"];
function isDeliveredStatus(r){ const low=String(r.Order_Status||"").toLowerCase(); return /deliver/.test(low) && !/not deliver/.test(low); }
function autoStatus(r){
  const s=String(r.Order_Status||""), low=s.toLowerCase();
  if(/cancel|n\/a|return|on hold/.test(low)) return null;
  if(toDate(r.Delivery_Date) && !isDeliveredStatus(r)) return "6. Delivered";
  if(toDate(r.Order_Date) && PRE_ORDER_STATES.indexOf(s)>=0) return "2.  Placed Order";
  return null;
}

// ---- generic helpers (mirror the inbox / board for Grist correctness) ----
const $=(t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
function refId(v){ if(v==null)return null; if(typeof v==="number")return v;
  if(Array.isArray(v))return v[2]; if(typeof v==="object")return v.rowId!=null?v.rowId:v.id; return v; }
function toDate(v){ if(v==null||v==="")return null;
  if(typeof v==="number")return new Date(v*1000);
  if(v instanceof Date)return v;
  const d=new Date(v); return isNaN(d)?null:d; }
function fmtDMY(v){ const d=toDate(v); if(!d)return "";
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function dateInput(v){ const d=toDate(v); if(!d)return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function toEpochSec(str){ if(!str)return null; const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/1000); }
const num=v=>{ const n=Number(v); return isFinite(n)?n:0; };
function esc(v){ return v==null?"":String(v); }
function columnarToRows(t){ if(!t||!t.id)return []; return t.id.map((id,i)=>{const o={id}; for(const k in t)if(k!=="id")o[k]=t[k][i]; return o;}); }
function hexRgb(h){ h=String(h||"").replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join("");
  return {r:parseInt(h.slice(0,2),16)||0,g:parseInt(h.slice(2,4),16)||0,b:parseInt(h.slice(4,6),16)||0}; }
function softTint(hex){ const {r,g,b}=hexRgb(hex||"#cfd4d1");
  const bg="rgb("+Math.round(r+(255-r)*.72)+","+Math.round(g+(255-g)*.72)+","+Math.round(b+(255-b)*.72)+")";
  const dot="rgb("+Math.round(r*.66)+","+Math.round(g*.66)+","+Math.round(b*.66)+")";
  return {bg,dot}; }
function relDays(v){ const d=toDate(v); if(!d) return null;
  const t=new Date(), a=new Date(t.getFullYear(),t.getMonth(),t.getDate()), b=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  return Math.round((a-b)/86400000); }
function agoText(verb,n){ if(n==null) return "";
  if(n===0) return verb+" today";
  if(n<0) return verb+" in "+(-n)+(-n===1?" day":" days");
  return verb+" "+n+(n===1?" day":" days")+" ago"; }

// ---- state ----
const LSKEY="milano_catalogue_prefs_v1";
const state={
  stone:[], jobs:[], catalogue:[], grist:false,
  ref:{ product:null },
  q:"", selectedCatId:null, selectedMonth:null, statusView:"active", searchW:null, colCfg:null,
  jobById:{}, catById:{}, ordersByCat:{}
};
window._catsearch=state;
function loadPrefs(){ try{ return JSON.parse(localStorage.getItem(LSKEY))||{}; }catch(e){ return {}; } }
function savePrefs(){ try{ localStorage.setItem(LSKEY, JSON.stringify({ searchW:state.searchW, colCfg:state.colCfg })); }catch(e){} }

// ---- lookups ----
function reindex(){
  state.jobById={}; state.jobs.forEach(j=>state.jobById[j.id]=j);
  state.catById={}; state.catalogue.forEach(c=>state.catById[c.id]=c);
  // Group every stone line under the catalogue product it references.
  state.ordersByCat={};
  (state.stone||[]).forEach(r=>{ const pid=refId(r.Product); if(pid==null)return;
    (state.ordersByCat[pid]=state.ordersByCat[pid]||[]).push(r); });
}
function jobFor(r){ return state.jobById[refId(r.Job)]||null; }
function catLabel(c){ return (c.Product_Full && String(c.Product_Full).trim())
  || [c.Supplier,c.Code].filter(Boolean).join(" · ") || ("#"+c.id); }
function catalogueHaystack(c){ let s=catLabel(c)||"";
  for(const k in c){ if(k==="id")continue; const v=c[k]; if(typeof v==="string") s+=" "+v; } return s.toLowerCase(); }
function priceOf(c){ const v=c&&c.Price_Slab; return (v!=null&&v!=="")?v:0; }
function ordersFor(catId){ return state.ordersByCat[catId]||[]; }
function jobClient(j){ return j ? ((String(j.Client_Label||"")).trim() || (String(j.Job_Address||"")).trim() || j.Job_ID || ("#"+j.id)) : "—"; }
function jobAddr(j){ return j ? ((String(j.Address_Formatted||j.Job_Address||"")).trim()) : ""; }
function jobCode(j){ return j ? (j.Job_ID || ("#"+j.id)) : ""; }

// ============================================================
//  SEARCH — rank catalogue products by closeness to the query
// ============================================================
function scoreText(hay,q){
  if(!hay) return 0; hay=String(hay).toLowerCase();
  if(hay===q) return 100;
  if(hay.startsWith(q)) return 78;
  if(new RegExp("\\b"+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).test(hay)) return 60;
  const i=hay.indexOf(q); if(i<0) return 0;
  return 42-Math.min(i,20);
}
function scoreCat(c,q){
  let best=0;
  [catLabel(c), c.Code, c.Supplier].forEach(f=>{ const s=scoreText(f,q); if(s>best)best=s; });
  if(best===0 && catalogueHaystack(c).includes(q)) best=20;   // any other string field
  return best;
}
function rankedCatalogue(){
  const q=state.q.trim().toLowerCase();
  const list=state.catalogue||[];
  if(!q) return [...list].sort((a,b)=>catLabel(a).localeCompare(catLabel(b)));
  return list.map(c=>({c,s:scoreCat(c,q)}))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s || catLabel(a.c).localeCompare(catLabel(b.c)))
    .map(x=>x.c);
}

function renderDetail(){
  const app=document.getElementById("detail"); app.innerHTML="";
  const c=state.catById[state.selectedCatId];
  if(!c){ app.appendChild($("div","detail-empty","Search the catalogue, then pick a product to see its profile and order history.")); return; }
  const allOrders=ordersFor(c.id);
  const byDateDesc=(a,b)=>{ const da=+toDate(a.Order_Date)||0, db=+toDate(b.Order_Date)||0; return db-da || (b.id||0)-(a.id||0); };

  // ═══ Section 1 — Stone profile ═══
  const s1=$("div","section");
  const head=$("div","prod-head");
  const tw=$("div","prod-title");
  tw.appendChild($("div","prod-name",catLabel(c)));
  const sub=$("div","prod-sub");

  if(c.Code) sub.appendChild($("span",null,"Code "+c.Code));
  tw.appendChild(sub);
  head.appendChild(tw);
  const price=$("div","prod-price"); price.appendChild(document.createTextNode("$"+priceOf(c)));
  price.appendChild($("small",null,"per slab")); head.appendChild(price);
  s1.appendChild(head);
  // all-time context (the scoreboard below is month-scoped, so summarise lifetime here)
  const lifeJobs=new Set(allOrders.map(r=>refId(r.Job)).filter(v=>v!=null));
  const lifeOrd=allOrders.reduce((s,r)=>s+num(r.Ordered_Qty),0);
  const lifeDel=allOrders.reduce((s,r)=>s+num(r.Delivery_Qty),0);
  const life=$("div","prof-life");
  life.appendChild(lifeBit(allOrders.length,"orders all-time"));
  life.appendChild(lifeBit(lifeJobs.size,"jobs"));
  life.appendChild(lifeBit(lifeOrd,"slabs ordered"));
  life.appendChild(lifeBit(lifeDel,"slabs delivered"));
  s1.appendChild(life);
  app.appendChild(s1);

  // ═══ Section 2 — Status Summary (pills switch the status view; grouped by date) ═══
  const s2=$("div","section");
  s2.appendChild(sectionHead("Status summary",null,null));
  const VIEWS=[
    { key:"active",    label:"Active order", sub:"placed & awaiting delivery", filter:isActiveOrder,       dateField:"Order_Date",    empty:"No active orders — nothing placed and awaiting delivery." },
    { key:"delivered", label:"Delivered",    sub:"grouped by delivery date",   filter:isDeliveredStatus,   dateField:"Delivery_Date", empty:"Nothing delivered for this product yet." }
  ];
  let sv=state.statusView; if(!VIEWS.some(v=>v.key===sv)) sv="active"; state.statusView=sv;
  const svrow=$("div","mrow");
  VIEWS.forEach(v=>{
    const rows=allOrders.filter(v.filter);
    const p=$("button","mpill"+(sv===v.key?" on":"")+(rows.length?"":" empty"));
    p.appendChild($("span","mp-name",v.label));
    if(rows.length) p.appendChild($("span","mp-n",String(rows.length)));
    p.onclick=()=>{ state.statusView=v.key; renderDetail(); };
    svrow.appendChild(p);
  });
  s2.appendChild(svrow);
  const view=VIEWS.find(v=>v.key===sv);
  const svRows=allOrders.filter(view.filter);
  if(view.sub) s2.appendChild($("div","view-sub",view.sub));
  if(!svRows.length) s2.appendChild($("div","hist-none",view.empty));
  else s2.appendChild(groupedOrderTable(svRows, view.dateField));
  app.appendChild(s2);

  // ═══ Section 3 — Order history by month ═══
  const s3=$("div","section");
  s3.appendChild(sectionHead("Order history",null,null));

  const curKey=currentMonthKey();
  const keySet=new Set(allOrders.map(monthKeyOf).filter(k=>k!=null));
  keySet.add(curKey);                                  // this month is always offered
  const monthKeys=[...keySet].sort((a,b)=>b-a);        // newest first
  const hasUndated=allOrders.some(r=>monthKeyOf(r)==null);

  // resolve the active selection against what this product actually has
  let sel=state.selectedMonth;
  if(sel==="undated"){ if(!hasUndated) sel=curKey; }
  else if(!(typeof sel==="number" && keySet.has(sel))) sel=curKey;
  state.selectedMonth=sel;

  const countIn=k=>allOrders.filter(r=>monthKeyOf(r)===k).length;
  const mrow=$("div","mrow");
  monthKeys.forEach(k=>{
    const p=$("button","mpill"+(sel===k?" on":"")+(countIn(k)?"":" empty"));
    p.appendChild($("span","mp-name",monthPillLabel(k)));
    const n=countIn(k); if(n) p.appendChild($("span","mp-n",String(n)));
    p.onclick=()=>{ state.selectedMonth=k; renderDetail(); };
    mrow.appendChild(p);
  });
  if(hasUndated){
    const p=$("button","mpill"+(sel==="undated"?" on":""));
    p.appendChild($("span","mp-name","No date"));
    p.appendChild($("span","mp-n",String(allOrders.filter(r=>monthKeyOf(r)==null).length)));
    p.onclick=()=>{ state.selectedMonth="undated"; renderDetail(); };
    mrow.appendChild(p);
  }
  s3.appendChild(mrow);

  // orders in the selected month, most-recent first
  const orders=allOrders.filter(r=> sel==="undated" ? monthKeyOf(r)==null : monthKeyOf(r)===sel).slice().sort(byDateDesc);

  // scoreboard (for the selected month)
  const jobs=new Set(orders.map(r=>refId(r.Job)).filter(v=>v!=null));
  const ordered=orders.reduce((s,r)=>s+num(r.Ordered_Qty),0);
  const delivered=orders.reduce((s,r)=>s+num(r.Delivery_Qty),0);
  const stats=$("div","hist-stats");
  stats.appendChild(stat(orders.length,"orders"));
  stats.appendChild(stat(jobs.size,"jobs"));
  stats.appendChild(stat(ordered,"slabs ordered"));
  stats.appendChild(stat(delivered,"slabs delivered"));
  s3.appendChild(stats);

  const selLabel = sel==="undated" ? "orders with no order date" : monthLabelOf(sel);
  if(!orders.length) s3.appendChild($("div","hist-none","No orders for this product in "+selLabel+"."));
  else s3.appendChild(orderTable(orders));
  app.appendChild(s3);
}

// Table split into month sub-sections by `dateField`, each with a subtotal.
function groupedOrderTable(rows,dateField){
  const vis=visibleCols(), tpl=gridTemplate(vis);
  const groups=[]; const gmap={};
  rows.forEach(r=>{ const k=monthKeyByField(r,dateField); let g=gmap[k]; if(!g){g={key:k,rows:[]};gmap[k]=g;groups.push(g);} g.rows.push(r); });
  groups.forEach(g=>g.rows.sort((a,b)=>{ const da=+toDate(a[dateField])||0, db=+toDate(b[dateField])||0; return db-da||(b.id||0)-(a.id||0); }));
  groups.sort((a,b)=>{ if(a.key==null)return 1; if(b.key==null)return -1; return b.key-a.key; });
  const wrap=$("div","htbl-wrap"); const tbl=$("div","htbl"); tbl.style.minWidth=minWidthOf(vis)+"px";
  tbl.appendChild(headerRow(vis,tpl));
  groups.forEach(g=>{
    const ord=g.rows.reduce((s,r)=>s+num(r.Ordered_Qty),0);
    const del=g.rows.reduce((s,r)=>s+num(r.Delivery_Qty),0);
    const mb=$("div","hmonth");
    mb.appendChild($("span","hm-name",monthLabelOf(g.key)));
    const sum=$("span","hm-sum");
    sum.appendChild($("span",null,g.rows.length+" order"+(g.rows.length===1?"":"s")));
    const so=$("span"); so.appendChild(document.createTextNode("ordered ")); so.appendChild($("b",null,String(ord))); sum.appendChild(so);
    const sd=$("span"); sd.appendChild(document.createTextNode("delivered ")); sd.appendChild($("b",null,String(del))); sum.appendChild(sd);
    mb.appendChild(sum);
    tbl.appendChild(mb);
    g.rows.forEach(r=>tbl.appendChild(orderRow(r,vis,tpl)));
  });
  wrap.appendChild(tbl); return wrap;
}

// ============================================================
//  SCHEMA INTROSPECTION (Product ref target + live status choices/colours)
// ============================================================
async function loadGristSchema(){
  const [T,C]=await Promise.all([
    grist.docApi.fetchTable("_grist_Tables"),
    grist.docApi.fetchTable("_grist_Tables_column")]);
  const tables=columnarToRows(T), cols=columnarToRows(C);
  const tableById={}; tables.forEach(t=>tableById[t.tableId]=t);
  const colByRowId={}; cols.forEach(c=>colByRowId[c.id]=c);
  const colsOf=tid=>{ const t=tableById[tid]; return t?cols.filter(c=>c.parentId===t.id):[]; };
  const isEditable=c=>!c.isFormula && c.colId && !SPECIAL_COL.test(c.colId);
  const choicesOf=c=>{ try{ return JSON.parse(c.widgetOptions||"{}").choices||null; }catch(e){ return null; } };
  const choiceColorsOf=c=>{ try{ const o=JSON.parse(c.widgetOptions||"{}").choiceOptions||{}; const m={};
    for(const k in o){ if(o[k]&&o[k].fillColor) m[k]=o[k].fillColor; } return m; }catch(e){ return {}; } };
  const bestLabelCol=tid=>{ const cs=colsOf(tid).filter(isEditable);
    return ((cs.find(c=>/full|name|title|label|desc/i.test(c.colId))||cs.find(c=>(c.type||"").startsWith("Text"))||cs[0]||{}).colId)||null; };
  function refInfo(parentTableId,colId){
    const col=colsOf(parentTableId).find(c=>c.colId===colId); if(!col)return null;
    const m=/^Ref(?:List)?:(.+)$/.exec(col.type||""); if(!m)return null;
    const targetTableId=m[1], vis=col.visibleCol&&colByRowId[col.visibleCol];
    return { colId, targetTableId, labelCol:(vis&&vis.colId)||bestLabelCol(targetTableId) };
  }
  function colChoices(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choicesOf(c):null; }
  function colChoiceColors(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choiceColorsOf(c):{}; }
  return { refInfo, colChoices, colChoiceColors };
}
function applyStatusSchema(sc){
  try{
    const names=sc.colChoices("Stone_Order","Order_Status");
    const colors=sc.colChoiceColors("Stone_Order","Order_Status");
    if(names && names.length){
      Object.keys(ORD_C).forEach(k=>delete ORD_C[k]);
      names.forEach(n=>{ ORD_C[n]=(colors&&colors[n])||ORD_DEFAULT[n]||"#e9edf1"; });
      ORDS=names.slice();
    }
  }catch(e){ console.warn("status schema load failed",e); }
}

    try{
      const sc=await loadGristSchema();
      state.ref.product=sc.refInfo("Stone_Order","Product");
      applyStatusSchema(sc);
    }catch(e){ console.warn("schema introspection failed",e); }
    try{ await pullTables(); }catch(e){ console.warn("initial fetch failed",e); }
    state.grist=true; render();
  }).catch(()=>{});
}

function initSplitter(){
  const sp=document.getElementById("splitter"), lp=document.querySelector(".search-pane");
  if(!sp||!lp) return;
  if(state.searchW) lp.style.flex="0 0 "+state.searchW+"px";
  sp.addEventListener("mousedown",e=>{
    e.preventDefault(); sp.classList.add("drag");
    const startX=e.clientX, startW=lp.getBoundingClientRect().width;
    const mv=ev=>{ let w=startW+(ev.clientX-startX); w=Math.max(260,Math.min(w,Math.max(320,window.innerWidth-360))); lp.style.flex="0 0 "+w+"px"; };
    const up=()=>{ document.removeEventListener("mousemove",mv); document.removeEventListener("mouseup",up); sp.classList.remove("drag");
      state.searchW=Math.round(lp.getBoundingClientRect().width); savePrefs(); };
    document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
  });
}
