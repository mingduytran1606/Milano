<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milano — Stone Search</title>
<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4;
    --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --danger:#e5484d;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
      --line:#2a323b; --line2:#232a32;
      --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
      --shadow:0 1px 2px rgba(0,0,0,.4);}
  }
  :root[data-theme="light"]{ --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4; --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);}
  :root[data-theme="dark"]{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
    --line:#2a323b; --line2:#232a32; --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
    --shadow:0 1px 2px rgba(0,0,0,.4);}

  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{height:100%;display:flex;gap:8px;padding:14px}

  /* ---------- search / results (left) ---------- */
  .search-pane{flex:0 0 360px;display:flex;flex-direction:column;min-height:0;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  .search-head{padding:12px 14px 10px;display:flex;flex-direction:column;gap:9px;border-bottom:1px solid var(--line2)}
  .search-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:8px}
  .search-title .count{background:var(--line2);color:var(--muted);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
  .search{position:relative}
  .search input{width:100%;font:inherit;font-size:13px;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:9px 30px 9px 32px}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .search .sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:15px;height:15px;
    stroke:var(--muted);fill:none}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--muted);
    cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:6px}
  .search .clr:hover{background:var(--line2);color:var(--ink)}

  .results{flex:1 1 auto;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
  .results::-webkit-scrollbar{width:9px}
  .results::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .res-empty{color:var(--muted);text-align:center;padding:34px 14px;font-size:12.5px}

  .rcard{border:1px solid var(--line);border-radius:11px;padding:9px 10px;cursor:pointer;
    background:var(--panel);display:flex;flex-direction:column;gap:6px;transition:border-color .1s,box-shadow .1s}
  .rcard:hover{border-color:var(--accent)}
  .rcard.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent),var(--shadow);background:var(--accent-soft)}
  .rcard .rtop{display:flex;align-items:center;gap:7px}
  .rcard .rsup{font-size:10.5px;font-weight:700;color:var(--muted);background:var(--line2);border-radius:6px;
    padding:1px 6px;white-space:nowrap}
  .rcard .rspacer{flex:1 1 auto}
  .rcard .rname{font-weight:600;font-size:13px;line-height:1.3;word-break:break-word}
  .rcard .rjob{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);min-width:0}
  .rcard .jobchip{font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:6px;
    padding:1px 6px;flex:0 0 auto}
  .rcard .rjaddr{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rcard .rqtys{display:flex;gap:6px;font-size:11px;color:var(--muted)}
  .rcard .rqtys b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}

  /* ---------- splitter ---------- */
  .splitter{flex:0 0 7px;cursor:col-resize;align-self:stretch;position:relative}
  .splitter::after{content:"";position:absolute;left:2px;right:2px;top:0;bottom:0;border-radius:3px;background:var(--line)}
  .splitter:hover::after,.splitter.drag::after{background:var(--accent)}

  /* ---------- breakdown (right) ---------- */
  .detail-pane{flex:1 1 auto;min-width:0;overflow-y:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 20px}
  .detail-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);
    text-align:center;font-size:13px;padding:30px}

  .bd-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .bd-titlewrap{flex:1 1 auto;min-width:0}
  .bd-title{font-size:20px;font-weight:700;line-height:1.25;word-break:break-word;display:flex;align-items:center;gap:8px}
  .bd-title .pencil{opacity:.5;cursor:pointer;font-size:15px;color:var(--muted)}
  .bd-title .pencil:hover{opacity:1;color:var(--ink)}
  .bd-subline{margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12.5px}
  .bd-sup{font-weight:700;background:var(--line2);border-radius:7px;padding:2px 8px;color:var(--ink)}

  .bd-job{margin:16px 0;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--bg)}
  .bd-job .jl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .bd-job .jrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .bd-job .jobchip{font-weight:700;color:var(--accent-ink);background:var(--accent-soft);border-radius:7px;padding:2px 9px}
  .bd-job .jclient{font-weight:600;font-size:15px}
  .bd-job .jaddr{color:var(--muted);font-size:12.5px}
  .bd-job .jstage{margin-left:auto}

  .bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
  @media (max-width:720px){ .bd-grid{grid-template-columns:1fr} }
  .bd-sec{border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .bd-sec h4{margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:7px}
  .bd-sec h4 .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .bd-field{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0}
  .bd-field+.bd-field{border-top:1px solid var(--line2)}
  .bd-field .fl{font-size:12.5px;color:var(--muted)}
  .bd-field .fv{font-size:13.5px;font-weight:600;text-align:right;min-width:0}
  .bd-field .fv.short{color:var(--danger)}
  .bd-field input[type=number]{width:74px;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink);
    background:transparent;border:0;border-bottom:1px solid var(--line);border-radius:0;padding:3px 2px;text-align:right;
    font-variant-numeric:tabular-nums;-moz-appearance:textfield}
  .bd-field input[type=number]::-webkit-outer-spin-button,.bd-field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .bd-field input[type=number]:focus{outline:none;border-bottom-color:var(--accent)}
  .bd-field input[type=date]{font:inherit;font-size:13px;color:var(--ink);background:transparent;
    border:0;border-bottom:1px solid var(--line);border-radius:0;padding:3px 2px}
  .bd-field input[type=date]:focus{outline:none;border-bottom-color:var(--accent)}
  .bd-field input[type=text]{font:inherit;font-size:13.5px;font-weight:600;color:var(--ink);background:transparent;
    border:0;border-bottom:1px dashed var(--line);border-radius:0;padding:3px 2px;text-align:right;max-width:150px}
  .bd-field input[type=text]:focus{outline:none;border-bottom-style:solid;border-bottom-color:var(--accent)}
  .bd-age{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:8px}

  .bd-note{margin-top:14px}
  .bd-note label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
  .bd-note textarea{width:100%;font:inherit;font-size:13px;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:10px;padding:9px 11px;resize:vertical;min-height:56px;line-height:1.45}
  .bd-note textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}

  /* ---------- pills ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;font-size:12px;
    font-weight:700;white-space:nowrap;line-height:1.5;color:var(--ink)}
  .pill.xs{font-size:10.5px;padding:1px 8px;gap:4px}
  .pill .pdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .pill-select{cursor:pointer}
  .pcaret{font-size:8px;opacity:.65}

  /* ---------- popovers ---------- */
  .pop{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--line);border-radius:11px;
    box-shadow:0 12px 34px rgba(16,24,40,.22);padding:5px;min-width:200px;max-height:62vh;overflow:auto}
  .pop[hidden]{display:none}
  .cprow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:8px;cursor:pointer}
  .cprow:hover,.cprow.on{background:var(--line2)}
  .cprow .rtick{margin-left:auto;color:var(--accent-ink);font-weight:800}
  .pp-search input{width:100%;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--bg);
    color:var(--ink);font-size:12.5px;outline:none;font-family:inherit}
  .pp-list{margin-top:5px;max-height:46vh;overflow:auto}
  .pp-row{padding:7px 8px;border-radius:7px;cursor:pointer;font-size:12.5px}
  .pp-row:hover,.pp-row.on{background:var(--line2)}
  .pp-empty{padding:8px;color:var(--muted);font-size:12px;text-align:center}

  .demo-tag{position:fixed;bottom:9px;right:11px;font-size:10px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:20px;padding:2px 9px;opacity:.75;z-index:40}
</style>
</head>
<body>
<div id="app">
  <div class="search-pane">
    <div class="search-head">
      <div class="search-title">Stone search <span class="count" id="resCount">0</span></div>
      <div class="search">
        <svg class="sic" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="Search stone, code, supplier, job, client, INV…" autocomplete="off">
        <span class="clr" id="qClr" title="Clear" hidden>&times;</span>
      </div>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="splitter" id="splitter"></div>

  <div class="detail-pane" id="detail"></div>
</div>

<div class="pop" id="choicePop" hidden></div>
<div class="pop" id="prodPicker" hidden></div>
<div class="demo-tag" id="demoTag" hidden>demo data</div>

<script>
"use strict";
/* ============================================================
   Milano — Stone Search widget
   Left: search bar + a ranked list of matching stone lines.
   Right: the selected stone's full breakdown — order info,
   delivery info, and the job it belongs to. Editable in place;
   writes straight back to the Stone_Order table.
   Shares the Inbox / Stone-Order-Board foundation: design tokens,
   the Order_Status model, and the Grist read/write plumbing.
   ============================================================ */

// ---- status model (strings + colours must round-trip to Grist) ----
const ORD_DEFAULT = {
  "2.  Placed Order":"#FEF47A","3. Awaiting Order":"#FED6FB","6. Delivered":"#98FD90",
  "4. Awaiting Pickup":"#75B5FC","7. Not Delivered Yet":"#CCFEFE","5. On hold":"#FEE7C3",
  "1. No Stock":"#FD8182","Cancelled":"#DCDCDC","Delivered by WF":"#E1FEDE",
  "Delivered by Aboda":"#E1FEDE","Delivered by Client":"#E1FEDE","Return":"#CCFEFE","N/A":"#e9edf1"};
const ORD_C = Object.assign({}, ORD_DEFAULT);
let ORDS = Object.keys(ORD_C);
const statusColor = s => ORD_C[s] || "#e9edf1";
const statusLabel = s => (s==null||s==="") ? "To sort" : s;
const SPECIAL_COL = /^(manualSort|gristHelper_|id$)/;

// Auto-advance the status from the line's own data (mirrors Inbox §5).
const PRE_ORDER_STATES = ["","3. Awaiting Order","7. Not Delivered Yet","1. No Stock"];
function isDeliveredStatus(r){ const low=String(r.Order_Status||"").toLowerCase(); return /deliver/.test(low) && !/not deliver/.test(low); }
function autoStatus(r){
  const s=String(r.Order_Status||""), low=s.toLowerCase();
  if(/cancel|n\/a|return|on hold/.test(low)) return null;
  if(toDate(r.Delivery_Date) && !isDeliveredStatus(r)) return "6. Delivered";
  if(toDate(r.Order_Date) && PRE_ORDER_STATES.indexOf(s)>=0) return "2.  Placed Order";
  return null;
}

// ---- generic helpers (mirror the inbox / board for Grist correctness) ----
const $=(t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
function refId(v){ if(v==null)return null; if(typeof v==="number")return v;
  if(Array.isArray(v))return v[2]; if(typeof v==="object")return v.rowId!=null?v.rowId:v.id; return v; }
function toDate(v){ if(v==null||v==="")return null;
  if(typeof v==="number")return new Date(v*1000);
  if(v instanceof Date)return v;
  const d=new Date(v); return isNaN(d)?null:d; }
function fmtDMY(v){ const d=toDate(v); if(!d)return "";
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function dateInput(v){ const d=toDate(v); if(!d)return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function toEpochSec(str){ if(!str)return null; const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/1000); }
const num=v=>{ const n=Number(v); return isFinite(n)?n:0; };
function esc(v){ return v==null?"":String(v); }
function columnarToRows(t){ if(!t||!t.id)return []; return t.id.map((id,i)=>{const o={id}; for(const k in t)if(k!=="id")o[k]=t[k][i]; return o;}); }
function hexRgb(h){ h=String(h||"").replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join("");
  return {r:parseInt(h.slice(0,2),16)||0,g:parseInt(h.slice(2,4),16)||0,b:parseInt(h.slice(4,6),16)||0}; }
// Calm tint (light bg + stronger dot) from a saturated Grist choice colour.
function softTint(hex){ const {r,g,b}=hexRgb(hex||"#cfd4d1");
  const bg="rgb("+Math.round(r+(255-r)*.72)+","+Math.round(g+(255-g)*.72)+","+Math.round(b+(255-b)*.72)+")";
  const dot="rgb("+Math.round(r*.66)+","+Math.round(g*.66)+","+Math.round(b*.66)+")";
  return {bg,dot}; }
function relDays(v){ const d=toDate(v); if(!d) return null;
  const t=new Date(), a=new Date(t.getFullYear(),t.getMonth(),t.getDate()), b=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  return Math.round((a-b)/86400000); }
function agoText(verb,n){ if(n==null) return "";
  if(n===0) return verb+" today";
  if(n<0) return verb+" in "+(-n)+(-n===1?" day":" days");
  return verb+" "+n+(n===1?" day":" days")+" ago"; }

// ---- state ----
const LSKEY="milano_stonesearch_prefs_v1";
const state={
  stone:[], jobs:[], catalogue:[], grist:false,
  ref:{ product:null },
  q:"", selectedId:null, searchW:null,
  jobById:{}, catById:{}
};
window._stonesearch=state;
function loadPrefs(){ try{ return JSON.parse(localStorage.getItem(LSKEY))||{}; }catch(e){ return {}; } }
function savePrefs(){ try{ localStorage.setItem(LSKEY, JSON.stringify({ searchW:state.searchW })); }catch(e){} }

// ---- lookups ----
function reindex(){
  state.jobById={}; state.jobs.forEach(j=>state.jobById[j.id]=j);
  state.catById={}; state.catalogue.forEach(c=>state.catById[c.id]=c);
}
function jobFor(r){ return state.jobById[refId(r.Job)]||null; }
function catFor(r){ return state.catById[refId(r.Product)]||null; }
function catLabel(c){ return (c.Product_Full && String(c.Product_Full).trim())
  || [c.Supplier,c.Code].filter(Boolean).join(" · ") || ("#"+c.id); }
function stoneProductLabel(r){
  const c=catFor(r); if(c){ const v=catLabel(c); if(v && v.trim()) return v; }
  if(r.Product_Code) return [r.Product_Supplier,r.Product_Code].filter(Boolean).join(" · ");
  if(r.Product_Supplier) return r.Product_Supplier;
  if(r.Stone) return r.Stone;
  return "—";
}
function supplierFor(r){ const c=catFor(r); return r.Product_Supplier || (c&&c.Supplier) || ""; }
function priceFor(r){ const c=catFor(r);
  const v=(r.Product_Price_slab!=null&&r.Product_Price_slab!=="")?r.Product_Price_slab:(c?c.Price_Slab:null);
  return (v!=null&&v!=="")?v:0; }
function jobClient(j){ return j ? ((String(j.Client_Label||"")).trim() || (String(j.Job_Address||"")).trim() || j.Job_ID || ("#"+j.id)) : "—"; }
function jobAddr(j){ return j ? ((String(j.Address_Formatted||j.Job_Address||"")).trim()) : ""; }
function jobCode(j){ return j ? (j.Job_ID || ("#"+j.id)) : ""; }

// ============================================================
//  SEARCH — rank stone lines by closeness to the query
// ============================================================
// Score one string against the query: exact > startsWith > word-start > substring.
function scoreText(hay,q){
  if(!hay) return 0; hay=String(hay).toLowerCase();
  if(hay===q) return 100;
  if(hay.startsWith(q)) return 78;
  if(new RegExp("\\b"+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).test(hay)) return 60;
  const i=hay.indexOf(q); if(i<0) return 0;
  return 42-Math.min(i,20);
}
// Best score for a stone line across its own + its job's fields.
function scoreStone(r,q){
  const j=jobFor(r);
  const fields=[
    stoneProductLabel(r), r.Product_Code, supplierFor(r), r.INV, r.Note,
    j&&j.Job_ID, j&&j.Client_Label, j&&j.Job_Address, j&&j.Address_Formatted, j&&j.Stage
  ];
  let best=0; fields.forEach(f=>{ const s=scoreText(f,q); if(s>best)best=s; });
  return best;
}
function rankedStones(){
  const q=state.q.trim().toLowerCase();
  if(!q) return [...state.stone].sort((a,b)=>(b.id||0)-(a.id||0));   // recent first when idle
  return state.stone
    .map(r=>({r,s:scoreStone(r,q)}))
    .filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s || (b.r.id||0)-(a.r.id||0))
    .map(x=>x.r);
}

// ============================================================
//  RENDER
// ============================================================
function render(){ reindex(); renderResults(); renderDetail(); }

function renderResults(){
  const wrap=document.getElementById("results"); wrap.innerHTML="";
  const rows=rankedStones();
  document.getElementById("resCount").textContent=rows.length;
  document.getElementById("demoTag").hidden=state.grist;
  document.getElementById("qClr").hidden=!state.q;

  // Keep a valid selection: prefer the current one if still in the list, else the closest match.
  if(!rows.some(r=>r.id===state.selectedId)) state.selectedId = rows.length ? rows[0].id : null;

  if(!rows.length){
    wrap.appendChild($("div","res-empty", state.q ? "No stones match “"+state.q+"”." : "No stone lines yet."));
    return;
  }
  rows.forEach(r=>wrap.appendChild(resultCard(r)));
}

function resultCard(r){
  const j=jobFor(r);
  const card=$("div","rcard"+(r.id===state.selectedId?" on":""));
  card.onclick=()=>{ state.selectedId=r.id; render(); };

  const top=$("div","rtop");
  top.appendChild($("div","rname",stoneProductLabel(r)));
  top.appendChild($("span","rspacer"));
  const sup=supplierFor(r); if(sup) top.appendChild($("span","rsup",sup));
  card.appendChild(top);

  const st=r.Order_Status||"";
  const statusRow=$("div","rtop");
  statusRow.appendChild(pill(st,ORD_C,{xs:true}));
  const qt=$("div","rqtys");
  qt.appendChild(mini("Scope",r.Scope_Qty));
  qt.appendChild(mini("Ord",r.Ordered_Qty));
  qt.appendChild(mini("Deliv",r.Delivery_Qty));
  statusRow.appendChild($("span","rspacer"));
  statusRow.appendChild(qt);
  card.appendChild(statusRow);

  if(j){
    const jr=$("div","rjob");
    jr.appendChild($("span","jobchip",jobCode(j)));
    const t=jobClient(j)+(jobAddr(j)?" · "+jobAddr(j):"");
    jr.appendChild($("span","rjaddr",t)); jr.title=t;
    card.appendChild(jr);
  }
  return card;
}

  if(!r){ app.appendChild($("div","detail-empty","Search for a stone, then pick the closest match to see its breakdown.")); return; }

  // ---- header: product + supplier + status ----
  const head=$("div","bd-head");

function numField(r,col,label,auto,shortFn){

  i.onchange=()=>{ const v=i.value===""?null:Number(i.value); auto?updateStoneAuto(r,{[col]:v}):update(r.id,{[col]:v}); };
  wrap.appendChild(i); row.appendChild(wrap); return row;
}
function dateField(r,col,label){

function textField(r,col,label){

// ---- pill + choice picker (per-option colours, like the inbox) ----
function pill(val,colors,opts){
  opts=opts||{};
  const c=colors[val]||"#e9edf1"; const t=softTint(c);
  if(opts.onchange){
    const trig=$("span","pill pill-select"+(opts.xs?" xs":"")); trig.style.background=t.bg;
    const d=$("span","pdot"); d.style.background=t.dot; trig.appendChild(d);
    trig.appendChild(document.createTextNode(statusLabel(val)));
    trig.appendChild($("span","pcaret","▾"));
    trig.onclick=e=>{ e.stopPropagation(); openChoicePicker(trig,{value:val,options:opts.options||Object.keys(colors),colors,onpick:opts.onchange}); };
    return trig;
  }
  const p=$("span","pill"+(opts.xs?" xs":""),statusLabel(val)); p.style.background=t.bg;
  const d=$("span","pdot"); d.style.background=t.dot; p.insertBefore(d,p.firstChild); return p;
}
function openChoicePicker(anchor,cfg){
  const m=document.getElementById("choicePop"); m.innerHTML="";
  (cfg.options||[]).forEach(o=>{
    const row=$("div","cprow"+(o===cfg.value?" on":""));
    const p=$("span","pill",statusLabel(o)); const t=softTint(cfg.colors[o]||"#e9edf1"); p.style.background=t.bg;
    const d=$("span","pdot"); d.style.background=t.dot; p.insertBefore(d,p.firstChild); row.appendChild(p);
    if(o===cfg.value) row.appendChild($("span","rtick","✓"));
    row.onmousedown=e=>{ e.preventDefault(); closePops(); cfg.onpick(o); };
    m.appendChild(row);
  });
  closePops(); m.hidden=false; positionPop(m,anchor,210);
}
function positionPop(el,anchor,w){
  const rc=anchor.getBoundingClientRect();
  el.style.left=Math.max(8,Math.min(rc.left,window.innerWidth-(w||220)-12))+"px";
  const below=rc.bottom+6, h=el.offsetHeight||260;
  el.style.top=(below+h>window.innerHeight-8 ? Math.max(8,rc.top-h-6) : below)+"px";
  el.style.right="auto";
}
function closePops(){ ["choicePop","prodPicker"].forEach(id=>{const e=document.getElementById(id); if(e)e.hidden=true;}); }

// ---- product picker ----
function catalogueHaystack(c){ let s=catLabel(c)||"";
  for(const k in c){ if(k==="id")continue; const v=c[k]; if(typeof v==="string") s+=" "+v; } return s.toLowerCase(); }
function openProductPicker(r,anchor){
  const R=state.ref.product;
  const m=document.getElementById("prodPicker"); m.innerHTML="";
  const sw=$("div","pp-search"); const si=document.createElement("input"); si.type="text"; si.placeholder="Search products…"; si.autocomplete="off";
  sw.appendChild(si); m.appendChild(sw);
  const list=$("div","pp-list"); m.appendChild(list);
  const curId=refId(r.Product);
  function draw(q){
    list.innerHTML=""; const ql=(q||"").trim().toLowerCase();
    const rows=(state.catalogue||[]).filter(c=>!ql||catalogueHaystack(c).includes(ql));
    if(!rows.length){ list.appendChild($("div","pp-empty","No matching products.")); return; }
    rows.slice(0,80).forEach(c=>{
      const row=$("div","pp-row"+(c.id===curId?" on":""),catLabel(c));
      row.onmousedown=e=>{ e.preventDefault(); closePops(); setProduct(r,c); };
      list.appendChild(row);
    });
  }
  draw(""); si.oninput=()=>draw(si.value);
  if(state.grist && R && R.targetTableId){
    grist.docApi.fetchTable(R.targetTableId).then(t=>{ state.catalogue=columnarToRows(t); reindex(); if(!m.hidden) draw(si.value); }).catch(()=>{});
  }
  closePops(); m.hidden=false; positionPop(m,anchor,330); setTimeout(()=>si.focus(),0);
}
function setProduct(r,cat){
  if(!state.grist){ r.Product_Code=cat.Code||r.Product_Code; r.Product_Supplier=cat.Supplier||r.Product_Supplier;

}

function updateStoneAuto(r,fields){

// ============================================================
//  SCHEMA INTROSPECTION (Product ref target + live status choices/colours)
// ============================================================
async function loadGristSchema(){
  const [T,C]=await Promise.all([
    grist.docApi.fetchTable("_grist_Tables"),
    grist.docApi.fetchTable("_grist_Tables_column")]);
  const tables=columnarToRows(T), cols=columnarToRows(C);
  const tableById={}; tables.forEach(t=>tableById[t.tableId]=t);
  const colByRowId={}; cols.forEach(c=>colByRowId[c.id]=c);
  const colsOf=tid=>{ const t=tableById[tid]; return t?cols.filter(c=>c.parentId===t.id):[]; };
  const isEditable=c=>!c.isFormula && c.colId && !SPECIAL_COL.test(c.colId);
  const choicesOf=c=>{ try{ return JSON.parse(c.widgetOptions||"{}").choices||null; }catch(e){ return null; } };
  const choiceColorsOf=c=>{ try{ const o=JSON.parse(c.widgetOptions||"{}").choiceOptions||{}; const m={};
    for(const k in o){ if(o[k]&&o[k].fillColor) m[k]=o[k].fillColor; } return m; }catch(e){ return {}; } };
  const bestLabelCol=tid=>{ const cs=colsOf(tid).filter(isEditable);
    return ((cs.find(c=>/full|name|title|label|desc/i.test(c.colId))||cs.find(c=>(c.type||"").startsWith("Text"))||cs[0]||{}).colId)||null; };
  function refInfo(parentTableId,colId){
    const col=colsOf(parentTableId).find(c=>c.colId===colId); if(!col)return null;
    const m=/^Ref(?:List)?:(.+)$/.exec(col.type||""); if(!m)return null;
    const targetTableId=m[1], vis=col.visibleCol&&colByRowId[col.visibleCol];
    return { colId, targetTableId, labelCol:(vis&&vis.colId)||bestLabelCol(targetTableId) };
  }
  function colChoices(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choicesOf(c):null; }
  function colChoiceColors(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choiceColorsOf(c):{}; }
  return { refInfo, colChoices, colChoiceColors };
}
// Replace the seeded status list/colours with the live Grist column definition.
function applyStatusSchema(sc){
  try{
    const names=sc.colChoices("Stone_Order","Order_Status");
    const colors=sc.colChoiceColors("Stone_Order","Order_Status");
    if(names && names.length){
      Object.keys(ORD_C).forEach(k=>delete ORD_C[k]);
      names.forEach(n=>{ ORD_C[n]=(colors&&colors[n])||ORD_DEFAULT[n]||"#e9edf1"; });
      ORDS=names.slice();
    }
  }catch(e){ console.warn("status schema load failed",e); }
}

//  DATA (live)
// ============================================================
async function pullTables(){
  const [so,jd]=await Promise.all([
    grist.docApi.fetchTable("Stone_Order"),
    grist.docApi.fetchTable("Jobs_Detail")]);
  state.stone=columnarToRows(so); state.jobs=columnarToRows(jd);
  if(state.ref.product){
    try{ const cat=await grist.docApi.fetchTable(state.ref.product.targetTableId); state.catalogue=columnarToRows(cat); }catch(e){}
  }
  reindex();
}
async function refetch(){ if(!state.grist)return; try{ await pullTables(); }catch(e){ console.warn("fetch failed",e); } render(); }

// ============================================================
//  GRIST WIRING — sample first, flip to live once Grist answers
// ============================================================
if(typeof grist!=="undefined"){
  try{ grist.ready({ requiredAccess:"full" }); }catch(e){}
  try{ grist.onRecord(()=>{}); }catch(e){}   // stay mappable to Stone_Order without erroring
  grist.docApi.fetchTable("Stone_Order").then(async ()=>{
    try{
      const sc=await loadGristSchema();
      state.ref.product=sc.refInfo("Stone_Order","Product");
      applyStatusSchema(sc);
    }catch(e){ console.warn("schema introspection failed",e); }
    try{ await pullTables(); }catch(e){ console.warn("initial fetch failed",e); }
    state.grist=true; render();
  }).catch(()=>{});
}
