<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Milano Calendar (all-day)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  /* Shared Milano palette - kept in sync with the Inbox widget (light + dark). */
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4; --sw-off:#cfd4d1;
    --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --danger:#e5484d; --danger-soft:#fdecea; --warn:#e5860b;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
      --line:#2a323b; --line2:#232a32; --sw-off:#3a434d;
      --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd;
      --danger:#e5484d; --danger-soft:#3a1f22; --warn:#e5860b;
    }
  }
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--panel); }
  #wrap { display:flex; flex-direction:row; height:100vh; background:var(--panel); color:var(--ink); }
  #main { flex:1; min-width:0; order:1; display:flex; flex-direction:column; }

  /* ---- jobs sidebar (right-hand side) ---- */
  #sidebar { flex:0 0 232px; order:2; display:flex; flex-direction:column; min-height:0; border-left:1px solid var(--line); background:var(--bg); }
  #wrap.collapsed #sidebar { display:none; }
  #btnJobs { margin-left:auto; }   /* sit at the right edge, over the jobs panel */
  #btnJobs.active { background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink); }
  #sideHead { flex:0 0 auto; padding:8px 8px 6px; display:flex; flex-direction:column; gap:6px; border-bottom:1px solid var(--line); position:relative; }
  #sideTitle { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
  #jobSearch { font-size:12px; padding:5px 8px; border:1px solid var(--line); border-radius:5px; background:var(--panel); color:var(--ink); outline:none; }
  #jobSearch:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(22,179,120,.15); }
  #fsrow { display:flex; gap:4px; }
  #filterBtn, #sortBtn { display:flex; align-items:center; gap:6px; font-size:11.5px; padding:5px 8px; border:1px solid var(--line); border-radius:5px; background:var(--panel); color:var(--ink); cursor:pointer; text-align:left; }
  #filterBtn { flex:1.2; }
  #sortBtn { flex:1; }
  #filterBtn:hover, #sortBtn:hover { background:var(--line2); }
  #filterBtn.active, #sortBtn.active { border-color:var(--accent); color:var(--accent-ink); background:var(--accent-soft); }
  #sortCaret { margin-left:auto; transition:transform .15s; color:var(--muted); }
  #sortBtn.open #sortCaret { transform:rotate(90deg); }
  #sortMenu { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:10;
    flex-direction:column; gap:2px; padding:6px; background:var(--panel); border:1px solid var(--line); border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); }
  #sortMenu.open { display:flex; }
  .srow { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
          font-size:11.5px; color:var(--ink); user-select:none; }
  .srow:hover { background:var(--line2); }
  .srow.on { color:var(--accent-ink); font-weight:600; background:var(--accent-soft); }
  .srow .sarrow { margin-left:auto; color:var(--accent-ink); font-weight:700; }
  .shint { font-size:9.5px; color:var(--muted); padding:4px 6px 1px; }
  #filterCount { font-size:10px; font-weight:600; background:var(--accent); color:#fff; border-radius:9px; padding:0 6px; line-height:15px; display:none; }
  #filterCount.show { display:inline-block; }
  #filterCaret { margin-left:auto; transition:transform .15s; color:var(--muted); }
  #filterBtn.open #filterCaret { transform:rotate(90deg); }
  #stageFilter { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:10;
    flex-direction:column; gap:2px; padding:6px; background:var(--panel); border:1px solid var(--line); border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); }
  #stageFilter.open { display:flex; }
  #stageFilter { max-height:340px; overflow-y:auto; }
  .fhead { font-size:9.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin:5px 0 2px; }
  .fhead:first-child { margin-top:0; }
  .frow { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
          font-size:11.5px; font-weight:500; color:var(--ink); user-select:none; }
  .frow:hover { background:var(--line2); }
  .frow .fcaret { margin-left:auto; color:var(--muted); }
  .frow .fnum { font-size:10px; font-weight:600; background:var(--accent); color:#fff; border-radius:9px; padding:0 6px; line-height:15px; }
  .fsel { font-size:10px; color:var(--accent-ink); padding:0 6px 5px; margin-top:-3px; line-height:1.4; overflow-wrap:break-word; }
  .fback { font-size:11px; font-weight:500; color:var(--accent); cursor:pointer; padding:2px 2px 5px; user-select:none; }
  .fback:hover { text-decoration:underline; }
  .fclearall { margin-top:6px; padding:6px 8px; border-top:1px solid var(--line2); font-size:11px; font-weight:600;
               color:var(--danger); cursor:pointer; text-align:center; border-radius:4px; user-select:none; }
  .fclearall:hover { background:var(--danger-soft); }
  .schip { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--ink); padding:2px 2px; cursor:pointer; user-select:none; border-radius:4px; }
  .schip:hover { background:var(--line2); }
  .schip .sw { flex:0 0 auto; width:26px; height:15px; border-radius:8px; background:var(--sw-off); position:relative; transition:background .15s; }
  .schip .sw::after { content:''; position:absolute; top:2px; left:2px; width:11px; height:11px; border-radius:50%; background:#fff; box-shadow:0 1px 1px rgba(0,0,0,.2); transition:left .15s; }
  .schip.on .sw { background:var(--accent); }
  .schip.on .sw::after { left:13px; }
  .schip .dot { flex:0 0 auto; width:9px; height:9px; border-radius:2px; box-shadow:0 0 0 1px rgba(0,0,0,.1) inset; }
  .schip .slabel { flex:1; min-width:0; }
  #stageFilter .clear { font-size:10px; color:var(--accent); cursor:pointer; padding:3px 2px 1px; align-self:flex-start; }
  #stageFilter .clear:hover { text-decoration:underline; }

  /* ---- ported from Inbox: sidebar filter buttons, dropdowns, bulk + per-option actions, assignee pills ---- */
  .sbtn { display:flex; align-items:center; gap:6px; font-size:11.5px; padding:5px 8px; border:1px solid var(--line);
          border-radius:5px; background:var(--panel); color:var(--ink); cursor:pointer; text-align:left; min-width:0; }
  .sbtn:hover { background:var(--line2); }
  .sbtn.active { border-color:var(--accent); color:var(--accent-ink); background:var(--accent-soft); }
  .sbtn .fc { margin-left:auto; color:var(--muted); transition:transform .15s; }
  .sbtn.open .fc { transform:rotate(90deg); }
  .sbtn .flabel { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #fsrow2 { display:flex; gap:4px; }
  .fnum2 { flex:0 0 auto; font-size:10px; font-weight:600; background:var(--accent); color:#fff; border-radius:9px; padding:0 6px; line-height:15px; display:none; }
  .fnum2.show { display:inline-block; }
  .fmenu { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:11;
    flex-direction:column; gap:2px; padding:6px; background:var(--panel); border:1px solid var(--line); border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); max-height:340px; overflow-y:auto; }
  .fmenu.open { display:flex; }
  .pbulk { display:flex; gap:6px; padding:1px 2px 5px; border-bottom:1px solid var(--line2); margin-bottom:3px; }
  .plink { font-size:11px; font-weight:600; color:var(--accent-ink); background:none; border:0; padding:3px 6px; border-radius:6px; cursor:pointer; }
  .plink:hover { background:var(--accent-soft); }
  .schip .chip-acts { flex:0 0 auto; display:flex; gap:3px; margin-left:auto; }
  .chip-acts .pmini { font-size:9px; font-weight:700; letter-spacing:.02em; text-transform:uppercase; color:var(--muted);
    background:var(--line2); border:1px solid transparent; border-radius:5px; padding:2px 5px; cursor:pointer; }
  .chip-acts .pmini:hover { color:var(--accent-ink); background:var(--accent-soft); }
  .navbar { display:flex; gap:5px; padding:2px 0 2px; overflow-x:auto; scrollbar-width:none; }
  .navbar::-webkit-scrollbar { display:none; }
  .navbar .ntab { flex:0 0 auto; display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
    color:var(--muted); background:var(--line2); border:1px solid transparent; border-radius:999px; padding:3px 9px; cursor:pointer; white-space:nowrap; }
  .navbar .ntab:hover { color:var(--ink); }
  .navbar .ntab.on { color:#fff; background:var(--accent); border-color:var(--accent); }
  .navbar .ntab .ncount { background:rgba(0,0,0,.10); color:inherit; border-radius:999px; font-size:9px; padding:0 5px; font-weight:700; min-width:14px; text-align:center; }
  .navbar .ntab.on .ncount { background:rgba(255,255,255,.25); }
  .navbar .ntab.empty { opacity:.45; }
  /* pill bar lives in the top toolbar, aligned with Today / Week / Jobs */
  #toolbar .navbar { flex:1 1 auto; min-width:0; margin:0 6px; padding:0; }
  #toolbar #navTabs:empty { display:none; }

  /* ---- saved views ---- */
  #viewsBtn { display:flex; align-items:center; gap:6px; width:100%; font-size:11.5px; padding:5px 8px;
    border:1px solid var(--line); border-radius:5px; background:var(--panel); color:var(--ink); cursor:pointer; text-align:left; }
  #viewsBtn:hover { background:var(--line2); }
  #viewsBtn.active { border-color:var(--accent); color:var(--accent-ink); background:var(--accent-soft); }
  #viewsBtn .veye { flex:0 0 auto; color:var(--muted); }
  #viewsBtn.active .veye { color:var(--accent); }
  #viewsBtn .vname { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
  #viewsBtn .vdirty { flex:0 0 auto; color:var(--warn); font-weight:700; }
  #viewsCaret { flex:0 0 auto; margin-left:auto; transition:transform .15s; color:var(--muted); }
  #viewsBtn.open #viewsCaret { transform:rotate(90deg); }
  #viewsMenu { display:none; position:absolute; top:100%; left:8px; right:8px; margin-top:4px; z-index:12;
    flex-direction:column; gap:2px; padding:6px; background:var(--panel); border:1px solid var(--line); border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,.14); max-height:360px; overflow-y:auto; }
  #viewsMenu.open { display:flex; }
  .vrow { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
          font-size:11.5px; color:var(--ink); user-select:none; }
  .vrow:hover { background:var(--line2); }
  .vrow.on { color:var(--accent-ink); font-weight:600; background:var(--accent-soft); }
  .vrow .vlabel { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .vrow .vtick { flex:0 0 auto; color:var(--accent-ink); font-weight:700; }
  .vrow .vdel { flex:0 0 auto; color:var(--muted); font-weight:700; padding:0 5px; border-radius:4px; line-height:1.4; }
  .vrow .vdel:hover { color:var(--danger); background:var(--danger-soft); }
  .vaction { display:flex; align-items:center; gap:6px; padding:6px 6px; border-radius:5px; cursor:pointer;
             font-size:11.5px; font-weight:500; color:var(--accent); user-select:none; }
  .vaction:hover { background:var(--accent-soft); }
  .vaction.danger { color:var(--danger); }
  .vaction.danger:hover { background:var(--danger-soft); }
  .vsep { border-top:1px solid var(--line2); margin:4px 0 2px; }
  .vempty { font-size:10.5px; color:var(--muted); padding:4px 6px 6px; }

  #jobList { flex:1; min-height:0; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:6px; }
  #jobList .empty { font-size:12px; color:var(--muted); padding:10px 4px; text-align:center; }
  .jobitem .jcount { cursor:pointer; }
  .jobitem .jcount:hover { color:var(--accent); }
  .jvisits { display:flex; flex-direction:column; gap:2px; margin-top:3px; border-top:1px dashed var(--line2); padding-top:4px; }
  .jvisit { font-size:10px; color:var(--muted); padding:2px 4px; border-radius:4px; cursor:pointer; line-height:1.35; }
  .jvisit:hover { background:var(--accent-soft); }
  .jvisit .vd { font-weight:600; color:var(--ink); }
  .jobitem { border:1px solid var(--line); border-radius:6px; background:var(--panel); padding:6px 7px; cursor:grab;
             box-shadow:0 1px 1px rgba(0,0,0,.05); display:flex; flex-direction:column; gap:3px; }
  .jobitem:hover { border-color:var(--accent); }
  .jobitem:active { cursor:grabbing; }
  .jobitem.lit { outline:2px solid var(--accent); outline-offset:1px; }
  .jobitem .ja { font-size:11.5px; font-weight:600; color:var(--ink); line-height:1.3; overflow-wrap:break-word; }
  .jobitem .jaddr { font-size:10px; color:var(--muted); line-height:1.35; overflow-wrap:break-word; }
  .jobitem .jmeta { display:flex; align-items:center; flex-wrap:wrap; gap:4px; font-size:10px; color:var(--muted); }
  .jobitem .jcount { margin-left:auto; font-size:9.5px; color:var(--muted); white-space:nowrap; }
  .jobitem .pill { font-size:9.5px; }

  #toolbar { display:flex; align-items:center; gap:6px; padding:6px 8px; border-bottom:1px solid var(--line); flex-wrap:wrap; flex:0 0 auto; }
  #toolbar button, #toolbar select {
    font-size:12px; padding:4px 10px; border:1px solid var(--line); border-radius:4px;
    background:var(--panel); cursor:pointer; color:var(--ink);
  }
  #toolbar button:hover { background:var(--line2); }
  #rangeLabel { font-size:13px; font-weight:600; color:var(--ink); margin-left:6px; }
  #msg { padding:20px; font-size:13px; color:var(--muted); display:none; }
  #cal { flex:1; min-height:0; display:flex; flex-direction:column; }

  /* ---- week / day view ---- */
  .cols { flex:1; min-height:0; display:grid; grid-auto-columns:1fr; grid-auto-flow:column; }
  .daycol { display:flex; flex-direction:column; border-right:1px solid var(--line); min-width:0; }
  .daycol:last-child { border-right:none; }
  .dayhead { flex:0 0 auto; text-align:center; padding:5px 2px; border-bottom:1px solid var(--line); font-size:12px; color:var(--muted); background:var(--bg); }
  .dayhead .num { font-size:17px; font-weight:600; color:var(--ink); margin-right:4px; }
  .dayhead.today { color:var(--danger); background:var(--danger-soft); font-weight:600; }
  .dayhead.today .num { background:var(--danger); color:#fff; border-radius:50%; display:inline-block; min-width:26px; line-height:26px; text-align:center; }
  .daycol.today { background:var(--danger-soft); }
  .daybody { flex:1; overflow-y:auto; padding:8px 8px 4px 4px; display:flex; flex-direction:column; gap:7px; }
  .daybody.dragover { background:var(--accent-soft); }

  /* ---- month view ---- */
  #monthwrap { flex:1; min-height:0; overflow-y:auto; }
  .mhead { display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:2; }
  .mhead div { text-align:center; font-size:11px; color:var(--muted); padding:4px 0; }
  .mrow { display:grid; grid-template-columns:repeat(7,1fr); }
  .mcell { border-right:1px solid var(--line2); border-bottom:1px solid var(--line2); min-height:92px; padding:3px 7px 3px 3px; display:flex; flex-direction:column; gap:7px; min-width:0; }
  .mcell:last-child { border-right:none; }
  .mcell .dnum { font-size:11px; font-weight:600; color:var(--muted); padding:1px 3px; flex:0 0 auto; }
  .mcell.other .dnum { color:var(--muted); }
  .mcell.today { background:var(--danger-soft); }
  .mcell.today .dnum { color:#fff; background:var(--danger); border-radius:9px; align-self:flex-start; }
  .mcell.dragover { background:var(--accent-soft); }

  /* ---- event cards ---- */
  .ev { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:5px 14px 5px 7px; cursor:pointer;
        color:var(--ink); flex:0 0 auto; box-shadow:0 1px 1px rgba(0,0,0,.08);
        overflow-wrap:break-word; position:relative; }
  .ev .del { position:absolute; top:-6px; right:-6px; width:16px; height:16px; line-height:13px; text-align:center;
             font-size:11px; font-weight:700; color:#fff; background:var(--muted); border:1.5px solid #fff;
             border-radius:50%; box-shadow:0 1px 2px rgba(0,0,0,.35); cursor:pointer; user-select:none; z-index:2; }
  .ev .del:hover { background:var(--danger); }
  .ev .evmore { position:absolute; top:-7px; right:-7px; width:18px; height:18px; line-height:15px; text-align:center;
             font-size:13px; font-weight:700; color:var(--ink); background:var(--panel); border:1px solid var(--line);
             border-radius:50%; box-shadow:0 1px 2px rgba(0,0,0,.25); cursor:pointer; user-select:none; z-index:2; opacity:0; transition:opacity .12s; }
  .ev:hover .evmore, .ev.selected .evmore, .ev.lit .evmore { opacity:1; }
  .ev .cline { font-size:var(--ev-card-font,11.5px); line-height:1.4; white-space:normal; }
  .ev .cline + .cline { margin-top:2px; }
  .ev .cline:empty { display:none; }
  .jbody .cline { font-size:var(--job-card-font,12.5px); line-height:1.4; }
  .jbody .cline + .cline { margin-top:2px; }
  .jbody .cline:empty { display:none; }
  .cdivider { border-top:1px solid var(--line2); margin:5px 0 4px; }
  .cbar { font-weight:600; line-height:1.35; display:inline-block; max-width:100%; border-radius:6px; padding:1px 6px; }
  .avwrap { display:inline-flex; gap:2px; vertical-align:middle; }
  .avatar { width:18px; height:18px; border-radius:50%; background:var(--line2); color:var(--muted); font-size:8.5px; font-weight:700;
            display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line);
            vertical-align:middle; letter-spacing:.02em; }
  .ev.selected, .ev.lit { outline:2px solid var(--accent); outline-offset:1px; }
  .ev.dim { opacity:.22; }
  .ev .inst { margin-top:4px; padding-top:3px; border-top:1px solid var(--line2);
              font-size:10.5px; font-weight:600; color:var(--ink); line-height:1.35; white-space:normal; }
  .ev .t { font-size:1em; font-weight:600; line-height:1.35; white-space:normal;
           display:inline-block; max-width:100%; border-radius:6px; padding:1px 6px; }
  .ev .d { font-size:10.5px; line-height:1.4; color:var(--muted); margin-top:3px; white-space:normal; }
  .ev .lbl { color:var(--muted); }
  .pill { border-radius:8px; padding:0 7px; display:inline-block; line-height:1.5; }
  .mcell .ev { padding:4px 6px; }
  .mcell .ev .t { font-size:10.5px; }
  .mcell .ev .d { font-size:9.5px; }
  .mcell .ev .inst { font-size:9.5px; }

  /* ---- job details popup ---- */
  #jobModal { display:none; position:fixed; inset:0; z-index:50; background:rgba(20,22,26,.42);
    align-items:center; justify-content:center; padding:20px; }
  #jobModal.open { display:flex; }
  #jobModalCard { background:var(--panel); width:100%; max-width:440px; max-height:86vh; display:flex; flex-direction:column;
    border-radius:10px; box-shadow:0 18px 50px rgba(0,0,0,.3); overflow:hidden; position:relative; }
  .jm-head { flex:0 0 auto; display:flex; align-items:flex-start; gap:8px; padding:14px 16px 10px; border-bottom:1px solid var(--line2); }
  .jm-title { flex:1; min-width:0; font-size:15px; font-weight:700; color:var(--ink); line-height:1.3; overflow-wrap:break-word; }
  .jm-close { flex:0 0 auto; font-size:20px; line-height:1; color:var(--muted); cursor:pointer; padding:0 2px; }
  .jm-close:hover { color:var(--danger); }
  .jm-body { flex:1; min-height:0; overflow-y:auto; padding:12px 16px; }
  .jm-row { display:flex; gap:10px; padding:5px 0; font-size:12.5px; line-height:1.45; border-bottom:1px solid var(--bg); }
  .jm-row:last-child { border-bottom:none; }
  .jm-k { flex:0 0 116px; color:var(--muted); font-weight:600; }
  .jm-v { flex:1; min-width:0; color:var(--ink); overflow-wrap:break-word; }
  .jm-sec { font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:14px 0 4px; }
  .jm-visit { font-size:12px; color:var(--ink); padding:5px 8px; border-radius:5px; background:var(--bg); margin-bottom:4px; line-height:1.4; }
  .jm-visit .vd { font-weight:600; color:var(--ink); }
  .jm-empty { font-size:12px; color:var(--muted); padding:2px 0; }
  .jm-foot { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:12px 16px; border-top:1px solid var(--line2); background:var(--bg); }
  .jm-hint { flex:1; min-width:0; font-size:10.5px; color:var(--muted); line-height:1.35; }

    padding:7px 14px; border-radius:6px; cursor:pointer; white-space:nowrap; }
  .jm-edit:hover { background:var(--accent); }
  .jm-edit.disabled { background:var(--sw-off); pointer-events:none; }

  .jm-gear:hover { color:var(--accent); }

  /* layout editor overlay inside the modal */

  .jm-editor { flex:1; min-height:0; overflow-y:auto; padding:10px 14px; }

            margin-bottom:5px; background:var(--panel); font-size:12.5px; color:var(--ink); cursor:grab; }
  .jm-fld:hover { border-color:var(--line); }
  .jm-fld.dragging { opacity:.4; }
  .jm-fld.hidden-fld { color:var(--muted); background:var(--bg); }
  .jm-fld .grip { flex:0 0 auto; color:var(--line); font-size:13px; cursor:grab; }
  .jm-fld .flbl { flex:1; min-width:0; overflow-wrap:break-word; }
  .jm-fld .fsw { flex:0 0 auto; width:30px; height:17px; border-radius:9px; background:var(--sw-off); position:relative; transition:background .15s; }
  .jm-fld .fsw::after { content:''; position:absolute; top:2px; left:2px; width:13px; height:13px; border-radius:50%; background:#fff; box-shadow:0 1px 1px rgba(0,0,0,.25); transition:left .15s; }
  .jm-fld.on .fsw { background:var(--accent); }
  .jm-fld.on .fsw::after { left:15px; }
  .jm-editreset { font-size:11px; color:var(--accent); cursor:pointer; padding:6px 2px; }
  .jm-editreset:hover { text-decoration:underline; }
  .jm-editdone { flex:0 0 auto; display:flex; justify-content:flex-end; padding:10px 14px; border-top:1px solid var(--line2); background:var(--bg); }
  #jobModalCard:not(.editing) .jm-editdone { display:none; }
  .jm-donebtn { font-size:12.5px; font-weight:600; color:#fff; background:var(--accent); border:none; padding:7px 16px; border-radius:6px; cursor:pointer; }
  .jm-donebtn:hover { background:var(--accent); }

  /* ---------- editable job detail ---------- */
  .je-idrow { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .je-jobid { font-size:10.5px; font-weight:700; color:var(--muted); background:var(--line2); border-radius:999px; padding:2px 9px; letter-spacing:.03em; }
  .je-addr { width:100%; font:inherit; font-size:13px; color:var(--ink); background:var(--bg); border:1px solid var(--line2); border-radius:7px; padding:7px 9px; }
  .je-addr:focus { outline:none; border-color:var(--accent); background:var(--panel); }
  .je-pills { display:flex; flex-wrap:wrap; align-items:center; gap:7px; margin:10px 0; }
  .je-pill { font-size:12px; font-weight:600; border-radius:999px; padding:4px 12px; cursor:pointer; white-space:nowrap; user-select:none; }
  .je-pill:hover { filter:brightness(.97); }
  .je-assign { display:inline-flex; align-items:center; gap:2px; cursor:pointer; padding:2px 4px; border-radius:7px; }
  .je-assign:hover { background:var(--line2); }
  .je-assign-add { font-size:11.5px; font-weight:600; color:var(--muted); border:1px dashed var(--line); border-radius:999px; padding:3px 10px; }
  .je-drow { display:flex; align-items:center; gap:10px; padding:5px 0; font-size:12.5px; }
  .je-dl { flex:0 0 92px; color:var(--muted); font-weight:600; }
  .je-scope { font-weight:700; color:var(--ink); }
  .je-date { font:inherit; font-size:12.5px; color:var(--ink); background:var(--bg); border:1px solid var(--line2); border-radius:6px; padding:5px 7px; }
  .je-date:focus { outline:none; border-color:var(--accent); }
  .je-note { width:100%; min-height:54px; resize:vertical; font:inherit; font-size:12.5px; color:var(--ink); background:var(--bg); border:1px solid var(--line2); border-radius:7px; padding:7px 9px; }
  .je-note:focus { outline:none; border-color:var(--accent); background:var(--panel); }
  .je-sec-add { display:flex; align-items:center; justify-content:space-between; }
  .je-add { font-size:11.5px; font-weight:700; color:var(--accent); cursor:pointer; letter-spacing:0; text-transform:none; }

  .je-inst { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
  .je-inst .je-date { flex:0 0 auto; }
  .je-inst-note { flex:1; min-width:0; font:inherit; font-size:12px; color:var(--ink); background:var(--bg); border:1px solid var(--line2); border-radius:6px; padding:5px 8px; }
  .je-inst-note:focus { outline:none; border-color:var(--accent); background:var(--panel); }
  .je-del { flex:0 0 auto; color:var(--muted); font-size:16px; line-height:1; cursor:pointer; padding:0 3px; }

  .je-qlbl { font-size:9.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); }

  .je-qin:focus { outline:none; border-color:var(--accent); }

  /* floating menus (pill dropdown / assignee / product picker) */
  .je-menu { position:fixed; z-index:70; min-width:150px; max-width:300px; max-height:280px; overflow-y:auto; background:var(--panel);

  .je-search { width:100%; font:inherit; font-size:12.5px; padding:6px 8px; margin-bottom:5px; border:1px solid var(--line2); border-radius:6px; background:var(--bg); color:var(--ink); }
  .je-search:focus { outline:none; border-color:var(--accent); }
  .je-prodlist { max-height:220px; overflow-y:auto; }
  /* footer save/discard */
  .je-btn { font:inherit; font-size:12.5px; font-weight:600; border-radius:6px; padding:7px 14px; cursor:pointer; }
  .je-btn.primary { color:#fff; background:var(--accent); border:none; }

  #jobModal.has-edit .jm-foot { background:var(--panel); }
  .je-dirtydot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); margin-right:6px; vertical-align:middle; }
  /* unsaved-changes confirm overlay */
  .jm-confirm { display:none; position:absolute; inset:0; z-index:65; background:rgba(20,22,26,.5); align-items:center; justify-content:center; padding:18px; }
  .jm-confirm-card { background:var(--panel); border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.3); padding:16px 18px; max-width:320px; }
  .jm-confirm-t { font-size:14px; font-weight:700; color:var(--ink); margin-bottom:6px; }
  .jm-confirm-b { font-size:12.5px; color:var(--muted); line-height:1.5; margin-bottom:14px; }
  .jm-confirm-f { display:flex; justify-content:flex-end; gap:8px; }

  /* ⋯ event menu popup */
  #evMenu { position:fixed; z-index:60; min-width:158px; background:var(--panel); border:1px solid var(--line);
            border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.18); padding:5px; }

  #evMenu .paction { display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius:6px; cursor:pointer;
            font-size:12.5px; font-weight:600; color:var(--accent-ink); user-select:none; }
  #evMenu .paction:hover { background:var(--accent-soft); }
  #evMenu .paction.danger { color:var(--danger); }
  #evMenu .paction.danger:hover { background:rgba(229,72,77,.12); }

  /* customise-cards modal */
  #cardEditModal { position:fixed; inset:0; z-index:70; background:rgba(20,22,26,.42); display:none; align-items:center; justify-content:center; padding:16px; }
  #cardEditModal.open { display:flex; }
  #cardEditCard { width:100%; max-width:460px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden;
            background:var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:0 18px 50px rgba(0,0,0,.35); }
  .ce-head { flex:0 0 auto; display:flex; align-items:center; padding:12px 14px; border-bottom:1px solid var(--line2); }
  .ce-title { font-size:14px; font-weight:700; color:var(--ink); }
  .ce-close { margin-left:auto; font-size:20px; line-height:1; color:var(--muted); cursor:pointer; padding:0 4px; }
  .ce-close:hover { color:var(--danger); }
  .ce-tabs { flex:0 0 auto; display:flex; gap:4px; padding:8px 12px 0; }
  .ce-tab { font:inherit; font-size:12.5px; font-weight:600; color:var(--muted); background:transparent; border:0;
            border-bottom:2px solid transparent; padding:6px 10px; cursor:pointer; }
  .ce-tab:hover { color:var(--ink); }
  .ce-tab.on { color:var(--accent-ink); border-bottom-color:var(--accent); }
  .ce-body { flex:1; min-height:0; overflow-y:auto; padding:12px 14px 14px; }
  .ce-note { font-size:11.5px; color:var(--muted); line-height:1.45; margin-bottom:9px; }
  .ce-ta { width:100%; min-height:88px; resize:vertical; font:inherit; font-size:13px; line-height:1.5; color:var(--ink);
            background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:9px 10px; }
  .ce-ta:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
  .ce-tokens { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
  .ce-tok { display:inline-flex; align-items:center; gap:5px; font:inherit; font-size:11px; color:var(--ink);
            background:var(--line2); border:1px solid transparent; border-radius:7px; padding:3px 7px; cursor:pointer; }
  .ce-tok:hover { border-color:var(--accent); background:var(--accent-soft); }
  .ce-tok code { font-size:10.5px; color:var(--accent-ink); font-weight:700; }
  .ce-tok span { color:var(--muted); }
  .ce-reset { margin-top:12px; font-size:11.5px; font-weight:600; color:var(--accent-ink); cursor:pointer; display:inline-block; }
  .ce-reset:hover { text-decoration:underline; }
  .ce-fontrow { display:flex; align-items:center; gap:8px; margin-top:12px; }
  .ce-flabel { font-size:12px; font-weight:600; color:var(--ink); margin-right:auto; }
  .ce-fbtn { width:28px; height:28px; font-size:16px; font-weight:700; line-height:1; color:var(--ink);
             background:var(--panel); border:1px solid var(--line); border-radius:7px; cursor:pointer; }
  .ce-fbtn:hover { background:var(--line2); }
  .ce-fval { min-width:44px; text-align:center; font-size:12.5px; font-weight:600; color:var(--ink); font-variant-numeric:tabular-nums; }
  .ce-foot { margin-top:14px; padding-top:12px; border-top:1px solid var(--line2); }
  .ce-scope { font-size:11px; color:var(--muted); margin-bottom:8px; }
  .ce-btnrow { display:flex; gap:8px; justify-content:flex-end; }
  .ce-save { font:inherit; font-size:12.5px; font-weight:600; border-radius:8px; padding:7px 14px; cursor:pointer; }
  .ce-save.ghost { color:var(--ink); background:var(--panel); border:1px solid var(--line); }
  .ce-save.ghost:hover { background:var(--line2); }
  .ce-save.primary { color:#fff; background:var(--accent); border:1px solid var(--accent); }
  .ce-save.primary:hover { filter:brightness(1.06); }
</style>
</head>
<body>
<div id="wrap">

<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<script>
(function () {
  'use strict';

  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  // sidebar reads these columns off the jobs table when they exist
  var JOB_COLS = { addr:'Job_Address', client:'Client_Label', stage:'Stage', assigned:'Assigned_To', jid:'Job_ID', payment:'Payment_Status' };
  // Stage / payment pill colours - kept in sync with the Inbox widget.
  // These are FALLBACK values (mirror of the Inbox's current palette); at runtime the
  // calendar reads the Inbox widget's live "Save for everyone" colours from the doc
  // (its section's customView.widgetOptions.colors) via loadInboxColors(), so recolours
  // in the Inbox flow through automatically.
  var STAGE_COLORS = {
    'Quote':'#eef1f4', 'Live':'#b3f0bf', 'WIP':'#fff3b3', 'Completed':'#ffb3ba', 'Installing':'#fff3b3',
    'Cancelled':'#eef1f4', 'Others':'#eef1f4', 'Closed !':'#c7b8f7', 'On hold':'#eef1f4', 'Fix Job':'#eef1f4'
  };
  var PAY_COLORS = {
    'Not Invoiced':'#eef1f4', 'Deposit Paid':'#FFFACD', 'Outstanding Bal':'#ffb3ba',
    'Fully Paid':'#b3f0bf', 'Other':'#eef1f4', 'Not Paid Yet':'#FEE7C3', 'TBC By a Minh':'#E8D0FE'
  };
  // Overwrite a meta map's Stage/Payment fillColors with our palette (textColor preserved).
  function applyChoiceColorOverrides(meta) {
    if (!meta) return;
    [['Stage', STAGE_COLORS], ['Payment_Status', PAY_COLORS]].forEach(function (p) {
      var m = meta[p[0]]; if (!m) return;
      m.choiceOptions = m.choiceOptions || {};
      Object.keys(p[1]).forEach(function (v) {
        m.choiceOptions[v] = Object.assign({}, m.choiceOptions[v], { fillColor: p[1][v] });
      });
    });
  }
  // Read the Inbox widget's live shared colours from the doc so recolours auto-sync.
  // The Inbox publishes state.colors into its section's customView.widgetOptions.colors
  // on "Save for everyone". We find that section by its widget URL (milano-inbox).
  function loadInboxColors() {
    return grist.docApi.fetchTable('_grist_Views_section').then(function (t) {
      var n = (t.id || []).length;
      for (var i = 0; i < n; i++) {
        var opts; try { opts = JSON.parse(t.options[i] || '{}'); } catch (e) { continue; }
        var cv = opts.customView; if (typeof cv === 'string') { try { cv = JSON.parse(cv || '{}'); } catch (e) { cv = {}; } }
        if (!cv || String(cv.url || '').indexOf('milano-inbox') === -1) continue;
        var wo = cv.widgetOptions || {}; if (typeof wo === 'string') { try { wo = JSON.parse(wo || '{}'); } catch (e) { wo = {}; } }
        var c = wo.colors || {};
        if (c.stage && Object.keys(c.stage).length) STAGE_COLORS = Object.assign({}, STAGE_COLORS, c.stage);
        if (c.payment && Object.keys(c.payment).length) PAY_COLORS = Object.assign({}, PAY_COLORS, c.payment);
        break;
      }
    }).catch(function (e) { console.warn('inbox colours read failed', e); });
  }

  // ---- "Edit in Inbox" navigation ----
  // Double-click a job → details popup → Edit jumps to the Inbox CUSTOM WIDGET
  // (page "*Inbox | PRO MAX", section 158) with the same job selected. The Grist
  // anchor moves the cursor to that section+row, and the widget's onRecord selects it.
  // If the doc's pages/sections change, update page (view id) + sec (widget section ref).
  var INBOX = {
    base: 'https://milano.getgrist.com/ezZUgCeS6Rq1/Milano',
    clientCol: 193,          // Jobs_Detail.Client_Name colRef (any Jobs_Detail col works for the anchor)
    widget: { page: 33, sec: 158 }   // the Inbox custom widget (milano-inbox.netlify.app)
  };
  function inboxTargetFor(job) {
    var cfg = INBOX.widget;
    return {
      name: 'Inbox',
      url: job.id ? (INBOX.base + '/p/' + cfg.page + '#a1.s' + cfg.sec + '.r' + job.id + '.c' + INBOX.clientCol) : null
    };
  }

  var view = 'week';
  var refDate = new Date(); refDate.setHours(0,0,0,0);
  var mappingsCache = null;
  var recordsCache = [];
  var metaByColId = {};    // this table's cols: colId -> {label, type, choiceOptions}
  var jobMetaByColId = {}; // jobs table cols: colId -> {label, type, choiceOptions} (for the details popup)
  var jobsCache = null;    // [{id, addr, client, stage, assigned[], jid}] from the jobs table
  var selectedRowId = null;
  var isolatedJobKey = null;   // when set, only this job's visits stay lit
  var seqById = {};            // rec.id -> {n, total, key}
  var jobQuery = '';
  var filters = { stage: {}, assignee: {}, payment: {}, visits: {} };   // visits keys: '0' | '1' | '2+'
  var jobTab = 'all';          // assignee pill bar: 'all' | <person> | '__none' (unassigned)
  var filterView = null;       // (legacy) drill state for the retired combined Filter panel
  var sortBy = { key: 'client', dir: 1 };   // dir 1 = A-Z / soonest / fewest; -1 reversed
  var SORT_OPTS = [
    { key: 'client', label: 'Client' },
    { key: 'addr',   label: 'Job address' },
    { key: 'stage',  label: 'Stage' },
    { key: 'next',   label: 'Next install date' },
    { key: 'visits', label: 'Install count' }
  ];
  var expandedJobs = {};       // sidebar job key -> true when its visit list is open
  var detailLayout = { order: [], hidden: {} };  // details-popup field arrangement (persisted)
  var currentDetailJob = null; // job currently shown in the details popup (for live re-render)
  var DETAIL_CORE = { jid: 'Job ID', client: 'Client', addr: 'Address', stage: 'Stage', assigned: 'Assigned to' };

  // ---- event cards ----
  function makeCard(rec) {

    card.appendChild(menuBtn);

    var info = seqById[rec.id];
    // content from the (customisable) event-card template
    renderCardTemplate(eventCardTpl, eventCardTokens(rec, info), card, { bar: barColorsFor(fmtVal(rec[mappingsCache.type])) });

    card.addEventListener('click', function (e) {
      e.stopPropagation();
      if (selectedRowId === rec.id && isolatedJobKey === key) {

  function makeDropTarget(el, day) {
    el.addEventListener('dragover', function (e) { e.preventDefault(); el.classList.add('dragover'); });
    el.addEventListener('dragleave', function () { el.classList.remove('dragover'); });
    el.addEventListener('drop', function (e) {
      e.preventDefault(); e.stopPropagation(); el.classList.remove('dragover');

      // a job dragged in from the sidebar -> create a new visit at the drop slot
      var jobPayload = e.dataTransfer.getData('application/x-mm-job');
      if (jobPayload && mappingsCache.groupBy != null) {
        var jobRowId = Number(jobPayload);
        if (!jobRowId) return;
        var job = (jobsCache || []).find(function (x) { return x.id === jobRowId; });
        var jobName = job ? (job.client || job.addr || job.jid) : 'this job';
        var note = prompt('Schedule installation for ' + jobName + ' on ' + fmtDate(day) + '.\n' +
                          'Add a note (optional) - or Cancel to abort:', '');
        if (note === null) return;   // cancelled -> no visit created
        note = note.trim();
        var idx = dropIndex(el, e.clientY, -1);
        var fields = {};
        fields[mappingsCache.groupBy] = jobRowId;
        fields[mappingsCache.startDate] = localDateToGrist(day);
        if (note && mappingsCache.seqNote != null) fields[mappingsCache.seqNote] = note;
        grist.getTable().create({ fields: fields })
          .then(function (res) {
            if (res && res.id) {
              // local echo so ordering can include it before onRecords refreshes
              var rec = { id: res.id };
              rec[mappingsCache.groupBy] = jobRowId;
              rec[mappingsCache.startDate] = new Date(Date.UTC(day.getFullYear(), day.getMonth(), day.getDate()));
              if (note && mappingsCache.seqNote != null) rec[mappingsCache.seqNote] = note;
              recordsCache.push(rec);
              commitDayOrder(day, res.id, idx);
              selectedRowId = res.id;
              isolatedJobKey = 'g:' + jobRowId;
              pendingCursor = res.id;   // re-assert once the row arrives via onRecords
              grist.setCursorPos({ rowId: res.id });
              render();
            }
          })
          .catch(function (err) { console.error(err); });
        return;
      }

      // an existing visit card moved -> reschedule and stick at the drop slot
      var rowId = Number(e.dataTransfer.getData('text/plain'));
      if (!rowId || !mappingsCache) return;
      var idx2 = dropIndex(el, e.clientY, rowId);
      var rec2 = recordsCache.find(function (r) { return r.id === rowId; });
      if (rec2) rec2[mappingsCache.startDate] = new Date(Date.UTC(day.getFullYear(), day.getMonth(), day.getDate()));
      var fields2 = {};
      fields2[mappingsCache.startDate] = localDateToGrist(day);
      grist.getTable().update({ id: rowId, fields: fields2 }).catch(function (err) { console.error(err); });
      commitDayOrder(day, rowId, idx2);
      render();
    });
    el.addEventListener('dblclick', function (e) {
      if (e.target !== el) return;
      if (!mappingsCache) return;
      var note = prompt('Create a new installation on ' + fmtDate(day) + '.\n' +
                        'Add a note (optional) - or Cancel to abort:', '');
      if (note === null) return;   // cancelled
      note = note.trim();
      var fields = {};
      fields[mappingsCache.startDate] = localDateToGrist(day);
      if (note && mappingsCache.seqNote != null) fields[mappingsCache.seqNote] = note;
      grist.getTable().create({ fields: fields })
        .then(function (res) { if (res && res.id) { selectedRowId = res.id; isolatedJobKey = null; grist.setCursorPos({ rowId: res.id }); } })
        .catch(function (err) { console.error(err); });
    });
  }

  // ---- jobs sidebar ----
  function jobsFromRecords() {
    // fallback: derive the job list from visit records (jobs without visits won't appear)
    var byKey = {};
    recordsCache.forEach(function (rec) {
      var gv = mappingsCache.groupBy != null ? rec[mappingsCache.groupBy] : null;
      var id = (typeof gv === 'number' && gv) ? gv : null;
      var k = jobKey(rec);
      if (!byKey[k]) byKey[k] = {
        id: id, key: k,
        addr: fmtVal(rec[mappingsCache.title]),
        client: fmtVal(rec[(mappingsCache.details || [])[0]]),
        stage: stageOf(rec), assigned: [], jid: '',
        payment: rec[JOB_COLS.payment] != null ? String(rec[JOB_COLS.payment] || '') : ''
      };
    });
    return Object.keys(byKey).map(function (k) { return byKey[k]; });
  }
  function visitCounts() {
    var counts = {};
    recordsCache.forEach(function (rec) {
      var k = jobKey(rec);
      counts[k] = (counts[k] || 0) + 1;
    });
    return counts;
  }
  function jobHaystack(j) {
    return [j.addr, j.client, j.stage, j.payment, j.jid, (j.assigned || []).join(' ')].join(' ').toLowerCase();
  }
  function renderSidebar() {
    var list = document.getElementById('jobList');
    if (!list || !mappingsCache) return;
    list.innerHTML = '';
    var jobs = (jobsCache && jobsCache.length) ? jobsCache : jobsFromRecords();
    var counts = visitCounts();
    var q = jobQuery.trim().toLowerCase();
    var shown = jobs.filter(function (j) {
      return jobPasses(j, counts) && (!q || jobHaystack(j).indexOf(q) !== -1);
    });
    // per-job "next visit" date: earliest upcoming, else earliest overall
    var today0 = new Date(); today0.setHours(0, 0, 0, 0);
    var datesByKey = {};
    recordsCache.forEach(function (r) {
      var d = gristToLocalDate(r[mappingsCache.startDate]);
      if (!d) return;
      var k = jobKey(r);
      (datesByKey[k] = datesByKey[k] || []).push(d);
    });
    function nextOf(j) {
      var all = [];
      (j.id ? jobAliases(j) : [j.key]).forEach(function (k) { all = all.concat(datesByKey[k] || []); });
      if (!all.length) return null;
      var up = all.filter(function (d) { return d >= today0; });
      return new Date(Math.min.apply(null, up.length ? up : all));
    }
    function cntOf(j) {
      var n = 0;
      (j.id ? jobAliases(j) : [j.key]).forEach(function (k) { n = Math.max(n, counts[k] || 0); });
      return n;
    }
    function nameOf(j) { return (j.client || j.addr || '').toLowerCase(); }
    shown.sort(function (a, b) {
      var dir = sortBy.dir, r = 0;
      if (sortBy.key === 'addr') r = dir * (a.addr || '').toLowerCase().localeCompare((b.addr || '').toLowerCase());
      else if (sortBy.key === 'stage') r = dir * (a.stage || '').localeCompare(b.stage || '');
      else if (sortBy.key === 'visits') r = dir * (cntOf(a) - cntOf(b));
      else if (sortBy.key === 'next') {
        var da = nextOf(a), db = nextOf(b);
        if (!da && !db) r = 0;
        else if (!da) r = 1;            // jobs without visits always last
        else if (!db) r = -1;
        else r = dir * (da - db);
      }
      else r = dir * nameOf(a).localeCompare(nameOf(b));
      return r || nameOf(a).localeCompare(nameOf(b));
    });
    if (!shown.length) {
      var em = document.createElement('div'); em.className = 'empty';
      em.textContent = q ? 'No jobs match "' + jobQuery.trim() + '"' : 'No jobs';
      list.appendChild(em);
      return;
    }
    shown.forEach(function (j) {
      var aliases = j.id ? jobAliases(j) : [j.key];
      var item = document.createElement('div');
      item.className = 'jobitem' + (aliases.indexOf(isolatedJobKey) !== -1 ? ' lit' : '');
      item.draggable = !!j.id;
      item.title = j.id ? 'Drag onto a day to schedule an installation' : '';

      // n / expanded are used by the visit-list block below and by the {visits} token
      var n = 0;
      aliases.forEach(function (k) { n = Math.max(n, counts[k] || 0); });
      var expanded = !!expandedJobs[aliases[0]];
      // content from the (customisable) job-card template
      var body = document.createElement('div'); body.className = 'jbody';
      renderCardTemplate(jobCardTpl, jobCardTokens(j, aliases, counts, nextOf), body, { bar: barColorsFor(j.stage) });
      item.appendChild(body);

      // expanded: list every visit; click one to jump the calendar to that date
      if (expanded && n) {
        var box = document.createElement('div');
        box.className = 'jvisits';
        var visits = recordsCache.filter(function (r) {
          return aliases.indexOf(jobKey(r)) !== -1 && gristToLocalDate(r[mappingsCache.startDate]);
        }).sort(function (a, b) {
          return gristToLocalDate(a[mappingsCache.startDate]) - gristToLocalDate(b[mappingsCache.startDate]);
        });
        visits.forEach(function (v, i) {
          var row = document.createElement('div');
          row.className = 'jvisit';
          var d = gristToLocalDate(v[mappingsCache.startDate]);
          var note = (mappingsCache.seqNote != null) ? fmtVal(v[mappingsCache.seqNote]) : '';
          var vd = document.createElement('span');
          vd.className = 'vd';
          vd.textContent = (i + 1) + '/' + visits.length + ' · ' + fmtShort(d) + ' ' + d.getFullYear();
          row.appendChild(vd);
          if (note) row.appendChild(document.createTextNode(' - ' + note));
          row.title = 'Show this install on the calendar';
          row.addEventListener('click', function (e) {
            e.stopPropagation();
            refDate = new Date(d);
            selectedRowId = v.id;
            isolatedJobKey = jobKey(v);
            grist.setCursorPos({ rowId: v.id });
            render();
          });
          box.appendChild(row);
        });
        item.appendChild(box);
      }

      item.addEventListener('click', function () {
        if (aliases.indexOf(isolatedJobKey) !== -1) {
          isolatedJobKey = null;                 // click again to clear
        } else {
          // isolate under whichever alias the visit records actually use
          var hit = aliases.filter(function (k) { return counts[k]; })[0];
          isolatedJobKey = hit || aliases[0];
        }
        selectedRowId = null;
        render();
      });
      item.addEventListener('dblclick', function (e) {
        e.stopPropagation();
        openJobDetails(j);
      });
      if (j.id) {
        item.addEventListener('dragstart', function (e) {
          e.dataTransfer.setData('application/x-mm-job', String(j.id));
          e.dataTransfer.effectAllowed = 'copy';
        });
      }
      list.appendChild(item);
    });
  }

  function detailLabel(id) {
    if (id === '__installations') return 'Installation dates';
    if (DETAIL_CORE[id]) return DETAIL_CORE[id];
    return (jobMetaByColId[id] || {}).label || id;
  }
  function saveDetailLayout() { try { grist.setOption('detailLayout', detailLayout); } catch (e) {} }
  function renderLayoutEditor() {
    var host = document.querySelector('#jobModal .jm-editor');
    host.innerHTML = '';
    var note = document.createElement('div'); note.className = 'jm-editnote';
    note.textContent = 'Toggle a field to show or hide it. Drag the handle to reorder. Applies to every job.';
    host.appendChild(note);
    detailCandidates().forEach(function (id) {
      var on = !detailLayout.hidden[id];
      var row = document.createElement('div');
      row.className = 'jm-fld' + (on ? ' on' : ' hidden-fld');
      row.draggable = true; row.dataset.fid = id;
      var grip = document.createElement('span'); grip.className = 'grip'; grip.textContent = '⠿'; row.appendChild(grip);
      var lbl = document.createElement('span'); lbl.className = 'flbl'; lbl.textContent = detailLabel(id); row.appendChild(lbl);
      var sw = document.createElement('span'); sw.className = 'fsw'; row.appendChild(sw);
      row.addEventListener('click', function (e) {
        if (e.target === grip) return;
        detailLayout.hidden[id] = on;
        saveDetailLayout(); renderLayoutEditor();
      });
      row.addEventListener('dragstart', function (e) { row.classList.add('dragging'); e.dataTransfer.setData('text/plain', id); e.dataTransfer.effectAllowed = 'move'; });
      row.addEventListener('dragend', function () { row.classList.remove('dragging'); });
      row.addEventListener('dragover', function (e) { e.preventDefault(); });
      row.addEventListener('drop', function (e) {
        e.preventDefault();
        var from = e.dataTransfer.getData('text/plain'); if (!from || from === id) return;
        var order = detailCandidates();
        order.splice(order.indexOf(from), 1);
        var r = row.getBoundingClientRect();
        order.splice(order.indexOf(id) + (e.clientY > r.top + r.height / 2 ? 1 : 0), 0, from);
        detailLayout.order = order;
        saveDetailLayout(); renderLayoutEditor();
      });
      host.appendChild(row);
    });
    var reset = document.createElement('div'); reset.className = 'jm-editreset'; reset.textContent = 'Reset to default';
    reset.addEventListener('click', function () { detailLayout = { order: [], hidden: {} }; saveDetailLayout(); renderLayoutEditor(); });
    host.appendChild(reset);
  }
  function openLayoutEditor() {
    document.getElementById('jobModalCard').classList.add('editing');
    document.querySelector('.jm-gear').classList.add('on');
    renderLayoutEditor();
  }
  function closeLayoutEditor() {
    document.getElementById('jobModalCard').classList.remove('editing');
    document.querySelector('.jm-gear').classList.remove('on');
    if (currentDetailJob) openJobDetails(currentDetailJob);
  }

  // ---- calendar rendering ----
  function render() {
    var cal = document.getElementById('cal');
    cal.innerHTML = '';
    if (!mappingsCache) { updateRangeLabel(); return; }
    seqById = computeSeq();
    var byDay = eventsByDay();
    var today = new Date(); today.setHours(0,0,0,0);

    if (view === 'month') {
      var wrap = document.createElement('div'); wrap.id = 'monthwrap';
      var head = document.createElement('div'); head.className = 'mhead';
      DAYS.forEach(function (n) { var h = document.createElement('div'); h.textContent = n; head.appendChild(h); });
      wrap.appendChild(head);
      var first = new Date(refDate.getFullYear(), refDate.getMonth(), 1);
      var last = new Date(refDate.getFullYear(), refDate.getMonth()+1, 0);
      var cur = weekStart(first);
      while (cur <= last) {
        var row = document.createElement('div'); row.className = 'mrow';
        for (var i = 0; i < 7; i++) {
          var day = addDays(cur, i);
          var cell = document.createElement('div');
          cell.className = 'mcell' + (day.getMonth() !== refDate.getMonth() ? ' other' : '') + (sameDay(day, today) ? ' today' : '');
          var dn = document.createElement('div'); dn.className = 'dnum'; dn.textContent = day.getDate();
          cell.appendChild(dn);
          (byDay[dkey(day)] || []).forEach(function (rec) { cell.appendChild(makeCard(rec)); });
          makeDropTarget(cell, day);
          row.appendChild(cell);
        }
        wrap.appendChild(row);
        cur = addDays(cur, 7);
      }
      cal.appendChild(wrap);
    } else {
      var n = view === 'day' ? 1 : 7;
      var start = view === 'day' ? new Date(refDate) : weekStart(refDate);
      var cols = document.createElement('div'); cols.className = 'cols';
      for (var j = 0; j < n; j++) {
        var day2 = addDays(start, j);
        var isToday = sameDay(day2, today);
        var colEl = document.createElement('div'); colEl.className = 'daycol' + (isToday ? ' today' : '');
        var dh = document.createElement('div');
        dh.className = 'dayhead' + (isToday ? ' today' : '');
        dh.innerHTML = '<span class="num">' + day2.getDate() + '</span>' + DAYS[(day2.getDay()+6)%7];
        colEl.appendChild(dh);
        var body = document.createElement('div'); body.className = 'daybody';
        (byDay[dkey(day2)] || []).forEach(function (rec) { body.appendChild(makeCard(rec)); });
        makeDropTarget(body, day2);
        colEl.appendChild(body);
        cols.appendChild(colEl);
      }
      cal.appendChild(cols);
    }
    updateRangeLabel();
    renderTabs();
    renderSidebar();
    updateFilterBadges();
    renderSortMenu();
    // two-way highlight: bring the isolated job into view in the sidebar
    if (isolatedJobKey && isolatedJobKey !== lastScrolledKey) {
      var litItem = document.querySelector('.jobitem.lit');
      if (litItem && litItem.scrollIntoView) litItem.scrollIntoView({ block: 'nearest' });
    }
    lastScrolledKey = isolatedJobKey;
  }

  function updateRangeLabel() {
    var el = document.getElementById('rangeLabel');
    if (view === 'month') {
      el.textContent = MONTHS[refDate.getMonth()] + ' ' + refDate.getFullYear();
    } else if (view === 'day') {
      el.textContent = fmtDate(refDate);
    } else {
      var s = weekStart(refDate), e = addDays(s, 6);
      el.textContent = fmtShort(s) + ' – ' + fmtDate(e);
    }
  }

  function navigate(dir) {  // dir = -1 | 0 | 1
    if (dir === 0) { refDate = new Date(); refDate.setHours(0,0,0,0); }
    else if (view === 'month') refDate = new Date(refDate.getFullYear(), refDate.getMonth()+dir, 1);
    else refDate = addDays(refDate, dir * (view === 'day' ? 1 : 7));
    render();
  }

  // ---- column metadata + jobs table (needs full access) ----
  function loadMeta() {
    return grist.getTable().getTableId().then(function (tableId) {
      mappedTableId = tableId;
      return Promise.all([
        grist.docApi.fetchTable('_grist_Tables'),
        grist.docApi.fetchTable('_grist_Tables_column')
      ]).then(function (res) {
        var tables = res[0], cols = res[1];
        var tref = tables.id[tables.tableId.indexOf(tableId)];
        var m = {};
        for (var i = 0; i < cols.id.length; i++) {
          if (cols.parentId[i] !== tref) continue;
          var wo = {};
          try { wo = JSON.parse(cols.widgetOptions[i] || '{}'); } catch (e) {}
          m[cols.colId[i]] = { label: cols.label[i] || cols.colId[i], type: cols.type[i] || '', choiceOptions: wo.choiceOptions || {}, choices: wo.choices || null,
            isFormula: !!(cols.isFormula && cols.isFormula[i]), formula: (cols.formula && cols.formula[i]) || '' };
        }
        metaByColId = m;
        return loadInboxColors().then(function () { applyChoiceColorOverrides(metaByColId); });
      });
    }).catch(function (err) { console.warn('metadata read failed', err); });
  }

  function loadJobs() {
    // the groupBy column is Ref:<JobsTable>; fetch that table so ALL jobs are listed
    if (!mappingsCache || mappingsCache.groupBy == null) { jobsCache = null; return Promise.resolve(); }
    var t = colMeta(mappingsCache.groupBy).type || '';
    if (t.indexOf('Ref:') !== 0) { jobsCache = null; return Promise.resolve(); }
    var jobsTable = t.slice(4);
    jobsTableId = jobsTable;
    return Promise.all([
      grist.docApi.fetchTable(jobsTable),
      grist.docApi.fetchTable('_grist_Tables'),
      grist.docApi.fetchTable('_grist_Tables_column')
    ]).then(function (res) {
      var data = res[0], tables = res[1], cols = res[2];
      // column metadata for the jobs table (labels/types/colours) - powers the details popup
      var tref = tables.id[tables.tableId.indexOf(jobsTable)];
      var jm = {};
      for (var c = 0; c < cols.id.length; c++) {
        if (cols.parentId[c] !== tref) continue;
        var wo = {};
        try { wo = JSON.parse(cols.widgetOptions[c] || '{}'); } catch (e) {}
        jm[cols.colId[c]] = { label: cols.label[c] || cols.colId[c], type: cols.type[c] || '', choiceOptions: wo.choiceOptions || {}, choices: wo.choices || null,
          isFormula: !!(cols.isFormula && cols.isFormula[c]), formula: (cols.formula && cols.formula[c]) || '' };
      }
      jobMetaByColId = jm;
      applyChoiceColorOverrides(jobMetaByColId);
      var colIds = Object.keys(data).filter(function (k) { return k !== 'id' && k !== 'manualSort'; });
      var out = [];
      var n = (data.id || []).length;
      for (var i = 0; i < n; i++) {
        var raw = {};
        colIds.forEach(function (k) { raw[k] = data[k][i]; });   // full row for the details view
        out.push({
          id: data.id[i],
          key: 'g:' + data.id[i],
          addr: data[JOB_COLS.addr] ? String(data[JOB_COLS.addr][i] || '') : '',
          client: data[JOB_COLS.client] ? String(data[JOB_COLS.client][i] || '') : '',
          stage: data[JOB_COLS.stage] ? String(data[JOB_COLS.stage][i] || '') : '',
          assigned: data[JOB_COLS.assigned] ? listVals(data[JOB_COLS.assigned][i]) : [],
          jid: data[JOB_COLS.jid] ? String(data[JOB_COLS.jid][i] || '') : '',
          payment: data[JOB_COLS.payment] ? String(data[JOB_COLS.payment][i] || '') : '',
          raw: raw
        });
      }
      jobsCache = out;
    }).catch(function (err) { console.warn('jobs table read failed', err); jobsCache = null; });
  }

  // ---- toolbar + sidebar controls ----
  document.getElementById('btnToday').addEventListener('click', function () { navigate(0); });
  document.getElementById('btnPrev').addEventListener('click', function () { navigate(-1); });
  document.getElementById('btnNext').addEventListener('click', function () { navigate(1); });
  document.getElementById('viewSel').addEventListener('change', function (e) {
    view = e.target.value;
    grist.setOption('view', view);
    render();
  });
  document.getElementById('jobSearch').addEventListener('input', function (e) {
    jobQuery = e.target.value;
    renderSidebar();
  });
  var MENUS = [
    ['stageBtn', 'stageMenu', renderStageMenu],
    ['paymentBtn', 'paymentMenu', renderPaymentMenu],
    ['visitsBtn', 'visitsMenu', renderVisitsMenu],
    ['sortBtn', 'sortMenu', renderSortMenu]
  ];
  function closeMenus() {
    MENUS.forEach(function (m) {
      var mn = document.getElementById(m[1]); if (mn) mn.classList.remove('open');
      var bt = document.getElementById(m[0]); if (bt) bt.classList.remove('open');
    });
    var ev = document.getElementById('evMenu'); if (ev) ev.hidden = true;
  }
  MENUS.forEach(function (m) {
    var btn = document.getElementById(m[0]); if (!btn) return;
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var menu = document.getElementById(m[1]);
      var willOpen = !menu.classList.contains('open');
      closeMenus();
      if (willOpen) { m[2](); menu.classList.add('open'); btn.classList.add('open'); }
    });
    var menu = document.getElementById(m[1]);
    if (menu) menu.addEventListener('click', function (e) { e.stopPropagation(); });
  });
  var evMenuEl = document.getElementById('evMenu');
  if (evMenuEl) evMenuEl.addEventListener('click', function (e) { e.stopPropagation(); });
  document.addEventListener('click', closeMenus);
  // card editor modal: close + tabs
  (function () {
    var modal = document.getElementById('cardEditModal'); if (!modal) return;
    modal.querySelector('.ce-close').addEventListener('click', closeCardEditor);
    modal.addEventListener('click', function (e) { if (e.target === modal) closeCardEditor(); });
    [].forEach.call(modal.querySelectorAll('.ce-tab'), function (b) {
      b.addEventListener('click', function () { cardEditTab = b.dataset.tab; renderCardEditor(); });
    });
  })();

  // ---- job details popup: close + edit controls ----
  document.querySelector('#jobModal .jm-close').addEventListener('click', closeJobModal);
  document.querySelector('#jobModal .jm-gear').addEventListener('click', function (e) {
    e.stopPropagation();
    if (document.getElementById('jobModalCard').classList.contains('editing')) closeLayoutEditor();
    else openLayoutEditor();
  });
  document.querySelector('#jobModal .jm-donebtn').addEventListener('click', function (e) { e.stopPropagation(); closeLayoutEditor(); });
  document.getElementById('jobModal').addEventListener('click', function (e) {
    if (e.target === this) closeJobModal();          // click the backdrop to close
  });
  document.getElementById('jobModalCard').addEventListener('click', function (e) { e.stopPropagation(); });
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    var ov = document.getElementById('jmConfirm');
    if (ov && ov.style.display === 'flex') { ov.style.display = 'none'; var r = _unsavedRes; _unsavedRes = null; if (r) r('cancel'); return; }
    if (_floatMenu) { closeFloatMenu(); return; }
    if (document.getElementById('jobModal').classList.contains('open')) closeJobModal();
  });
  (function () {
    var wrap = document.getElementById('wrap');
    var btn = document.getElementById('btnJobs');
    function apply() {
      wrap.classList.toggle('collapsed', !sidebarOpen);
      btn.classList.toggle('active', sidebarOpen);
    }
    btn.classList.add('active');
    btn.addEventListener('click', function () {
      sidebarOpen = !sidebarOpen;
      grist.setOption('sidebar', sidebarOpen);
      apply();
      if (sidebarOpen) { var s = document.getElementById('jobSearch'); if (s) s.focus(); }
    });
    window._applySidebar = apply;
  })();
  document.getElementById('cal').addEventListener('click', function () {
    if (isolatedJobKey || selectedRowId) { isolatedJobKey = null; selectedRowId = null; render(); }
  });

  // ---- grist wiring ----
  grist.ready({
    requiredAccess: 'full',
    columns: [
      { name: 'startDate', title: 'Installation date', type: 'Date,DateTime', description: 'Day the install is shown on' },
      { name: 'title', title: 'Title', type: 'Text', description: 'Bold text shown on the card' },
      { name: 'type', title: 'Colour by', optional: true, description: 'Choice column used for the title colour + stage filter (e.g. Stage)' },
      { name: 'details', title: 'Detail lines', optional: true, allowMultiple: true, description: 'Extra fields shown under the title' },
      { name: 'seqNote', title: 'Install note', optional: true, description: 'Per-install note shown in the bottom "Installation n/N: note" line' },
      { name: 'groupBy', title: 'Group by (job)', optional: true, description: 'Reference to the job - links installs together and powers the jobs sidebar' },
      { name: 'orderBy', title: 'Manual order', type: 'Numeric', optional: true, description: 'Numeric column that stores the hand-arranged order of cards within a day' }
    ],
    allowSelectBy: true
  });

  grist.onOptions(function (opts) {
    if (!opts) return;
    if (opts.view) {
      view = opts.view;
      document.getElementById('viewSel').value = view;
    }
    if (typeof opts.sidebar === 'boolean') {
      sidebarOpen = opts.sidebar;
      if (window._applySidebar) window._applySidebar();
    }
    if (opts.sort && opts.sort.key) sortBy = opts.sort;
    // adopt the shared card design only when following it ("for everyone") and not mid-edit
    var editing = (document.getElementById('cardEditModal') || {}).classList && document.getElementById('cardEditModal').classList.contains('open');
    if (cardScope !== 'me' && !editing) {
      if (typeof opts.eventCardTpl === 'string') eventCardTpl = opts.eventCardTpl;
      if (typeof opts.jobCardTpl === 'string') jobCardTpl = opts.jobCardTpl;
      if (typeof opts.eventCardFont === 'number') eventCardFont = opts.eventCardFont;
      if (typeof opts.jobCardFont === 'number') jobCardFont = opts.jobCardFont;
      applyCardFonts();
    }
    if (opts.detailLayout && typeof opts.detailLayout === 'object') {
      detailLayout = { order: opts.detailLayout.order || [], hidden: opts.detailLayout.hidden || {} };
    }
    if (Array.isArray(opts.savedViews)) savedViews = opts.savedViews;
    if ('activeView' in opts) activeViewName = opts.activeView || null;
    // restore the filters/sort of the saved view that was active last session - once
    if (!viewsLoaded) {
      viewsLoaded = true;
      var v = findView(activeViewName);
      if (v) { applyView(v, true); return; }
    }
    render();
  });

  function handleRecords(records, mappings) {
    var msg = document.getElementById('msg');
    if (!mappings || !mappings.startDate || !mappings.title) {
      msg.style.display = 'block';
      msg.textContent = 'Map the Installation date and Title columns in the widget panel on the right.';
      return;
    }
    msg.style.display = 'none';
    // While the job popup has unsaved edits, the draft lives in the live caches
    // (recordsCache / jobsCache / stoneCache) and currentDetailJob points into jobsCache.
    // Replacing them here (and rebuilding jobsCache via loadJobs) would orphan the edit and
    // make Save silently write nothing. Defer the refresh until the edit is saved or discarded.
    if (edit.dirty) { mappingsCache = mappings; return; }
    var mapChanged = !mappingsCache || JSON.stringify(mappingsCache) !== JSON.stringify(mappings);
    mappingsCache = mappings;
    recordsCache = records || [];
    var pendingRec = pendingCursor && recordsCache.find(function (r) { return r.id === pendingCursor; });
    if (pendingRec) {
      grist.setCursorPos({ rowId: pendingCursor });   // now the section knows the row
      if (isolatedJobKey) isolatedJobKey = jobKey(pendingRec);  // re-key off the real record
      pendingCursor = null;
    }
    render();
    if (mapChanged) { loadMeta().then(loadJobs).then(render); }
    else { loadJobs().then(render); }   // render() (not just renderSidebar) so pills/counts refresh with the reloaded jobsCache
  }
  grist.onRecords(handleRecords);
  window._test = handleRecords;                                  // local debug hooks
  window._setMeta = function (m) { metaByColId = m; applyChoiceColorOverrides(metaByColId); render(); };
  window._setJobs = function (j) { jobsCache = j; render(); };
  window._setJobMeta = function (m) { jobMetaByColId = m; applyChoiceColorOverrides(jobMetaByColId); };
  window._openJob = function (j) { openJobDetails(j); };
  window._detailLayout = function () { return detailLayout; };

  render();
})();
</script>
</body>
</html>
