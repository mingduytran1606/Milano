<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milano — Inbox</title>
<script src="https://milano.getgrist.com/grist-plugin-api.js"></script>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1d2733; --muted:#6b7683;
    --line:#e2e5ea; --line2:#eef1f4;
    --accent:#16b378; --accent-soft:#eafaf2; --accent-ink:#0f7a52;
    --danger:#e5484d;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.10);
    --radius:14px; --sw-off:#cfd4d1;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#12161b; --panel:#1a1f26; --ink:#e8edf2; --muted:#9aa6b2;
      --line:#2a323b; --line2:#232a32;
      --accent:#35c993; --accent-soft:#173a30; --accent-ink:#7ee0bd; --sw-off:#3a434d;
      --shadow:0 1px 2px rgba(0,0,0,.4);}
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);}
  #app{height:100%;display:flex;gap:8px;padding:14px}
  .splitter{flex:0 0 7px;cursor:col-resize;align-self:stretch;position:relative}
  .splitter::after{content:"";position:absolute;left:2px;right:2px;top:0;bottom:0;border-radius:3px;background:var(--line)}
  .splitter:hover::after,.splitter.drag::after{background:var(--accent)}

  /* ---------- list pane ---------- */
  .list-pane{flex:0 0 316px;display:flex;flex-direction:column;min-height:0;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden}
  .list-head{display:flex;align-items:center;gap:8px;padding:12px 14px 10px}
  .list-head .t{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .list-head .count{background:var(--line2);color:var(--muted);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
  .list-head .newbtn{margin-left:auto;font:inherit;font-size:12px;font-weight:600;color:#fff;background:var(--accent);
    border:0;border-radius:8px;padding:6px 12px;cursor:pointer}
  .list-head .newbtn:hover{filter:brightness(1.06)}
  .navbar{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none}
  .navbar::-webkit-scrollbar{display:none}
  .navbar .ntab{flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:12px;font-weight:600;
    color:var(--muted);background:var(--line2);border:1px solid transparent;border-radius:999px;padding:4px 11px;cursor:pointer;white-space:nowrap}
  .navbar .ntab:hover{color:var(--ink)}
  .navbar .ntab.on{color:#fff;background:var(--accent);border-color:var(--accent)}
  .navbar .ntab .ncount{background:rgba(0,0,0,.10);color:inherit;border-radius:999px;font-size:10px;padding:0 6px;font-weight:700;min-width:16px;text-align:center}
  .navbar .ntab.on .ncount{background:rgba(255,255,255,.25)}
  .navbar .ntab.empty{opacity:.45}

  /* ---------- toolbar ---------- */
  .filters{position:relative;padding:0 12px 11px;display:flex;flex-direction:column;gap:7px;border-bottom:1px solid var(--line2)}
  .search{position:relative}
  .search input{width:100%;font:inherit;font-size:12.5px;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:8px 10px 8px 31px}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .search .sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .filt-row{display:flex;gap:7px}
  .tbtn{display:flex;align-items:center;gap:7px;font:inherit;font-size:12px;font-weight:600;
    padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);
    cursor:pointer;text-align:left;min-width:0}
  .tbtn:hover{background:var(--line2)}
  .tbtn.active{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
  .tbtn.ico{flex:0 0 auto;justify-content:center;padding:8px 10px}
  .tbtn .tlabel{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tbtn .caret{flex:0 0 auto;margin-left:auto;color:var(--muted);transition:transform .15s}
  .tbtn.open .caret{transform:rotate(90deg)}
  .tbtn .tnum{flex:0 0 auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;border-radius:9px;padding:0 6px;line-height:16px}
  .tbtn svg{flex:0 0 auto;color:var(--muted)}
  .tbtn.active svg{color:var(--accent-ink)}

  /* ---------- popover menus ---------- */
  .popmenu{position:absolute;top:100%;left:12px;right:12px;margin-top:4px;z-index:30;
    display:flex;flex-direction:column;gap:2px;padding:7px;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 34px rgba(16,24,40,.20);
    max-height:380px;overflow:auto}
  .popmenu[hidden]{display:none}
  .phead{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:6px 3px 2px}
  .phead:first-child{margin-top:0}
  .prow{display:flex;align-items:center;gap:7px;padding:7px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--ink);user-select:none}
  .prow:hover{background:var(--line2)}
  .prow.on{color:var(--accent-ink);font-weight:600;background:var(--accent-soft)}
  .prow .rlabel{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prow .rtick{flex:0 0 auto;color:var(--accent-ink);font-weight:700}
  .prow .rarrow{flex:0 0 auto;color:var(--accent-ink);font-weight:700}
  .prow .rcaret{flex:0 0 auto;margin-left:auto;color:var(--muted)}
  .prow .rnum{flex:0 0 auto;font-size:10px;font-weight:700;background:var(--accent);color:#fff;border-radius:9px;padding:0 6px;line-height:16px}
  .prow .vtag{flex:0 0 auto;font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);border-radius:6px;padding:1px 6px}
  .prow .rdel{flex:0 0 auto;color:var(--muted);font-weight:700;padding:0 6px;border-radius:5px;line-height:1.4}
  .prow .rdel:hover{color:var(--danger);background:rgba(229,72,77,.12)}
  .pback{font-size:12px;font-weight:600;color:var(--accent-ink);cursor:pointer;padding:2px 4px 6px;user-select:none}
  .pback:hover{text-decoration:underline}
  .psel{font-size:10.5px;color:var(--accent-ink);padding:0 7px 5px;margin-top:-2px;line-height:1.4}
  .paction{display:flex;align-items:center;gap:7px;padding:7px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--accent-ink);user-select:none}
  .paction:hover{background:var(--accent-soft)}
  .paction.primary{background:var(--accent);color:#fff;justify-content:center}
  .paction.primary:hover{background:var(--accent);filter:brightness(1.06)}
  .paction.danger{color:var(--danger)}
  .paction.danger:hover{background:rgba(229,72,77,.1)}
  .psep{border-top:1px solid var(--line2);margin:5px 0 2px}
  .pempty{font-size:11px;color:var(--muted);padding:4px 4px 6px}
  .phint{font-size:9.5px;color:var(--muted);padding:3px 4px 2px}
  .pchip{display:flex;align-items:center;gap:9px;padding:6px 5px;cursor:pointer;user-select:none;border-radius:7px;font-size:12px}
  .pchip:hover{background:var(--line2)}
  .sw{flex:0 0 auto;width:28px;height:16px;border-radius:9px;background:var(--sw-off);position:relative;transition:background .15s}
  .sw::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 1px 1px rgba(0,0,0,.25);transition:left .15s}
  .pchip.on .sw{background:var(--accent)}
  .pchip.on .sw::after{left:14px}
  .pchip .cdot{flex:0 0 auto;width:10px;height:10px;border-radius:3px;box-shadow:0 0 0 1px rgba(0,0,0,.12) inset}
  .pchip .clabel{flex:1;min-width:0}

  /* ---------- job list ---------- */
  .list{flex:1;min-height:0;overflow:auto}
  .job{display:flex;gap:10px;padding:11px 14px;border-top:1px solid var(--line2);cursor:pointer;position:relative}
  .job:first-child{border-top:0}
  .job:hover{background:var(--line2)}
  .job.sel{background:var(--accent-soft)}
  .job.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .job .jmain{flex:1;min-width:0}
  .job .jtop{display:flex;align-items:center;gap:7px;min-width:0}
  .job .jnmtext{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;font-size:var(--lcf-client,13px)}
  .job .jtop .pill{flex:0 0 auto}
  .job .jtop .jdate{margin-left:auto;flex:0 0 auto}
  .job .qid{font-size:10px;font-weight:600;color:var(--muted);flex:0 0 auto}
  .job .jtop .qid{margin-left:auto}
  .job .jad{font-size:var(--lcf-address,12px);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .job .jmeta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:6px}
  .job .chip{font-size:11px;font-weight:600;color:var(--muted);background:var(--line2);border-radius:6px;padding:1px 7px;white-space:nowrap}
  .job .chip.right{margin-left:auto}
  .job .kebab{flex:0 0 auto;align-self:flex-start;width:26px;height:26px;border:0;border-radius:7px;background:transparent;
    color:var(--muted);cursor:pointer;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .1s}
  .job:hover .kebab,.job.sel .kebab,.job .kebab.open{opacity:1}
  .job .kebab:hover{background:var(--panel);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
  .rowmenu{position:fixed;z-index:60;min-width:186px}
  .rowmenu .paction .rico{flex:0 0 auto;color:var(--muted)}
  .list-empty{color:var(--muted);font-style:italic;text-align:center;padding:40px 12px}
  /* ---- list group section headers ---- */
  .grp-head{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--line2);cursor:pointer;
    position:sticky;top:0;z-index:5;border-top:1px solid var(--line);user-select:none}
  .grp-head .grp-caret{color:var(--muted);font-weight:700;transition:transform .15s}
  .grp-head:not(.collapsed) .grp-caret{transform:rotate(90deg)}
  .grp-head .grp-name{flex:1;min-width:0;font-weight:700;font-size:11.5px;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .grp-head .grp-count{flex:0 0 auto;background:var(--panel);color:var(--muted);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
  /* ---- grouping editor (in Customize panel) ---- */
  .grp-rule{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
  .grp-sel,.grp-val,.grp-lbl{font:inherit;font-size:12px;border:1px solid var(--line);border-radius:7px;padding:5px 7px;background:var(--panel);color:var(--ink)}
  .grp-sel{max-width:120px} .grp-val{width:86px} .grp-lbl{width:104px}
  .grp-arrow{color:var(--muted)}
  .grp-icn{cursor:pointer;color:var(--muted);font-weight:700;padding:0 4px}
  .grp-icn:hover{color:var(--accent-ink)} .grp-icn.del:hover{color:var(--danger)}
  .grp-add{color:var(--accent-ink);font-weight:600;font-size:12.5px;cursor:pointer;padding:4px 2px}
  .grp-rest{display:flex;align-items:center;gap:7px;margin:9px 0;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
  .grp-sub{font-size:11.5px;color:var(--muted);margin:8px 0 6px}
  .grp-if{font-size:12px;color:var(--muted);font-weight:600}
  .job .jbody{display:flex;flex-direction:column;gap:3px;min-width:0}
  .tline{display:flex;flex-wrap:wrap;align-items:center;gap:5px;min-width:0;font-size:var(--card-fs,12.5px);color:var(--muted);line-height:1.35}
  .tline strong{font-weight:600;color:var(--ink);font-size:var(--lcf-client,13px)}
  .job .tline .pill.xs{font-size:var(--lcf-pill,10px)}
  .job .tline .avatar.sm{font-size:var(--lcf-avatar,10px)}

  /* ---- job-card template editor ---- */
  .tpl-ta{width:100%;min-height:92px;font-size:13px;line-height:1.5;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace}
  .tpl-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .tpl-sec{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 2px 7px}
  .tpl-prev{border:1px dashed var(--line);border-radius:10px;padding:10px 12px;background:var(--bg)}
  .tok-list{display:flex;flex-wrap:wrap;gap:6px}
  .tok{display:inline-flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:5px 8px;cursor:pointer;background:var(--panel)}
  .tok:hover{border-color:var(--accent);background:var(--accent-soft)}
  .tok code{font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--accent-ink);font-weight:700;font-size:11.5px}
  .tok .tokdesc{color:var(--muted)}
  .tpl-help{font-size:12px;color:var(--muted);line-height:1.9}
  .tpl-help code{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--line2);border-radius:5px;padding:2px 6px;color:var(--ink);font-size:11.5px}
  .tpl-share{display:flex;align-items:center;gap:9px;margin:11px 2px 2px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;user-select:none}
  .tpl-share input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:0 0 auto}
  .tpl-share .tpl-note{font-weight:400;color:var(--muted);font-size:11.5px}
  .cm-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--line2)}
  .cm-tab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .cm-tab:hover{color:var(--ink)}
  .cm-tab.on{color:var(--accent-ink);border-bottom-color:var(--accent)}
  .cm-panel[hidden]{display:none}
  .tpl-fs{display:flex;align-items:center;gap:9px;margin:11px 0 2px;font-size:12.5px;font-weight:600;color:var(--ink)}
  .tpl-fs input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;max-width:220px}
  .tpl-fsval{font-weight:400;color:var(--muted);font-size:12px;min-width:38px}
  /* drag-reorder stage sort order */
  .stageord{display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .sord-row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:7px;cursor:grab;user-select:none}
  .sord-row:hover{background:var(--line2)}
  .sord-row.dragging{opacity:.4}
  .sord-h{color:var(--muted);font-size:14px;line-height:1}

  /* ---------- modal (change history) ---------- */
  .modal{position:fixed;inset:0;z-index:80;background:rgba(20,22,26,.42);display:flex;align-items:center;justify-content:center;padding:20px}
  .modal[hidden]{display:none}
  .modal-card{background:var(--panel);width:100%;max-width:440px;max-height:80vh;display:flex;flex-direction:column;
    border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.34);overflow:hidden}
  .modal-head{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--line2)}
  .modal-title{flex:1;min-width:0;font-size:15px;font-weight:700}
  .modal-sub{font-size:12px;font-weight:500;color:var(--muted)}
  .modal-close{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:0 2px}
  .modal-close:hover{color:var(--danger)}
  .modal-body{overflow:auto;padding:6px 16px 14px}
  .hrow{display:flex;flex-direction:column;gap:3px;padding:11px 0;border-top:1px solid var(--line2)}
  .hrow:first-child{border-top:0}
  .htop{display:flex;align-items:baseline;gap:8px}
  .haction{font-size:12.5px;font-weight:600}
  .haction.add{color:var(--accent-ink)} .haction.remove{color:var(--danger)}
  .htime{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap}
  .hchg{font-size:12.5px;color:var(--ink);line-height:1.5}
  .hchg b{font-weight:600}
  .hempty{color:var(--muted);font-style:italic;padding:22px 0;text-align:center}
  .hnote{font-size:11px;color:var(--muted);padding:8px 0 2px;line-height:1.5}

  /* ---------- detail pane ---------- */
  .detail-pane{flex:1;min-width:0;overflow:auto;display:flex;flex-direction:column;gap:14px;padding-right:2px}
  .detail-pane>*{flex:0 0 auto}
  .head{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px}
  .head-top{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .client{font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.1}
  .jobid{display:inline-block;font-size:11px;font-weight:600;color:var(--muted);
    background:var(--line2);border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle}
  .addr{color:var(--muted);margin-top:4px;font-size:13px}
  .head-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .head-right .hmeta{display:flex;flex-direction:column;align-items:flex-end;line-height:1.25}
  .head-right .hmk{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600}
  .head-right .hmv{font-size:13px;font-weight:600}
  .fstack{display:flex;flex-direction:column;align-items:flex-start;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line2)}
  .hfield{display:flex;flex-direction:column;gap:5px;min-height:46px}
  .hfield label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .avatars{display:flex}
  .avatar{width:26px;height:26px;border-radius:50%;background:#8a94a0;color:#fff;font-size:10px;
    font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-6px;border:2px solid var(--panel)}
  .avatar:first-child{margin-left:0}
  .avatar.sm{width:20px;height:20px;font-size:9px;border-width:1.5px}
  .kpis{display:flex;flex-direction:column;gap:5px;margin-top:12px;align-items:flex-end}
  .kpi{display:flex;flex-direction:column-reverse;align-items:flex-end;gap:2px}
  .kpi .n{font-size:16px;font-weight:700}
  .head-body{display:flex;align-items:flex-start;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line2)}
  .head-body .fstack{flex:1;margin-top:0;padding-top:0;border-top:0}
  .head-body .kpis{margin-top:0;gap:12px}
  .head-body .kpi{min-height:46px;justify-content:center}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

  /* ---------- combined header/details card (responsive) ---------- */
  .htitle{display:flex;align-items:center;gap:8px;min-width:0;flex:1 1 auto;flex-wrap:wrap}
  .head-top .hmeta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;line-height:1.25}
  .head-top .hmk{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600}
  .head-top .hmk:not(:first-child){margin-top:8px}
  .head-top .hmv{font-size:13px;font-weight:600}
  .hmv-row{display:flex;align-items:center;gap:5px}
  .hmv-row .pencil{opacity:.6}
  .hmv-row:hover .pencil{opacity:1}
  .hmv-edit{cursor:pointer;border-bottom:1px dashed transparent;border-radius:4px}
  .hmv-edit:hover{border-bottom-color:var(--line)}
  .hmv-date{font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--accent);border-radius:7px;padding:2px 6px;box-shadow:0 0 0 2px var(--accent-soft)}
  .hgrid.krow{border-top:0;padding-top:0;margin-top:12px}
  .ctitle-wrap{min-width:0;max-width:100%}
  .client.editable{display:inline-block;cursor:pointer;border-radius:8px;padding:1px 5px;margin-left:-5px}
  .client.editable:hover{background:var(--line2)}
  .ctitle-edit{min-width:220px;max-width:100%}
  .clienttitle{font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.15;padding:2px 8px;
    border:1px solid var(--accent);border-radius:9px;background:var(--panel);color:var(--ink);width:100%;box-shadow:0 0 0 2px var(--accent-soft)}
  .clienttitle:focus{outline:none}
  .addr-inp{width:100%;margin-top:4px;font:inherit;font-size:13px;color:var(--muted);background:transparent;
    border:1px solid transparent;border-radius:8px;padding:4px 7px}
  .addr-inp:hover{border-color:var(--line)}
  .addr-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);color:var(--ink);background:var(--panel)}
  .hgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px 18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line2)}
  .hcell{display:flex;flex-direction:column;gap:6px;min-width:0}
  .hcell>label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .hcell .hnum{font-size:18px;font-weight:700}
  .hcell input[type=date]{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:9px;padding:7px 9px;max-width:100%}
  .hcell .pill{align-self:flex-start}
  .assign-cell{display:flex;align-items:center;gap:5px;align-self:flex-start;border-radius:8px;padding:2px 4px;margin:-2px -4px}
  .assign-cell.editable{cursor:pointer}
  .assign-cell.editable:hover{background:var(--line2)}
  .assign-cell .pencil{opacity:.45}
  .assign-cell.editable:hover .pencil{opacity:.9}
  .hnote{margin-top:14px}
  .hnote label{display:block;margin-bottom:6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .hnote textarea{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:9px;padding:7px 9px;width:100%;resize:vertical;min-height:54px}
  .hnote textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}

  .pill{display:inline-flex;align-items:center;font-size:12px;font-weight:600;border-radius:999px;padding:3px 11px;white-space:nowrap;border:1px solid rgba(0,0,0,.06);color:#111}
  .pill.xs{font-size:10px;padding:2px 8px}
  .pill .pdot{flex:0 0 auto;width:7px;height:7px;border-radius:50%;margin-right:6px;box-shadow:0 0 0 1px rgba(0,0,0,.14) inset}
  .pill.xs .pdot{width:6px;height:6px;margin-right:5px}
  select.pill{appearance:none;cursor:pointer;padding-right:24px;color:#111;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' fill='none' stroke='%23555' stroke-width='1.5'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card h3{margin:0;font-size:13px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);
    padding:13px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px}
  .card h3 .count{background:var(--line2);color:var(--ink);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
  .card h3 .add{font-size:12px;color:var(--accent-ink);cursor:pointer;font-weight:600;text-transform:none;letter-spacing:0}
  .card-body{padding:14px 18px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .field input,.field textarea{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:9px;padding:7px 9px;width:100%}
  .field textarea{resize:vertical;min-height:52px}
  .field .ro{color:var(--ink);font-weight:500}
  .stone-head{display:grid;grid-template-columns:minmax(0,1.15fr) 150px 44px 44px 44px 66px minmax(0,1fr);gap:8px;padding:0 0 8px}
  .stonecard .card-body{overflow-x:auto}
  .stonecard .stone-head,.stonecard .line{grid-template-columns:var(--stone-grid, minmax(140px,1.15fr) 150px 44px 44px 44px 66px minmax(120px,1fr));min-width:640px}
  .stone-head span{position:relative;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .stone-head .col-rz{position:absolute;top:-2px;right:-8px;width:11px;bottom:-6px;cursor:col-resize;z-index:3}
  .stone-head .col-rz::after{content:"";position:absolute;left:5px;top:0;bottom:0;width:1px;background:transparent}
  .stone-head .col-rz:hover::after{background:var(--accent)}
  .stone-head span:nth-child(3),.stone-head span:nth-child(4),.stone-head span:nth-child(5),.stone-head span:nth-child(6){text-align:right}
  .line{display:grid;grid-template-columns:minmax(0,1.15fr) 150px 44px 44px 44px 66px minmax(0,1fr);gap:8px;align-items:start;padding:11px 0;border-top:1px solid var(--line2)}
  .line .lnote{width:100%;margin-top:5px;font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:8px;padding:5px 6px}
  .line textarea.lnote{resize:vertical;overflow:auto;line-height:1.4;min-height:32px;display:block}
  .line textarea.lnote:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .line .prod{min-width:0;padding-top:5px}
  .line select.pill{max-width:100%}
  .line .statuscell{display:flex;flex-direction:column;gap:6px;align-items:flex-start;min-width:0;max-width:100%}
  .line .statusdate{display:flex;flex-direction:column;gap:2px;width:100%}
  .line .sdline{font-size:11.5px;color:var(--muted);cursor:pointer;border-bottom:1px dashed transparent;align-self:flex-start}
  .line .sdline:hover{color:var(--ink);border-bottom-color:var(--line)}
  .line .statusdate input{font:inherit;font-size:12px;color:var(--ink);background:transparent;border:0;border-bottom:1px solid var(--line);border-radius:0;padding:4px 2px;max-width:100%}
  .line .statusdate input:focus{outline:none;border-bottom-color:var(--accent)}
  .line .lqty{width:100%;margin-top:5px;font:inherit;color:var(--ink);background:transparent;border:0;border-bottom:1px solid var(--line);border-radius:0;padding:5px 2px;text-align:right;font-variant-numeric:tabular-nums}
  .line .lqty:focus{outline:none;border-bottom-color:var(--accent)}
  .line .lprice{display:flex;flex-wrap:nowrap;justify-content:flex-end;align-items:center;gap:3px;margin-top:5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .line input[type=number]{-moz-appearance:textfield}
  .line input[type=number]::-webkit-outer-spin-button,.line input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .line .lprice.ro{justify-content:flex-end;color:var(--ink);font-weight:500;padding-top:2px}
  .line .lprice input{width:4em;min-width:0;flex:0 1 auto;font:inherit;color:var(--ink);background:transparent;border:0;border-bottom:1px solid var(--line);border-radius:0;padding:5px 2px;text-align:right;appearance:textfield;-moz-appearance:textfield}
  .line .lprice input:focus{outline:none;border-bottom-color:var(--accent)}
  .line .prod .nm{font-weight:600;white-space:normal;overflow-wrap:anywhere;word-break:break-word}
  .line .prod .sub{font-size:12px;color:var(--muted)}
  .visit{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line2)}
  .visit:first-child{border-top:0}
  .visit .date{font-weight:600;min-width:120px;display:flex;align-items:center;gap:6px}
  .visit input.vdate{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:8px;padding:5px 7px}
  .visit input.vnote{font:inherit;color:var(--ink);background:transparent;border:1px solid transparent;border-radius:8px;padding:5px 7px;flex:1;min-width:0}
  .visit input.vnote:hover,.visit input.vnote:focus{border-color:var(--line)}
  .visit .del{color:var(--danger);cursor:pointer;opacity:.55;font-weight:700;padding:0 4px}
  .visit .del:hover{opacity:1}
  .empty{color:var(--muted);font-style:italic;padding:6px 0}
  .badge{background:var(--accent);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 7px}
  .detail-empty{margin:auto;color:var(--muted);text-align:center;padding:60px 0}

  /* ---------- reference lookup (Client) ---------- */
  .lookup{position:relative}
  .lookup-inp{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:9px;padding:7px 9px;width:100%}
  .lookup-inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .lookup-menu{position:absolute;top:100%;left:0;right:0;z-index:40;margin-top:4px;padding:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;box-shadow:0 12px 34px rgba(16,24,40,.20);
    max-height:240px;overflow:auto}
  .lookup-menu[hidden]{display:none}
  .lookup-row{padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lookup-row:hover{background:var(--line2)}
  .lookup-row.create{color:var(--accent-ink);font-weight:600}
  .lookup-row .lsub{color:var(--muted);font-size:12px}
  .lookup-empty{padding:7px 9px;color:var(--muted);font-size:12px}

  /* ---------- product cell + picker ---------- */
  .line .prod{cursor:pointer}
  .prod .nmrow{display:flex;align-items:center;gap:5px;min-width:0}
  .prod .nmrow .nm{min-width:0;white-space:normal;overflow-wrap:anywhere;word-break:break-word}
  .pencil{flex:0 0 auto;cursor:pointer;color:var(--muted);opacity:.4;font-size:12px;line-height:1;transition:opacity .1s}
  .line:hover .pencil{opacity:.8}
  .pencil:hover{color:var(--accent-ink);opacity:1}
  .prodpick{position:fixed;z-index:70;width:330px;max-width:calc(100vw - 24px);max-height:380px;overflow:hidden;
    display:flex;flex-direction:column;padding:8px}
  .prodpick .pp-search input{width:100%;font:inherit;font-size:13px;color:var(--ink);background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:6px}
  .prodpick .pp-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .prodpick .pp-list{overflow:auto;min-height:0}
  .pp-row{padding:8px 9px;border-radius:7px;cursor:pointer;font-size:13px}
  .pp-row:hover{background:var(--line2)}
  .pp-row.on{background:var(--accent-soft);color:var(--accent-ink)}
  .pp-row .ppsub{color:var(--muted);font-size:12px}
  .pp-empty{padding:8px 9px;color:var(--muted);font-size:12px}

  /* ---------- choice dropdown (Stage / Payment / Order status) ---------- */
  .pill.pill-select{cursor:pointer;padding-right:8px}
  .pill.pill-select .pcaret{margin-left:5px;font-size:9px;opacity:.55;line-height:1}
  .choicepop{position:fixed;z-index:70;min-width:160px;max-width:280px;max-height:320px;overflow:auto;padding:6px;gap:1px}
  .cprow{display:flex;align-items:center;gap:8px;padding:4px 5px;border-radius:8px;cursor:pointer}
  .cprow:hover{background:var(--line2)}
  .cprow.on{background:var(--line2)}
  .cprow .rtick{flex:0 0 auto;margin-left:auto;color:var(--accent-ink);font-weight:700;font-size:12px}

  /* ---------- generic form modal (new product) ---------- */
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--line2)}
  .btn-primary{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:8px 15px;font:inherit;font-weight:600;cursor:pointer}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-primary:disabled{opacity:.5;cursor:default;filter:none}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 15px;font:inherit;font-weight:600;cursor:pointer}
  .btn-ghost:hover{background:var(--line2)}
  .form-field{display:flex;flex-direction:column;gap:5px;margin:11px 0}
  .form-field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .form-field input,.form-field select{font:inherit;color:var(--ink);background:transparent;border:1px solid var(--line);border-radius:9px;padding:8px 10px;width:100%}
  .form-field input:focus,.form-field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .form-field.skip input{background:var(--line2);color:var(--muted)}
  .form-hint{font-size:11px;color:var(--muted);margin-top:2px}

  /* ---------- summary card (3a) ---------- */
  .sumcard .sum-top{display:grid;grid-template-columns:1fr auto;column-gap:12px;row-gap:5px;align-items:center}
  .sumcard .sum-title{grid-column:1;grid-row:1;display:flex;align-items:center;gap:9px;flex-wrap:wrap;min-width:0}
  .sumcard .sum-ct{flex:0 0 auto}
  .sumcard .sum-ct .client{font-size:var(--fs-client,22px);border-bottom:1px dashed var(--line);border-radius:0;padding:0 0 1px;margin-left:0}
  .sumcard .sum-addrinp{margin-top:0;margin-left:0;padding-left:0;font-size:var(--fs-address,13px)}
  .sumcard .sum-ct .client.editable:hover{background:transparent;border-bottom-color:var(--muted)}
  .sumcard .sum-jobid{grid-column:2;grid-row:1;justify-self:end;font-size:var(--fs-jobid,11px)}
  .sumcard .sum-addr-top{flex:1 1 160px;min-width:120px}
  .sumcard .sum-addr-top .sum-addrinp{width:100%}
  .sumcard .sum-pills{grid-column:1;grid-row:2;display:flex;align-items:center;gap:9px;flex-wrap:wrap;min-width:0}
  .sumcard .sum-addr{grid-column:1;grid-row:2;min-width:0}
  .sumcard .sum-inp{grid-column:2;grid-row:2;justify-self:end;font-size:var(--fs-inputDate,13px);color:var(--muted);white-space:nowrap}
  .sum-assign{display:flex;align-items:center;cursor:pointer;border-radius:8px;padding:1px 2px}
  .sum-assign:hover{background:var(--line2)}
  .sum-assign-add{width:22px;height:22px;border-radius:50%;border:1px dashed var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:13px}
  .sumcard .sum-cols{display:grid;grid-template-columns:minmax(0,var(--sumL,1fr)) 9px minmax(0,1fr);margin-top:14px;padding-top:14px;border-top:1px solid var(--line2)}
  .sumcard .sum-l{padding-right:16px}
  .sumcard .sum-r{padding-left:16px}
  .sum-split{position:relative;cursor:col-resize;align-self:stretch}
  .sum-split::after{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%);background:var(--line2)}
  .sum-split:hover::after,.sum-split.drag::after{background:var(--accent);width:2px}
  .sum-blk{margin-top:14px}
  .sum-blk:first-child{margin-top:0}
  .sum-lbl{display:block;margin-bottom:6px;font-size:var(--fs-label,10px);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .scope-n{display:flex;align-items:baseline;gap:6px}
  .scope-n b{font-size:var(--fs-scopeNum,24px);font-weight:800;letter-spacing:-.02em;line-height:1}
  .scope-n span{font-size:var(--fs-scopeUnit,12px);color:var(--muted);font-weight:600}
  .stones{display:flex;flex-direction:column;gap:3px;margin-top:10px}
  .stone{display:grid;grid-template-columns:auto minmax(0,1.6fr) minmax(0,1fr);align-items:center;gap:8px;padding-left:16px}
  .stone .snm{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:var(--fs-stone,13px);font-weight:600}
  .stone .snote{justify-self:stretch;text-align:right;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:var(--fs-stoneNote,12px);color:var(--muted);cursor:default}
  .sdot{flex:0 0 auto;width:7px;height:7px;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.14) inset}
  /* stones grouped under a status heading */
  .stgrp-head{display:flex;align-items:center;gap:7px;margin-top:11px;font-size:var(--fs-stoneStatus,11.5px)}
  .stgrp-head:first-child{margin-top:0}
  .stgrp-n{font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
  .stgrp-l{font-weight:700;color:var(--muted)}
  .stone .sbul{justify-self:center;width:4px;height:4px;border-radius:50%;background:var(--muted);opacity:.5}
  .spill{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-pill,12px);font-weight:600;color:var(--ink);border-radius:999px;padding:3px 10px 3px 9px;cursor:pointer}
  .spill .pcaret{font-size:8px;opacity:.5;margin-left:1px;line-height:1}
  .sum-note{font:inherit;font-size:var(--fs-note,13px);line-height:1.5;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 11px;width:100%;resize:vertical;min-height:46px}
  .sum-note:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .sum-r .drow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:0 0 8px}
  .sum-r .dl{font-size:var(--fs-dateLabel,11px);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .sum-r .dv{font-size:var(--fs-dateValue,14px);font-weight:700;text-align:right}
  .inst-h2{display:flex;align-items:center;gap:8px;font-size:var(--fs-dateLabel,11px);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin:2px 0 2px;padding-top:10px;border-top:1px solid var(--line2)}
  .sum-add{margin-left:auto;color:var(--accent-ink);font-weight:600;cursor:pointer;text-transform:none;letter-spacing:0;font-size:12px}
  .sum-r .inst{padding:8px 0 0}
  .inst-drow{display:flex;align-items:center;gap:8px}
  .inst .idate{font-size:var(--fs-instDate,14px);font-weight:700}
  .inst-del{margin-left:auto;color:var(--danger);cursor:pointer;opacity:.45;font-weight:700;padding:0 3px}
  .inst-del:hover{opacity:1}
  .inst-note{font:inherit;font-size:var(--fs-instNote,12px);color:var(--muted);background:transparent;border:1px solid transparent;border-radius:7px;padding:3px 6px;width:100%;margin-top:2px}
  .inst-note:hover,.inst-note:focus{border-color:var(--line);color:var(--ink)}
  .inst-note:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .sumcard .efield{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:1px 4px;margin:-1px -4px;cursor:pointer}
  .sumcard .efield:hover{background:var(--line2)}
  .sumcard .efield .pencil{transform:scaleX(-1);display:inline-block}
  .sumcard .efield:hover .pencil{opacity:1;color:var(--accent-ink)}
  .sumcard .uline{border-bottom:1px dashed var(--line)}

  /* ---------- floating formatting panel ---------- */
  #fmtBtn{position:fixed;bottom:16px;right:16px;z-index:90;width:36px;height:36px;border-radius:50%;
    border:1px solid var(--line);background:var(--panel);box-shadow:var(--shadow);cursor:pointer;color:var(--muted);
    display:flex;align-items:center;justify-content:center}
  #fmtBtn:hover{color:var(--accent-ink);border-color:var(--accent)}
  #fmtBtn.on{color:var(--accent-ink);border-color:var(--accent);background:var(--accent-soft)}
  #fmtPanel{position:fixed;bottom:60px;right:16px;z-index:89;width:300px;max-height:calc(100vh - 80px);overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 34px rgba(16,24,40,.20);padding:12px 14px}
  #fmtPanel[hidden]{display:none}
  .fmt-h{font-size:14px;font-weight:700;display:flex;align-items:center;margin-bottom:4px}
  .fmt-h .fmt-x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:19px;line-height:1}
  .fmt-h .fmt-x:hover{color:var(--danger)}
  .fmt-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:14px 0 6px}
  .fmt-sec.toggle{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:3px 0}
  .fmt-sec.toggle:hover{color:var(--ink)}
  .fmt-sec .fmt-caret{transition:transform .15s;font-size:13px;line-height:1}
  .fmt-sec.toggle:not(.collapsed) .fmt-caret{transform:rotate(90deg)}
  .fmt-body[hidden]{display:none}
  .fs-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:2px 0}
  .fs-row .fs-l{flex:1;min-width:0;color:var(--ink)}
  .fs-btn{flex:0 0 auto;width:22px;height:22px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
  .fs-btn:hover{background:var(--line2);border-color:var(--accent)}
  .fs-v{flex:0 0 auto;min-width:42px;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
  .fmt-color-row{display:flex;align-items:center;gap:9px;padding:4px;border-radius:8px;font-size:12.5px;cursor:pointer}
  .fmt-color-row:hover{background:var(--line2)}
  .fmt-swatch{flex:0 0 auto;width:28px;height:22px;border:1px solid rgba(0,0,0,.12);border-radius:6px}
  .fmt-cl{flex:1;min-width:0;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fmt-palette{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;padding:4px 4px 10px}
  .fmt-palette[hidden]{display:none}
  .pal-sw{width:100%;aspect-ratio:1/1;min-height:22px;border-radius:6px;border:1px solid rgba(0,0,0,.10);cursor:pointer;transition:transform .1s}
  .pal-sw:hover{transform:scale(1.12)}
  .pal-sw.on{box-shadow:0 0 0 2px var(--panel),0 0 0 4px var(--accent)}
  .fmt-saverow{display:flex;gap:8px;margin-top:14px}
  .fmt-save{flex:1;background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 6px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .fmt-save:hover{background:var(--line2)}
  .fmt-save.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .fmt-save.primary:hover{filter:brightness(1.06)}
  .fmt-reset{margin-top:8px;width:100%;background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;font:inherit;font-weight:600;cursor:pointer}
  .fmt-reset:hover{background:var(--line2)}

  @media (max-width:820px){
    #app{flex-direction:column;height:auto}
    .list-pane{flex:none!important;width:auto!important;max-height:52vh}
    .splitter{display:none}
    .detail-pane{overflow:visible}
  }
</style>
</head>
<body>
<div id="app">
  <div class="list-pane">
    <div class="list-head">
      <span class="t">Jobs</span><span class="count" id="jobCount">0</span>
      <button class="newbtn" id="newJob">+ New job</button>

    <div class="navbar" id="navTabs"></div>
    <div class="filters">
      <div class="search">
        <svg class="sic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="fSearch" type="text" placeholder="Search address, client, stone, stage, staff…" autocomplete="off">
      </div>
      <div class="filt-row">
        <button class="tbtn" id="groupBtn" type="button" style="flex:1" title="Group the job list">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h18M3 5v4M21 5v4M6 13h12M6 13v2M18 13v2M9 19h6"/></svg>

        </button>
        <button class="tbtn" id="sortBtn" type="button" style="flex:1">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
          <span class="tlabel">Sort</span><span class="caret">&#8250;</span>

</div>
<div class="popmenu rowmenu" id="rowMenu" hidden></div>
<div class="popmenu prodpick" id="prodPicker" hidden></div>

<div class="popmenu choicepop" id="assignPop" hidden></div>
<div class="modal" id="formModal" hidden>
  <div class="modal-card">
    <div class="modal-head"><span class="modal-title" id="formTitle">New</span><span class="modal-close" id="formClose">&times;</span></div>

</div>

  <div class="modal-card">
    <div class="modal-head"><span class="modal-title">Customize job card</span><span class="modal-sub">Write a template · insert fields · format with markdown</span><span class="modal-close" id="cardClose">&times;</span></div>
    <div class="modal-body" id="cardBody"></div>
    <div class="modal-foot"><button class="btn-ghost" id="cardReset">Reset to default</button><button class="btn-ghost" id="cardSaveMe">Save just for me</button><button class="btn-primary" id="cardSaveAll">Save for everyone</button></div>
  </div>
</div>

  <div class="modal-card">
    <div class="modal-head"><span class="modal-title" id="histTitle">Change history</span><span class="modal-close" id="histClose">&times;</span></div>
    <div class="modal-body" id="histBody"></div>
  </div>
</div>

<script>
/* ============================================================
   Milano — Consolidated Inbox widget (master–detail)
   Toolbar (search · Views · Filter · Sort · Display) styled to
   match the Milano calendar widget. Right pane: the selected
   job's details + stone order + installations, editable in place.
   See milano-inbox-widget-BRIEF.md.
   ============================================================ */

// ---- choice colours (from the live doc; keep in sync) ----
// Default colours (kept immutable so "Reset to defaults" can restore them).
// STAGE_C / PAY_C are live copies that the floating panel mutates.
const STAGE_DEFAULT = {
  "Quote":"#FEF47A","Live":"#98FD90","WIP":"#CCFEFE","Completed":"#FECC81",
  "Cancelled":"#FFFFFF","Others":"#DCDCDC","Closed !":"#f0d1ed","On hold":"#FECBCC","Fix Job":"#e9edf1"};
const PAY_DEFAULT = {
  "Not Invoiced":"#e9edf1","Deposit Paid":"#FFFACD","Outstanding Bal":"#FECBCC",
  "Fully Paid":"#E1FEDE","Other":"#e9edf1","Not Paid Yet":"#FEE7C3","TBC By a Minh":"#E8D0FE"};
const DEFAULT_AVATAR = "#8a94a0";
const STAGE_C = Object.assign({}, STAGE_DEFAULT);
const PAY_C   = Object.assign({}, PAY_DEFAULT);
const ORD_DEFAULT = {
  "2.  Placed Order":"#FEF47A","3. Awaiting Order":"#FED6FB","6. Delivered":"#98FD90",
  "4. Awaiting Pickup":"#75B5FC","7. Not Delivered Yet":"#CCFEFE","5. On hold":"#FEE7C3",
  "1. No Stock":"#FD8182","Cancelled":"#DCDCDC","Delivered by WF":"#E1FEDE",
  "Delivered by Aboda":"#E1FEDE","Delivered by Client":"#E1FEDE","Return":"#CCFEFE","N/A":"#e9edf1"};
const ORD_C = Object.assign({}, ORD_DEFAULT);
// STAGES / PAYS / ORDS start from the defaults but are replaced by the live Grist
// column choices once the schema loads (so renaming a choice in Grist flows
// through to the widget).
let STAGES = Object.keys(STAGE_C);
let PAYS   = Object.keys(PAY_C);
let ORDS   = Object.keys(ORD_C);

// ---- Summary card font sizes (px) — tweak any element's size here ----
const SUMMARY_FONT = {
  client:22, jobid:11, address:13, inputDate:13,
  label:10, scopeNum:24, scopeUnit:12,
  stone:13, stoneStatus:11.5, stoneNote:12, pill:12, note:13,
  dateLabel:11, dateValue:14, instDate:14, instNote:12
};
function applySummaryFont(el){ const f=state.summaryFont||SUMMARY_FONT; for(const k in SUMMARY_FONT){ el.style.setProperty("--fs-"+k, (f[k]!=null?f[k]:SUMMARY_FONT[k])+"px"); } }

// ---- List job-card font sizes (px) — tweak each element here ----
// `base` is the default body size (the Customize > Card text size slider overrides it).
const LIST_CARD_FONT = { base:12.5, client:13, address:12, pill:10, avatar:10 };

// ---- sort options / list fields ----
const SORT_OPTS = [
  { key:"input",  label:"Input date" },
  { key:"client", label:"Client" },
  { key:"stage",  label:"Stage" },
  { key:"scope",  label:"Scope qty" },
  { key:"meas",   label:"Meas. date" }
];
function defaultDir(key){ return (key==="input"||key==="scope") ? -1 : 1; }
const FIELD_DEFS = [
  ["address","Address"],["stage","Stage"],["assigned","Assigned"],
  ["payment","Payment"],["scope","Scope qty"],["meas","Meas. date"],["input","Input date"]
];
// Customisable job-card elements — WHAT shows (state.fields) + WHERE/order (state.cardOrder).
const CARD_FIELDS=[
  {key:"client",  label:"Client name", block:false, render:j=>$("span","jnmtext",esc(j.Client_Label)||"—")},
  {key:"stage",   label:"Stage",       block:false, render:j=>j.Stage?pill(j.Stage,STAGE_C,{xs:true}):null},
  {key:"jobid",   label:"Job ID",      block:false, render:j=>j.Job_ID?$("span","qid",esc(j.Job_ID)):null},
  {key:"address", label:"Address",     block:true,  render:j=>{ const a=esc(j.Job_Address||j.Address_Formatted); return a?$("div","jad",a):null; }},
  {key:"payment", label:"Payment",     block:false, render:j=>j.Payment_Status?pill(j.Payment_Status,PAY_C,{xs:true}):null},
  {key:"assigned",label:"Assigned",    block:false, render:j=>choiceList(j.Assigned_To).length?avatarStack(j.Assigned_To,true):null},
  {key:"scope",   label:"Scope qty",   block:false, render:j=>$("span","chip","Scope "+(j.Scope_Qty!=null?j.Scope_Qty:0))},
  {key:"ordered", label:"Ordered qty", block:false, render:j=>$("span","chip","Ord "+(j.Ordered_Qty!=null?j.Ordered_Qty:0))},
  {key:"meas",    label:"Meas. date",  block:false, render:j=>toDate(j.Meas_Date)?$("span","chip","M "+fmtShort(j.Meas_Date)):null},
  {key:"input",   label:"Input date",  block:false, render:j=>toDate(j.Input_Date)?$("span","chip","In "+fmtShort(j.Input_Date)):null},
];
const CARD_ORDER_DEFAULT=CARD_FIELDS.map(f=>f.key);
function defaultFields(){ return {client:true,stage:true,jobid:false,address:true,payment:false,assigned:true,scope:false,ordered:false,meas:false,input:false}; }
function normalizeCardOrder(saved){
  const valid=CARD_FIELDS.map(f=>f.key);
  const out=(Array.isArray(saved)?saved:[]).filter(k=>valid.includes(k));
  valid.forEach(k=>{ if(!out.includes(k)) out.push(k); });   // append any newly-added fields
  return out;
}
// ---- job-card TEMPLATE: user writes a small markdown-ish layout ----
function txt(v){ return document.createTextNode(v==null?"":String(v)); }
const TOKENS={
  client:  {desc:"Client name",         el:j=>txt(j.Client_Label)},
  jobid:   {desc:"Job ID",              el:j=>txt(j.Job_ID)},
  address: {desc:"Address",             el:j=>txt(j.Job_Address||j.Address_Formatted)},
  stage:   {desc:"Stage — colour pill", el:j=>j.Stage?pill(j.Stage,STAGE_C,{xs:true}):null},
  payment: {desc:"Payment — colour pill",el:j=>j.Payment_Status?pill(j.Payment_Status,PAY_C,{xs:true}):null},
  assigned:{desc:"Assigned — avatars",  el:j=>choiceList(j.Assigned_To).length?avatarStack(j.Assigned_To,true):null},
  scope:   {desc:"Scope qty",           el:j=>txt(j.Scope_Qty!=null?j.Scope_Qty:0)},
  ordered: {desc:"Ordered qty",         el:j=>txt(j.Ordered_Qty!=null?j.Ordered_Qty:0)},
  inwh:    {desc:"In-WH qty",           el:j=>txt(j.In_WH_Qty!=null?j.In_WH_Qty:0)},
  meas:    {desc:"Meas. date",          el:j=>txt(fmtShort(j.Meas_Date))},
  input:   {desc:"Input date",          el:j=>txt(fmtShort(j.Input_Date))},
};
const DEFAULT_TEMPLATE="**{client}** {stage}\n{address}\n{assigned}";

// ---- helpers ----
const $ = (t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
const esc = s => (s==null?"":String(s));
const activeKeys = o => Object.keys(o||{}).filter(k=>o[k]);
function cleanSet(o){ const r={}; activeKeys(o).forEach(k=>r[k]=true); return r; }
function refId(v){ if(v==null)return null; if(typeof v==="number")return v;
  if(Array.isArray(v))return v[2]; if(typeof v==="object")return v.rowId!=null?v.rowId:v.id; return v; }
function toDate(v){ if(v==null||v==="")return null;
  if(typeof v==="number")return new Date(v*1000);
  if(v instanceof Date)return v;
  const d=new Date(v); return isNaN(d)?null:d; }
function fmtDate(v){ const d=toDate(v); if(!d)return "";
  return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtShort(v){ const d=toDate(v); if(!d)return "";
  return d.toLocaleDateString("en-AU",{day:"2-digit",month:"short"}); }
function fmtDMY(v){ const d=toDate(v); if(!d)return "";
  return String(d.getDate()).padStart(2,"0")+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+d.getFullYear(); }
function dateInput(v){ const d=toDate(v); if(!d)return "";
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function toEpochSec(str){ if(!str)return null; const [y,m,d]=str.split("-").map(Number);
  return Math.floor(Date.UTC(y,m-1,d)/1000); }
function choiceList(v){ if(!Array.isArray(v))return v?[v]:[]; return v[0]==="L"?v.slice(1):v; }
function initials(name){ const p=String(name).trim().split(/\s+/);
  return (p.length>1 ? p[0][0]+p[p.length-1][0] : name.slice(0,2)).toUpperCase(); }
// Stone-order notes resize like the Details note (drag handle). Resizing one row
// applies the same height to every note row, and the choice is remembered.
let _noteSync=false;
function applyStoneNoteHeight(h){
  _noteSync=true;
  document.querySelectorAll(".detail-pane .line textarea.lnote").forEach(t=>{ if(t.style.height!==h+"px") t.style.height=h+"px"; });
  requestAnimationFrame(()=>{ _noteSync=false; });
}
function observeStoneNote(el){
  if(typeof ResizeObserver==="undefined") return;
  const ro=new ResizeObserver(()=>{
    if(_noteSync) return;
    const h=el.offsetHeight;
    if(h && h!==state.stoneNoteH){ state.stoneNoteH=h; savePrefs(); applyStoneNoteHeight(h); }
  });
  ro.observe(el);
}
// Apply persisted stone-order column widths (fixed px once the user has dragged any).
function applyStoneGrid(cardEl){
  if(state.stoneColW && state.stoneColW.length===7){
    cardEl.style.setProperty("--stone-grid", state.stoneColW.map(w=>w+"px").join(" "));
  } else { cardEl.style.removeProperty("--stone-grid"); }
}
// Drag the splitter to resize the list pane (persisted), same feel as the note handle.
function initSplitter(){
  const sp=document.getElementById("splitter"), lp=document.querySelector(".list-pane");
  if(!sp||!lp) return;
  if(state.listW) lp.style.flex="0 0 "+state.listW+"px";
  sp.addEventListener("mousedown",e=>{
    e.preventDefault(); sp.classList.add("drag");
    const startX=e.clientX, startW=lp.getBoundingClientRect().width;
    const mv=ev=>{ let w=startW+(ev.clientX-startX); w=Math.max(220,Math.min(w,Math.max(320,window.innerWidth-340))); lp.style.flex="0 0 "+w+"px"; };
    const up=()=>{ document.removeEventListener("mousemove",mv); document.removeEventListener("mouseup",up); sp.classList.remove("drag");
      state.listW=Math.round(lp.getBoundingClientRect().width); savePrefs(); };
    document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
  });
}

function pill(val,colors,opts){
  opts=opts||{};
  const c=colors[val]||"#e9edf1";
  const t=softTint(c);
  if(opts.onchange){
    // Clickable trigger + custom dropdown so each option shows in its OWN colour
    // (a native <select> paints the whole control one colour).
    const trig=$("span","pill pill-select"+(opts.xs?" xs":"")); trig.style.background=t.bg;
    const d=$("span","pdot"); d.style.background=t.dot; trig.appendChild(d);
    trig.appendChild(document.createTextNode(val||"—"));
    trig.appendChild($("span","pcaret","▾"));
    trig.onclick=e=>{ e.stopPropagation(); openChoicePicker(trig,{value:val,options:opts.options||Object.keys(colors),colors,onpick:opts.onchange}); };
    return trig;
  }
  const p=$("span","pill"+(opts.xs?" xs":""),val); p.style.background=t.bg;
  const d=$("span","pdot"); d.style.background=t.dot; p.insertBefore(d,p.firstChild); return p;
}
function hexRgb(h){ h=String(h||"").replace("#",""); if(h.length===3)h=h.split("").map(c=>c+c).join(""); return {r:parseInt(h.slice(0,2),16)||0,g:parseInt(h.slice(2,4),16)||0,b:parseInt(h.slice(4,6),16)||0}; }
// Derive a calm tint (light bg + a stronger dot) from a saturated Grist choice colour.
function softTint(hex){ const {r,g,b}=hexRgb(hex||"#cfd4d1");
  const bg="rgb("+Math.round(r+(255-r)*.72)+","+Math.round(g+(255-g)*.72)+","+Math.round(b+(255-b)*.72)+")";
  const dot="rgb("+Math.round(r*.66)+","+Math.round(g*.66)+","+Math.round(b*.66)+")";
  return {bg,dot}; }
function stripNo(s){ return String(s||"").replace(/^\s*\d+\s*\.?\s*/,"").trim(); }
// Subtle choice chip (dot + label + caret) that opens the colour picker on click.
function softChoice(val,colors,opts){
  opts=opts||{};
  const t=softTint(colors[val]); const trig=$("span","spill editable"); trig.style.background=t.bg;
  const d=$("span","sdot"); d.style.background=t.dot; trig.appendChild(d);
  trig.appendChild(document.createTextNode(val||"—"));
  trig.appendChild($("span","pcaret","▾"));
  trig.onclick=e=>{ e.stopPropagation(); openChoicePicker(trig,{value:val,options:opts.options||Object.keys(colors),colors,onpick:opts.onchange}); };
  return trig;
}
function openChoicePicker(anchor,cfg){
  const m=document.getElementById("choicePop"); m.innerHTML="";
  (cfg.options||[]).forEach(o=>{
    const row=$("div","cprow"+(o===cfg.value?" on":""));
    const p=$("span","pill",o); p.style.background=cfg.colors[o]||"#e9edf1"; row.appendChild(p);
    if(o===cfg.value) row.appendChild($("span","rtick","✓"));
    row.onmousedown=e=>{ e.preventDefault(); closeMenus(); cfg.onpick(o); };
    m.appendChild(row);
  });
  closeMenus(); m.hidden=false; positionPop(m,anchor,190);
}
// ---- colour customisation (floating panel) ----
function toHex6(h){ h=String(h||"").trim();
  if(/^#[0-9a-fA-F]{6}$/.test(h)) return h.toLowerCase();
  if(/^#[0-9a-fA-F]{3}$/.test(h)) return ("#"+h.slice(1).split("").map(c=>c+c).join("")).toLowerCase();
  return "#e9edf1"; }
function normalizeColors(c){ c=c||{}; return {stage:c.stage||{}, payment:c.payment||{}, assignee:c.assignee||{}, order:c.order||{}}; }
// Push saved overrides into the live STAGE_C / PAY_C / ORD_C maps (reset to
// defaults first, so calling this after a reset restores the originals).
function applyColorOverrides(){
  const c=state.colors||{};
  Object.assign(STAGE_C, STAGE_DEFAULT); Object.keys(c.stage||{}).forEach(k=>{ if(k in STAGE_C && c.stage[k]) STAGE_C[k]=c.stage[k]; });
  Object.assign(PAY_C,   PAY_DEFAULT);   Object.keys(c.payment||{}).forEach(k=>{ if(k in PAY_C && c.payment[k]) PAY_C[k]=c.payment[k]; });
  Object.assign(ORD_C,   ORD_DEFAULT);   Object.keys(c.order||{}).forEach(k=>{ if(k in ORD_C && c.order[k]) ORD_C[k]=c.order[k]; });
}
// Live stage/payment/order choices come from the Grist column schema (falling
// back to the built-in defaults when standalone). Renaming a choice in Grist
// therefore flows through to the widget's lists, pills, filters and colour panel.
function distinctVals(coll,field){ return [...new Set((coll||[]).map(r=>r[field]).filter(v=>v!=null&&v!==""))]; }
function rebuildChoiceMap(target,defaults,names,gristColors,overrides){
  Object.keys(target).forEach(k=>delete target[k]);
  names.forEach((n,i)=>{ target[n]=(overrides&&overrides[n])||defaults[n]||(gristColors&&gristColors[n])||PALETTE[i%PALETTE.length]||"#e9edf1"; });
}
function syncChoiceMaps(){
  const sc=state.schemaChoices||{}, scc=state.schemaChoiceColors||{}, ov=state.colors||{};
  if(Array.isArray(sc.stage)&&sc.stage.length){
    const names=sc.stage.slice(); distinctVals(state.jobs,"Stage").forEach(v=>{ if(!names.includes(v)) names.push(v); });
    rebuildChoiceMap(STAGE_C,STAGE_DEFAULT,names,scc.stage,ov.stage); STAGES=names;
  }
  if(Array.isArray(sc.payment)&&sc.payment.length){
    const names=sc.payment.slice(); distinctVals(state.jobs,"Payment_Status").forEach(v=>{ if(!names.includes(v)) names.push(v); });
    rebuildChoiceMap(PAY_C,PAY_DEFAULT,names,scc.payment,ov.payment); PAYS=names;
  }
  if(Array.isArray(sc.order)&&sc.order.length){
    const names=sc.order.slice(); distinctVals(state.stone,"Order_Status").forEach(v=>{ if(!names.includes(v)) names.push(v); });
    rebuildChoiceMap(ORD_C,ORD_DEFAULT,names,scc.order,ov.order); ORDS=names;
  }
  normalizeStageOrder();
}
function applyGristChoices(sc){
  try{
    state.schemaChoices.stage        = sc.colChoices("Jobs_Detail","Stage");
    state.schemaChoiceColors.stage   = sc.colChoiceColors("Jobs_Detail","Stage")||{};
    state.schemaChoices.payment      = sc.colChoices("Jobs_Detail","Payment_Status");
    state.schemaChoiceColors.payment = sc.colChoiceColors("Jobs_Detail","Payment_Status")||{};
    state.schemaChoices.order        = sc.colChoices("Stone_Order","Order_Status");
    state.schemaChoiceColors.order   = sc.colChoiceColors("Stone_Order","Order_Status")||{};
    syncChoiceMaps();
  }catch(e){ console.warn("choice sync failed",e); }
}
function avatarColor(name){ const c=state.colors&&state.colors.assignee; return (c&&c[name])||DEFAULT_AVATAR; }
// Black or white text depending on how light the avatar colour is.
function contrastInk(hex){ const {r,g,b}=hexRgb(hex); return (r*299+g*587+b*114)/1000>150?"#1d2733":"#ffffff"; }

function collFor(t){
  if(t==="Jobs_Detail")return state.jobs;
  if(t==="Stone_Order")return state.stone;
  if(t==="Inst_")return state.inst;
  if(state.ref.client && t===state.ref.client.targetTableId)return state.clients;
  if(state.ref.product && t===state.ref.product.targetTableId)return state.catalogue;
  return state.inst;

function update(table,rowId,fields){
  logChange(table,"update",rowId,fields);
  if(!state.grist){ const r=collFor(table).find(x=>x.id===rowId); if(r)Object.assign(r,fields); renderAll(); return; }
  grist.docApi.applyUserActions([["UpdateRecord",table,rowId,fields]]).then(refetch);
}
function addRecord(table,fields,onNew){
  if(!state.grist){
    const coll=collFor(table); const id=coll.reduce((m,r)=>Math.max(m,r.id||0),0)+1;
    coll.push(Object.assign({id},fields));
    logChange(table,"add",id,fields, table==="Jobs_Detail"?id:refId(fields.Job));
    if(onNew)onNew(id); renderAll(); return;
  }
  grist.docApi.applyUserActions([["AddRecord",table,null,fields]]).then(res=>{
    const id=res&&res.retValues&&res.retValues[0];
    logChange(table,"add",id,fields, table==="Jobs_Detail"?id:refId(fields.Job));
    refetch().then(()=>{ if(onNew&&id!=null)onNew(id); });
  });
}
function removeRecord(table,rowId){
  logChange(table,"remove",rowId,null,jobIdFor(table,rowId));
  if(!state.grist){
    const coll=collFor(table); const i=coll.findIndex(x=>x.id===rowId); if(i>=0)coll.splice(i,1);
    if(table==="Jobs_Detail"&&state.selectedId===rowId) state.selectedId=state.jobs[0]?state.jobs[0].id:null;
    renderAll(); return;

const SPECIAL_COL=/^(manualSort|gristHelper_|#)/;
function pickColId(editable,re,fallback){
  const c=(editable||[]).find(c=>re.test(c.colId)||re.test(c.label||""));
  return c?c.colId:(fallback||null);
}
// derive "Supplier · Code · Name" display columns for the product ref
function productDisplayCols(refInfo){
  const e=refInfo.editable||[];
  return { supplier:pickColId(e,/suppl|brand|vendor/i), code:pickColId(e,/code|sku|item/i),
    name:pickColId(e,/name|desc|title|stone/i,refInfo.labelCol), price:pickColId(e,/price|slab|cost|rate/i) };
}
function finishRefSetup(){
  if(state.ref.product && !state.ref.product.cols) state.ref.product.cols=productDisplayCols(state.ref.product);
}
// Drop any label part that's already fully contained (case-insensitive) in a
// longer part — so when the name already spells out supplier/code we don't
// repeat them, e.g. ["Lavistone","LS313","Lavistone | LS313 | Neutra 20mm"]
// collapses to just "Lavistone | LS313 | Neutra 20mm".
function dedupeLabelParts(parts){
  const p=parts.map(v=>String(v).trim()).filter(Boolean);
  const norm=s=>s.toLowerCase();
  return p.filter((v,i)=>!p.some((w,j)=>{
    if(i===j) return false;
    const a=norm(v), b=norm(w);
    return a===b ? j<i : (b.length>a.length && b.includes(a));
  }));
}
function productLabel(row){
  const R=state.ref.product; if(!R||!R.cols) return row&&R&&R.labelCol?String(row[R.labelCol]||""):"";
  const parts=dedupeLabelParts([R.cols.supplier,R.cols.code,R.cols.name].map(k=>k?row[k]:null).filter(v=>v!=null&&v!==""));
  return parts.length?parts.join(" · "):String(row[R.labelCol]||"#"+row.id);
}
// Label for a stone line's product: resolve the Product reference into the
// Catalogue (matches Grist's own display, incl. items with no Code/Supplier),
// then fall back to the formula fields, then the legacy Stone text.
function stoneProductLabel(r){
  const R=state.ref.product;
  if(R){ const pid=refId(r.Product);
    if(pid!=null){ const cat=(state.catalogue||[]).find(c=>c.id===pid);
      if(cat){ const v=productLabel(cat); if(v && v.trim()) return v; } } }
  if(r.Product_Code) return dedupeLabelParts([r.Product_Supplier,r.Product_Code]).join(" · ");
  if(r.Product_Supplier) return r.Product_Supplier;
  if(r.Stone) return r.Stone;
  return "—";
}
// Auto-advance a stone line's Order Status from its data (order/delivery date + qty).
// Only advances from "not-yet" states; never overrides delivered-variants, On hold,
// Cancelled, N/A or Return — so manual choices are preserved.
const PRE_ORDER_STATES=["","3. Awaiting Order","7. Not Delivered Yet","1. No Stock"];
// "6. Delivered" / "Delivered by …" but NOT "Not Delivered Yet".
function isDeliveredStatus(r){ const low=String(r.Order_Status||"").toLowerCase(); return /deliver/.test(low) && !/not deliver/.test(low); }
function autoStatus(r){
  const s=String(r.Order_Status||""), low=s.toLowerCase();
  const isDelivered = isDeliveredStatus(r);
  const oq=Number(r.Ordered_Qty)||0, dq=Number(r.Delivery_Qty)||0;
  if(toDate(r.Delivery_Date) && dq>0 && !isDelivered && !["cancelled","n/a","return"].includes(low)) return "6. Delivered";
  if(toDate(r.Order_Date) && oq>0 && PRE_ORDER_STATES.indexOf(s)>=0) return "2.  Placed Order";
  return null;
}
// Apply an edit to a stone line, then run the auto-status rule on the new data.
function updateStoneAuto(r,fields){
  Object.assign(r,fields);                          // optimistic so the rule sees new values
  const auto=autoStatus(r);
  if(auto && auto!==r.Order_Status){ r.Order_Status=auto; fields.Order_Status=auto; }
  update("Stone_Order",r.id,fields);
}
// An editable "Ordered on / Delivered on" date line for a stone row.
function stoneDateLine(r,col,verb){
  const sd=$("div","statusdate");
  const span=$("span","sdline", toDate(r[col]) ? (verb+" "+fmtDMY(r[col])) : (verb+" — set date"));
  span.title="Click to set the "+verb.toLowerCase().replace(/ on$/,"")+" date";
  span.onclick=()=>{
    const di=document.createElement("input"); di.type="date"; di.value=dateInput(r[col]);
    di.onchange=()=>updateStoneAuto(r,{[col]:toEpochSec(di.value)});
    di.onblur=()=>renderDetail();
    sd.replaceChild(di,span); di.focus(); if(di.showPicker){ try{di.showPicker();}catch(e){} }
  };
  sd.appendChild(span); return sd;
}
// A numeric qty input for a stone row. `auto` routes through the status rule.
function stoneQtyInput(r,col,title,auto){
  const i=document.createElement("input"); i.type="number"; i.className="lqty"; i.title=title;
  i.value=(r[col]!=null?r[col]:"");
  i.onchange=()=>{ const v=i.value===""?null:Number(i.value); auto?updateStoneAuto(r,{[col]:v}):update("Stone_Order",r.id,{[col]:v}); };
  return i;
}

async function loadGristSchema(){
  const [T,C]=await Promise.all([
    grist.docApi.fetchTable("_grist_Tables"),
    grist.docApi.fetchTable("_grist_Tables_column")]);
  const tables=columnarToRows(T), cols=columnarToRows(C);
  const tableById={}; tables.forEach(t=>tableById[t.tableId]=t);
  const colByRowId={}; cols.forEach(c=>colByRowId[c.id]=c);
  const colsOf=tid=>{ const t=tableById[tid]; return t?cols.filter(c=>c.parentId===t.id):[]; };
  const isEditable=c=>!c.isFormula && c.colId && !SPECIAL_COL.test(c.colId);
  const choicesOf=c=>{ try{ return JSON.parse(c.widgetOptions||"{}").choices||null; }catch(e){ return null; } };
  // Per-choice fill colours Grist stores in the column's widgetOptions.
  const choiceColorsOf=c=>{ try{ const o=JSON.parse(c.widgetOptions||"{}").choiceOptions||{}; const m={};
    for(const k in o){ if(o[k]&&o[k].fillColor) m[k]=o[k].fillColor; } return m; }catch(e){ return {}; } };
  const editableCols=tid=>colsOf(tid).filter(isEditable).map(c=>({
    colId:c.colId, label:c.label||c.colId, type:(c.type||"Text").split(":")[0],
    isRef:/^Ref/.test(c.type||""), choices:choicesOf(c) }));
  const bestLabelCol=tid=>{ const cs=colsOf(tid).filter(isEditable);
    return ((cs.find(c=>/name|title|label|desc/i.test(c.colId))||cs.find(c=>(c.type||"").startsWith("Text"))||cs[0]||{}).colId)||null; };
  function refInfo(parentTableId,colId){
    const col=colsOf(parentTableId).find(c=>c.colId===colId); if(!col)return null;
    const m=/^Ref(?:List)?:(.+)$/.exec(col.type||""); if(!m)return null;
    const targetTableId=m[1], vis=col.visibleCol&&colByRowId[col.visibleCol];
    return { colId, targetTableId, labelCol:(vis&&vis.colId)||bestLabelCol(targetTableId), editable:editableCols(targetTableId) };
  }
  function colChoices(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choicesOf(c):null; }
  function colChoiceColors(tableId,colId){ const c=colsOf(tableId).find(x=>x.colId===colId); return c?choiceColorsOf(c):{}; }
  return { refInfo, colChoices, colChoiceColors };
}

function setProduct(r,cat){
  const R=state.ref.product; if(!R)return;
  if(!state.grist){                                   // mirror the read-only formula cols so the line updates now
    const c=R.cols||{};
    if(c.code) r.Product_Code=cat[c.code];
    if(c.supplier) r.Product_Supplier=cat[c.supplier];
    if(c.name) r.Stone=cat[c.name];
    if(c.price && cat[c.price]!=null) r.Product_Price_slab=cat[c.price];

  r.Product=cat.id;
  update("Stone_Order",r.id,{Product:cat.id});

function escapeRe(s){ return String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
// Guess the supplier from a product name — match a known supplier, else the first
// "|"-segment (names look like "WF | Marble | Biancatto…"), else the first word.
function deduceSupplier(name,options){
  name=String(name||"").trim(); if(!name) return "";
  const opts=(options||[]).filter(Boolean).slice().sort((a,b)=>b.length-a.length);
  for(const o of opts){ if(new RegExp("(^|[^A-Za-z0-9])"+escapeRe(o)+"([^A-Za-z0-9]|$)","i").test(name)) return o; }
  if(name.indexOf("|")>=0){ const first=name.split("|")[0].trim(); if(first) return first; }
  const w=name.split(/\s+/)[0]; return (w&&w.length>=2)?w:"";
}
// Supplier field = combobox: existing suppliers (choices + values in use) + type-to-add,
// auto-filled by deducing from the product name until the user edits it.
function buildSupplierCombo(R,initial){
  const supCol=R.cols&&R.cols.supplier;
  const choiceCol=(R.editable||[]).find(c=>c.colId===supCol);
  const fromChoices=((choiceCol&&choiceCol.choices)||[]).map(String);
  const fromData=[...new Set((state.catalogue||[]).map(c=>supCol?c[supCol]:null).filter(v=>v!=null&&v!==""))].map(String);
  const all=[...new Set([...fromChoices,...fromData])].sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));
  let auto=(initial==null||initial===""); const wrap=$("div","lookup");
  const inp=document.createElement("input"); inp.className="lookup-inp"; inp.value=initial==null?"":String(initial); inp.placeholder="Supplier…"; inp.autocomplete="off";
  const menu=$("div","lookup-menu"); menu.hidden=true; wrap.appendChild(inp); wrap.appendChild(menu);

function openRecordForm(refInfo,title,prefillName,onCreated,existingRow){
  if(!refInfo)return;
  const body=document.getElementById("formBody"); body.innerHTML="";
  document.getElementById("formTitle").textContent=title;
  document.getElementById("formSave").textContent=existingRow?"Save":"Create";
  const cols=refInfo.cols||{}, nameCol=cols.name||refInfo.labelCol;
  const inputs={}; let supplierApi=null, nameEl=null;
  (refInfo.editable||[]).forEach(col=>{
    const canWrite=!col.isRef;                        // skip nested Ref cols — set those in Grist
    const initial = existingRow ? existingRow[col.colId]
                  : (canWrite && col.colId===nameCol && prefillName ? prefillName : "");
    const f=$("div","form-field"+(canWrite?"":" skip")); f.appendChild($("label",null,col.label));
    let el, get;
    if(canWrite && col.colId===cols.supplier){
      supplierApi=buildSupplierCombo(refInfo,initial); el=supplierApi.el; get=supplierApi.get;
    } else if(col.choices&&col.choices.length){
      el=document.createElement("select"); el.appendChild($("option",null,""));
      col.choices.forEach(ch=>{ const o=$("option",null,ch); o.value=ch; el.appendChild(o); });
      el.value=(initial==null?"":String(initial)); get=()=>el.value;
    } else {
      el=document.createElement("input"); el.type=(col.type==="Numeric"||col.type==="Int")?"number":col.type==="Date"?"date":"text";
      if(col.type==="Date") el.value=initial?dateInput(initial):""; else el.value=(initial==null?"":String(initial));
      get=()=> col.type==="Date" ? (el.value?toEpochSec(el.value):null)
             : (col.type==="Numeric"||col.type==="Int") ? (el.value===""?null:Number(el.value)) : el.value;
      if(col.colId===nameCol) nameEl=el;
    }
    if(!canWrite) el.disabled=true;
    f.appendChild(el);
    if(!canWrite) f.appendChild($("div","form-hint","Reference field — set this in Grist after creating."));
    inputs[col.colId]={get,col,canWrite,el}; body.appendChild(f);
  });
  if(!Object.keys(inputs).length) body.appendChild($("div","form-hint","No editable fields found for this table."));
  if(supplierApi && nameEl){ supplierApi.maybeDeduce(nameEl.value); nameEl.addEventListener("input",()=>supplierApi.maybeDeduce(nameEl.value)); }
  _formState={ refInfo, inputs, onCreated, existingRow };
  document.getElementById("formModal").hidden=false;
  const first=nameEl||Object.values(inputs).map(x=>x.el).find(e=>e&&!e.disabled); if(first)setTimeout(()=>first.focus&&first.focus(),0);
}
function submitRecordForm(){
  if(!_formState)return; const {refInfo,inputs,onCreated,existingRow}=_formState; const fields={};
  Object.keys(inputs).forEach(k=>{ const {get,canWrite}=inputs[k]; if(!canWrite)return;
    let v=get(); if(!existingRow){ if(v==null||v==="")return; } else if(v==="") v=null;
    fields[k]=v; });
  if(existingRow){ if(Object.keys(fields).length) update(refInfo.targetTableId,existingRow.id,fields); closeForm(); }
  else addRecord(refInfo.targetTableId,fields,newId=>{ closeForm(); if(onCreated)onCreated(newId); });
}
function closeForm(){ document.getElementById("formModal").hidden=true; _formState=null; }

// Raw comparison for a single sort key (direction applied by the caller).
function sortCmp(key,a,b){
  if(key==="client") return String(a.Client_Label||"").localeCompare(String(b.Client_Label||""));
  if(key==="stage")  return stageRank(a.Stage)-stageRank(b.Stage);
  if(key==="scope")  return (a.Scope_Qty||0)-(b.Scope_Qty||0);
  if(key==="meas")   return (+toDate(a.Meas_Date)||8.64e15)-(+toDate(b.Meas_Date)||8.64e15);
  if(key==="input")  return (+toDate(a.Input_Date)||0)-(+toDate(b.Input_Date)||0);
  return 0;
}
function cmpJobs(a,b){
  const s=state.sort;
  const r1=s.dir*sortCmp(s.key,a,b); if(r1) return r1;
  const s2=state.sort2;
  if(s2&&s2.key&&s2.key!==s.key){ const r2=s2.dir*sortCmp(s2.key,a,b); if(r2) return r2; }
  return String(a.Client_Label||"").localeCompare(String(b.Client_Label||""));
}

// Search matches at word starts, so "live" no longer matches inside "de-live-red"
// while "deliv" still matches "Delivered". Falls back to substring if q isn't a word.
function searchMatcher(q){
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  const pre=/^\w/.test(q)?"\\b":"";   // anchor to a word start only when q begins with a word char
  if(!pre) return {test:h=>h.includes(q)};
  try{ return new RegExp(pre+esc); }catch(e){ return {test:h=>h.includes(q)}; }
}
// All filters EXCEPT the mini-nav person pill (search, stage, payment, assigned-filter, sort).
function baseFilteredJobs(){
  const q=state.filter.q.trim().toLowerCase();
  const st=activeKeys(state.filter.stage), as=activeKeys(state.filter.assigned), py=activeKeys(state.filter.payment);
  const stoneTxt=q?stoneTextByJob():null;
  const qm=q?searchMatcher(q):null;
  return state.jobs.filter(j=>{
    if(st.length && !st.includes(j.Stage)) return false;
    if(py.length && !py.includes(j.Payment_Status)) return false;
    if(as.length){ const have=choiceList(j.Assigned_To); if(!have.some(v=>as.includes(v))) return false; }
    if(q){ const hay=((j.Client_Label||"")+" "+(j.Job_Address||"")+" "+(j.Address_Formatted||"")+" "+(j.Job_ID||"")+" "+(j.Stage||"")+" "+choiceList(j.Assigned_To).join(" ")+" "+(j.Stones||"")+" "+(stoneTxt[j.id]||"")).toLowerCase();
      if(!qm.test(hay)) return false; }
    return true;

  document.getElementById("filterBtn").classList.toggle("active", n>0);
  const dflt=(state.sort.key==="input"&&state.sort.dir===-1&&!state.sort2.key);
  document.getElementById("sortBtn").classList.toggle("active", !dflt);
}
// Parse one template line: **bold**, *italic*, {field} tokens, literal text.
function renderInline(str,j,wrap){
  const re=/\*\*([^*]+)\*\*|\*([^*]+)\*|\{([a-z_]+)\}|([^{*]+)|([\s\S])/gi;
  let m;
  while((m=re.exec(str))){
    if(m[1]!=null){ const s=document.createElement("strong"); renderInline(m[1],j,s); wrap.appendChild(s); }
    else if(m[2]!=null){ const s=document.createElement("em"); renderInline(m[2],j,s); wrap.appendChild(s); }
    else if(m[3]!=null){ const t=TOKENS[m[3]]; if(t){ const el=t.el(j); if(el)wrap.appendChild(el); } else wrap.appendChild(txt("{"+m[3]+"}")); }
    else if(m[4]!=null){ wrap.appendChild(txt(m[4])); }
    else if(m[5]!=null){ wrap.appendChild(txt(m[5])); }
  }
}
function renderCardBody(j,tplOverride){
  const body=$("div","jbody");
  const tpl=(tplOverride!=null?tplOverride:(state.cardTemplate||DEFAULT_TEMPLATE));
  tpl.split(/\r?\n/).forEach(line=>{
    if(line.trim()==="") return;
    const el=$("div","tline"); renderInline(line,j,el);
    if(el.textContent.trim()==="" && !el.querySelector(".pill,.avatar")) return;   // line rendered to nothing → skip
    body.appendChild(el);
  });
  if(!body.childNodes.length) body.appendChild($("span","jnmtext",esc(j.Client_Label)||esc(j.Job_ID)||"—"));
  return body;
}
// ---------- list grouping (CASE-style rules + "group the rest by a field") ----------
const GROUP_FIELDS=[{key:"client",label:"Client"},{key:"address",label:"Address"},{key:"stage",label:"Stage"},
  {key:"payment",label:"Payment"},{key:"assigned",label:"Assigned"},{key:"jobid",label:"Job ID"}];
const GROUP_OPS=[{key:"contains",label:"contains"},{key:"is",label:"is"},{key:"starts",label:"starts with"},{key:"empty",label:"is empty"}];
function groupFieldText(j,key){
  switch(key){
    case "client":   return String(j.Client_Label||"");
    case "address":  return String(j.Job_Address||j.Address_Formatted||"");
    case "stage":    return String(j.Stage||"");
    case "payment":  return String(j.Payment_Status||"");
    case "assigned": return choiceList(j.Assigned_To).join(", ");
    case "jobid":    return String(j.Job_ID||"");
    default: return "";
  }
}
function matchVal(val,rule){
  const raw=String(val||""), H=raw.toLowerCase(), V=String(rule.value||"").toLowerCase();
  switch(rule.op){
    case "empty":  return raw.trim()==="";
    case "is":     return H===V;
    case "starts": return V!=="" && H.indexOf(V)===0;
    default:       return V!=="" && H.indexOf(V)>=0;   // contains
  }
}
// Grouping = one column (`by`) + optional value-remap rules on that column.
function normalizeGrouping(g){
  g=g||{};
  const rules=Array.isArray(g.rules)?g.rules.filter(r=>r&&(r.op==="empty"||r.value!=null)).map(r=>({op:r.op||"contains",value:String(r.value==null?"":r.value),label:String(r.label==null?"":r.label)})):[];
  return { by:g.by?String(g.by):"", rules, restMode:(g.restMode==="others"?"others":"value") };
}
function groupingActive(){ return !!(state.grouping && state.grouping.by); }
function groupInfo(j){
  const g=state.grouping, v=groupFieldText(j,g.by), rules=g.rules||[];
  for(let i=0;i<rules.length;i++){ const r=rules[i]; if((r.op==="empty"||r.value)&&matchVal(v,r)) return {label:(r.label||"(unnamed)"),k1:0,k2:i}; }
  if(g.restMode==="others") return {label:"Others",k1:2,k2:""};
  return {label:v.trim()||"\u2014",k1:1,k2:v.toLowerCase()};
}
